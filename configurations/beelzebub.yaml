# =============================================================================
# Beelzebub Fork — Core Configuration (production)
# =============================================================================
# logsPath must be absolute and match the Docker volume mount.
# logDisableTimestamp must be false — the exporter parses event timestamps.
# =============================================================================

core:
  logging:
    debug: false
    debugReportCaller: false
    logDisableTimestamp: false
    logsPath: /var/log/beelzebub/beelzebub.log
  tracings:
    rabbit-mq:
      enabled: false
      uri: ""
  prometheus:
    path: "/metrics"
    port: ":2112"
  beelzebub-cloud:
    enabled: false
    uri: ""
    auth-token: ""
