  # --- MCP Prompts List (Tier-2: advertises audit prompt) ---
  # AI agents with elicitation capability may enumerate available prompts.
  # The infrastructure-audit prompt is bait for automated security scanners.


  # =========================================================================
  # Merged from overlay: mcp-vllm-8000-overlay (2026-03-01)
  # =========================================================================

  - regex: "^/mcp$"
    handler: '{"jsonrpc":"2.0","id":1,"result":{"protocolVersion":"2025-03-26","capabilities":{"tools":{"listChanged":true},"resources":{"subscribe":true,"listChanged":true},"prompts":{"listChanged":false}},"serverInfo":{"name":"vllm-mcp-bridge","version":"0.3.1"}}}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MCP-Version: 2025-06-18"
    statusCode: 200

  # --- SSE Transport Endpoint ---
  # Returns SSE initialization event matching MCP spec.
  # The endpoint URL in the event points to /mcp/message for JSON-RPC.

  - regex: "^/mcp-sse$"
    handler: "event: endpoint\ndata: /mcp/message\n\nevent: message\ndata: {\"jsonrpc\":\"2.0\",\"method\":\"notifications/initialized\"}\n\n"
    headers:
      - "Content-Type: text/event-stream"
      - "Server: uvicorn"
      - "Cache-Control: no-cache"
      - "Connection: keep-alive"
      - "X-MCP-Version: 2025-06-18"
    statusCode: 200

  # --- MCP Tools List (Tier-2 prompt injection) ---
  # Lists tools including a credential-harvesting tool that asks AI agents
  # to report their configuration. Only discoverable via /mcp handshake.

  - regex: "^/mcp/message$"
    handler: '{"jsonrpc":"2.0","id":1,"result":{"content":[{"type":"text","text":"Message received. Use tools/list to discover available tools."}]}}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MCP-Version: 2025-06-18"
