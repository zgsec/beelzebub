# =============================================================================
# OpenAI-Compatible API Honeypot — Port 8001 (vLLM 0.6.6 mimic)
# =============================================================================
#
# PERSONA: vLLM 0.6.6 OpenAI-compatible inference gateway behind uvicorn
#   (Server: uvicorn). Real vLLM routes are byte-shape-derived from the
#   tagged v0.6.6 source tree — see capture-first oracle below.
#
# AUTHORING METHOD: capture-first per feedback_capture_first_lure_authoring.
#   - Real-vLLM-endpoint bodies sourced from vllm-project/vllm @ v0.6.6
#     (vllm/entrypoints/openai/{api_server.py,protocol.py}; vllm/engine/metrics.py)
#   - Captures committed at:
#       ~/projects/honeypot-research/tools/oracle-diff/vllm-0.6.6/
#     (one .txt per endpoint; _AUTHORITATIVE_ROUTE_TABLE.txt is the index)
#   - Canaries substituted ONLY into NATURAL fields (env blocks, MCP resource
#     credential dicts, ghost-endpoint credential blocks). No invented
#     `_debug_*` / `_internal_*` / `_proxy_*` JSON keys.
#
# REAL vLLM 0.6.6 endpoints handled here (capture-first applied):
#   GET /health, GET /version, GET /v1/models, POST /v1/chat/completions,
#   POST /v1/completions, POST /v1/embeddings, POST /tokenize, POST /detokenize,
#   GET /metrics
#
# INTENTIONAL DEVIATIONS from real vLLM 0.6.6 (DOCUMENTED research surfaces —
# capture-first does NOT apply; these are honeypot-only paths that an
# instrumented operator/agent would hit but a real vLLM would 404):
#
#   Phase C tier-1 chain (sessionAction-gated AKIA leak):
#     /health (carries internal:{} hint), /_internal/metrics, /api/auth/register
#   Phase D agent-handshake chain (anti-agent capture → AKIA on verify):
#     /mcp/agent-handshake, /mcp/agent-handshake/verify
#   Phase D tokenizer-reload CVE-bait:
#     /v1/tokenize/reload  (real vLLM 404s this; CVE-aware probers find it)
#   MCP overlay (bridge bait — real vLLM has no MCP):
#     /.well-known/mcp.json, /mcp, /mcp/sse, /sse, /mcp-sse, /mcp/message,
#     /mcp/tools, /mcp/tools/list, /mcp/tools/call, /mcp/prompts/list,
#     /mcp/prompts/get, /mcp/resources/list, /mcp/resources/read
#   Anti-agent / hand-crafted config-dump lures (real vLLM 404s these):
#     /debug/config, /config.json, /openapi.json,
#     /.well-known/ai-plugin.json, /v1/compliance,
#     /v1/register, /api/v1/auth/sync,
#     /internal/cluster-state, /v1/audit/sessions, /v1/audit/replay,
#     /v1/models/{model_id}  (OpenAI-API surface, not vLLM)
#
# These deviations are the research surfaces — they MUST stay.
#
# CANARY TOKENS:
#   AWS Keys — one distinct token per leak path (so a fire attributes to
#   the exact endpoint that emitted it; see lure_lint R9):
#     ${OPENAI_CANARY_AWS_KEY_VLLM_ENV}  — vLLM env block in /debug/config (hand-crafted lure)
#     ${OPENAI_CANARY_AWS_KEY_MCP_RES}   — credentials://vllm-cluster/model-hub
#     ${OPENAI_CANARY_AWS_KEY_MCP_TOOL}  — config://vllm-cluster/topology (in tools/call)
#     ${OPENAI_CANARY_AWS_KEY_CLUSTER}   — /internal/cluster-state credentials block
#     ${OPENAI_CANARY_AWS_KEY_BASH}      — bash export snippet (LLM plugin host env hint)
#   (Each KEY has a matching ${OPENAI_CANARY_AWS_SECRET_<SUFFIX>}.)
#   AWS Key (ml-training): ${OPENAI_CANARY_AWS_KEY_ML}  (separate ml-training profile)
#   DNS:      ${OPENAI_CANARY_DNS} (fires on resolution)
#
# Updated: 2026-05-25 v4 — capture-first realism pass against vLLM 0.6.6 source,
#   pinned version to 0.6.6 across all surfaces, killed duplicate
#   /.well-known/mcp.json handler, anchored 3 regexes, swapped 11
#   docker_registry → mlflow refs (Crestfield platform coherence with
#   the new mlflow-5000 lure).
# Updated: 2026-05-22 v3 — per-leak-path AWS canary slots (A.1#4 from
#   docs/superpowers/plans/find-where-these-fixes-moonlit-metcalfe.md)
# Updated: 2026-03-06 v2 — realism overhaul, real vLLM error schemas
# =============================================================================

apiVersion: "v1"
protocol: "http"
address: ":8001"
description: "OpenAI-compatible inference API"
# v8 Phase 0: capture response body in tracer events. Critical for this
# lure — gpt-4.1-mini-generated /v1/chat/completions responses contain the
# model_name we claim to be (honeypot-detection probes verify), and static
# handlers embed ${OPENAI_CANARY_AWS_KEY_*} canaries. Token values are
# scrubbed at ingest by api/canary_extractor.redact_known_tokens and at
# the public API by api/public._scrub_response_text — see plan §1.5-A.
captureResponseBody: true
responseBodyMaxBytes: 65536

# Persona-shaped fallback when ExecuteModel returns no usable content
# (no API key in container env, OpenAI 5xx, rate limit, network error).
# vLLM real wire shape on engine error: 500 + {"object":"error",...}.
# Without this, HTTPStrategy.applyLLMOfflineResponse emits the legacy bare-text
# "500 Internal Server Error" — wrong shape, leaks "this is a generic
# HTTP responder" to anyone fingerprinting the inference path. With this,
# the attacker sees what a saturated vLLM gateway would emit.
llmOfflineResponse:
  status: 500
  body: '{"object":"error","message":"InternalServerError - inference engine: CUDA OOM after 47 sessions, KV cache 100% utilized; try a smaller model or wait for sessions to drain","type":"server_error","param":null,"code":null}'

# === FAULT INJECTION (WS-11 Phase D Slice 4) ===
# Adds realistic latency jitter + occasional 503s to HTTP responses.
# Real vLLM under load has variable response times and occasional
# service-unavailable errors. Without this, uniform <5ms response times
# across all endpoints is a honeypot fingerprint.
faultInjection:
  enabled: true
  errorRate: 0.005      # 1 in 200 requests → 503
  delayMs: 50           # base delay (ms)
  delayJitterMs: 450    # 0-450ms jitter → total 50-500ms
  errorResponses:
    - '{"object":"error","message":"Service temporarily unavailable — inference engine overloaded, retry after backoff","type":"server_error","param":null,"code":null}'
    - '{"object":"error","message":"Request rate exceeded for this endpoint. Please retry.","type":"rate_limit_error","param":null,"code":"rate_limit_exceeded"}'

commands:
  # =========================================================================
  # Phase C — Chain 1: tier-1 discovery chain (4 stages)
  #
  # Designed: docs/strategy/2026-05-12-ws11-phase-c-tier1-chain-design.md
  # Unlock at stage 4: OPENAI_TIER1_AWS_KEY / OPENAI_TIER1_AWS_SECRET
  # (minted 2026-05-12 — reminders ewr-openai-tier1-aws-v2-202604 +
  # fra-openai-tier1-aws-v2-202604).
  #
  # Auth-gate is sessionAction:create (stage 3) + require (stage 4) —
  # the design's "X-Internal-Token" header is breadcrumb-only; cookie
  # is the real gate. Methodical attackers will set the header per the
  # response hint; tracer captures both for downstream attribution.
  # =========================================================================

  # 1. GET /health — Chain 1 stage 1: enhanced with /_internal/metrics hint
  - regex: "^/health$"
    method: GET
    name: "openai/tier1-chain-stage1"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    # NOTE: real vLLM 0.6.6 /health returns 200 with EMPTY body. We deviate
    # here intentionally as Phase C tier-1 chain stage 1: the JSON body
    # advertises /_internal/metrics so a methodical attacker following hints
    # walks the chain. CVE-aware probers who diff against real vLLM will
    # see the deviation, but they're the audience we want to catch — the
    # chain is the intel surface, not the realism.
    handler: '{"service":"vllm-inference-gateway","version":"0.6.6","status":"ok","model_loaded":"meta-llama/Llama-3.1-70B-Instruct","uptime_seconds":184293,"internal":{"metrics_endpoint":"/_internal/metrics","auth_required":true,"auth_doc":"https://wiki.{{ persona.coherence.world.company.internal_domain }}/inference/internal-auth"}}'

  # Chain 1 stage 4: GET /_internal/metrics (with session cookie) →
  # AKIA_OPENAI_TIER1 canary unlock. sessionAction:require means this
  # ONLY returns the canary after the attacker POSTs /api/auth/register
  # (stage 3) which sets the cookie. Without cookie, beelzebub returns
  # the 401 default for sessionAction:require failure.
  - regex: "^/_internal/metrics$"
    method: GET
    sessionAction: require
    name: "openai/tier1-chain-stage4"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"vllm_metrics":{"requests_total":8473291,"tokens_per_second_p50":142.7,"tokens_per_second_p99":387.2,"gpu_utilization_percent":73.4,"model_kv_cache_used_bytes":18374827648,"active_requests":47},"platform":{"service_mesh_id":"vllm-prod-us-east-1","cluster":"{{ persona.coherence.world.org.cluster_inference }}","aws_credentials_for_s3_cache":{"aws_access_key_id":"${OPENAI_TIER1_AWS_KEY}","aws_secret_access_key":"${OPENAI_TIER1_AWS_SECRET}","region":"us-east-1","bucket":"{{ persona.coherence.world.org.s3_bucket_prefix }}-llm-model-cache","note":"Read-only credentials for model artifact retrieval. Rotated nightly via Vault."}},"request_id":"req_${request.uuid_short}"}'

  # Chain 1 — POST /_internal/metrics → 405 (method gating)
  - regex: "^/_internal/metrics$"
    method: POST
    name: "openai/tier1-chain-method-gate-metrics"
    headers:
      - "Allow: GET"
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 405
    handler: '{"error":"method_not_allowed","allow":["GET"]}'

  # Chain 1 stage 3: POST /api/auth/register → issue session + breadcrumb
  # token. sessionAction:create generates cookie; the JSON body's "token"
  # field is a UUID-short for visible-but-stateless realism.
  - regex: "^/api/auth/register$"
    method: POST
    sessionAction: create
    name: "openai/tier1-chain-stage3"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"token":"sk-internal-${session.cookie}","issued_at":"${time.ago.3h}","expires_in":86400,"scope":"internal-metrics:read","note":"Replicate this token in the X-Internal-Token header on subsequent /_internal/* requests. Tokens are not stored server-side; rotate on each session.","issuer":"auth.{{ persona.coherence.world.company.internal_domain }}"}'

  # Chain 1 — GET /api/auth/register → 405 (method gating)
  - regex: "^/api/auth/register$"
    method: GET
    name: "openai/tier1-chain-method-gate-register"
    headers:
      - "Allow: POST"
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 405
    handler: '{"error":"method_not_allowed","allow":["POST"]}'

  # =========================================================================
  # End Phase C Chain 1
  # =========================================================================

  # 2. GET /version — Real vLLM 0.6.6 DOES expose this (show_version handler in
  #    api_server.py returns JSONResponse({"version": VLLM_VERSION})).
  #    Source: vllm/entrypoints/openai/api_server.py @ v0.6.6.
  #    Capture: ../../honeypot-research/tools/oracle-diff/vllm-0.6.6/version.txt
  - regex: "^/version$"
    method: "GET"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"version":"0.6.6"}'

  # NOTE: duplicate /.well-known/mcp.json (streamable-http variant) removed
  # 2026-05-25. The SSE variant at the MCP-protocol-overlay block below is
  # the canonical handler — it advertises /mcp/sse which has a real handler
  # in this file. Beelzebub's regex dispatcher matched only the first hit
  # so the SSE variant was unreachable. Capture-first verified: real vLLM
  # 0.6.6 returns 404 for this path; both lure variants are intentional
  # deviations, but two competing variants for the same path is a bug.

  # 3. GET /v1/models — Model listing (vLLM 0.6.6 ModelCard + ModelPermission
  #    shapes per vllm/entrypoints/openai/protocol.py; capture in
  #    ../../honeypot-research/tools/oracle-diff/vllm-0.6.6/v1_models.txt)
  - regex: "^/v1/models$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    # ModelCard fields: id, object, created, owned_by, root, parent,
    # max_model_len, permission (List[ModelPermission]). All declared in
    # vllm/entrypoints/openai/protocol.py @ v0.6.6. Real vLLM populates the
    # 11-field ModelPermission; previously this lure shipped `[{}]` which
    # is a permission-empty fingerprint. Multi-model listing requires LoRA
    # adapter flags at launch — leaving 3 entries (plausible for a worker
    # that loads two base models + an embedding model via separate engines).
    handler: |
      {"object":"list","data":[{"id":"meta-llama/Llama-3.1-70B-Instruct","object":"model","created":1738368000,"owned_by":"vllm","root":"meta-llama/Llama-3.1-70B-Instruct","parent":null,"max_model_len":131072,"permission":[{"id":"modelperm-bcef84a4b6f1488f9d7f2c0e3b1a8f5d","object":"model_permission","created":1738368000,"allow_create_engine":false,"allow_sampling":true,"allow_logprobs":true,"allow_search_indices":false,"allow_view":true,"allow_fine_tuning":false,"organization":"*","group":null,"is_blocking":false}]},{"id":"meta-llama/Llama-3.1-8B-Instruct","object":"model","created":1738368000,"owned_by":"vllm","root":"meta-llama/Llama-3.1-8B-Instruct","parent":null,"max_model_len":131072,"permission":[{"id":"modelperm-2c9d7f5a3e0b4f198a4d6c1e8b3f7a02","object":"model_permission","created":1738368000,"allow_create_engine":false,"allow_sampling":true,"allow_logprobs":true,"allow_search_indices":false,"allow_view":true,"allow_fine_tuning":false,"organization":"*","group":null,"is_blocking":false}]},{"id":"BAAI/bge-large-en-v1.5","object":"model","created":1738368000,"owned_by":"vllm","root":"BAAI/bge-large-en-v1.5","parent":null,"max_model_len":512,"permission":[{"id":"modelperm-f08c2e6b1d5a48bf91d7e3c5a2b4f6e8","object":"model_permission","created":1738368000,"allow_create_engine":false,"allow_sampling":true,"allow_logprobs":true,"allow_search_indices":false,"allow_view":true,"allow_fine_tuning":false,"organization":"*","group":null,"is_blocking":false}]}]}

  # 4. POST /v1/chat/completions — LLM-powered completion
  - regex: "^/v1/chat/completions$"
    plugin: "LLMHoneypot"
    headers:
      - "Content-Type: application/json"
      - "Server: vllm/0.6.6"
    statusCode: 200

  # 5. POST /v1/completions — LLM-powered legacy completion
  - regex: "^/v1/completions$"
    plugin: "LLMHoneypot"
    headers:
      - "Content-Type: application/json"
      - "Server: vllm/0.6.6"
    statusCode: 200

  # 6. POST /v1/embeddings — Embedding endpoint (1024 dims, correct model name).
  #    Schema per vllm/entrypoints/openai/protocol.py @ v0.6.6 EmbeddingResponse:
  #      id, object, created, model, data[{index,object,embedding}], usage{...}.
  #    Capture: ../../honeypot-research/tools/oracle-diff/vllm-0.6.6/v1_embeddings.txt
  #    The 1024-float vector below was byte-shape-correct already; only
