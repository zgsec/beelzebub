  # 6b. GET /v1/models/{model_id} — INTENTIONAL DEVIATION from real vLLM 0.6.6
  #     (per-model GET does not exist; only the /v1/models collection). Kept as
  #     a 200 because OpenAI's hosted API DOES expose this and probers test it.
  #     Shape matches the ModelCard schema we serve on /v1/models (parent:null,
  #     populated max_model_len + ModelPermission). Capture:
  #     ../../honeypot-research/tools/oracle-diff/vllm-0.6.6/v1_models_byid.txt
  - regex: "^/v1/models/[^/]+$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      {"id":"meta-llama/Llama-3.1-70B-Instruct","object":"model","created":1738368000,"owned_by":"vllm","root":"meta-llama/Llama-3.1-70B-Instruct","parent":null,"max_model_len":131072,"permission":[{"id":"modelperm-bcef84a4b6f1488f9d7f2c0e3b1a8f5d","object":"model_permission","created":1738368000,"allow_create_engine":false,"allow_sampling":true,"allow_logprobs":true,"allow_search_indices":false,"allow_view":true,"allow_fine_tuning":false,"organization":"*","group":null,"is_blocking":false}]}

  # GET /ping — DEVIATION from real vLLM 0.6.6 (route not registered until
  #   v0.7.x). Kept as 200/empty because /ping is commonly aliased to /health
  #   by reverse proxies in front of vLLM (LB healthchecks, k8s probes); a
  #   prober expecting it from a proxied deployment finds it. TODO: bump
  #   claimed version if /ping becomes a stronger fingerprint vector.
  - regex: "^/ping$"
    headers:
      - "Server: uvicorn"
    statusCode: 200
    handler: ""

  # POST /tokenize — TokenizeResponse schema (count, max_model_len, tokens)
  #   per vllm/entrypoints/openai/protocol.py @ v0.6.6. Llama-3.1 tokenizer
  #   maps "Hello" → [128000, 9906] (BOS + token). max_model_len 131072
  #   matches Llama-3.1-70B-Instruct native context.
  #   Capture: ../../honeypot-research/tools/oracle-diff/vllm-0.6.6/tokenize.txt
  - regex: "^/tokenize$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      {"count":2,"max_model_len":131072,"tokens":[128000,9906]}

  # POST /detokenize — DetokenizeResponse schema (single field: prompt)
  #   per vllm/entrypoints/openai/protocol.py @ v0.6.6.
  #   Capture: ../../honeypot-research/tools/oracle-diff/vllm-0.6.6/detokenize.txt
  - regex: "^/detokenize$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      {"prompt":"Hello"}

  # =========================================================================
  # Phase D Chain D2-1 — CVE-bait: vLLM tokenizer path traversal
  #
  # Designed: docs/strategy/2026-05-13-ws11-phase-d-and-realism.md §2.2
  #
  # Real vLLM has admin endpoints for hot-reloading custom tokenizers.
  # CVE-2024-10973 (and analogous path-traversal vulns) exploit the
  # tokenizer-load path to read arbitrary files. An actor who hits
  # /v1/tokenize/reload demonstrates CVE-awareness — the endpoint is
  # never advertised; only someone probing for vLLM admin surfaces would
  # find it. The response mimics a successful path traversal that leaked
  # /etc/shadow contents as "debug_output" alongside the reload status.
  #
  # Canary: VLLM_CVE_SHADOW_PASS — shadow-file password hash. Fire signal
  # is an attacker using the credential, not the HTTP request itself.
  # =========================================================================

  # D2-1: POST /v1/tokenize/reload → fake shadow file leak with canary
  - regex: "^/v1/tokenize/reload$"
    method: POST
    sessionAction: create
    name: "openai/d2-1-tokenizer-reload"
    headers:
      - "Content-Type: application/json; charset=utf-8"
      - "Server: vllm/0.6.6"
    statusCode: 200
    handler: '{"status":"reloaded","tokenizer":"custom","path_resolved":"/models/default/tokenizer.json","reload_time_ms":847,"debug_output":"# /etc/shadow (resolved via tokenizer path — this is a bug, file VLLM-4891)\nroot:!:19756:0:99999:7:::\ndaemon:*:19756:0:99999:7:::\napp:${VLLM_CVE_SHADOW_PASS}:19891:0:99999:7:::\npostgres:!:19756:0:99999:7:::\nnobody:*:19756:0:99999:7:::","warning":"tokenizer reload succeeded but path resolution traversed outside model directory — internal issue VLLM-4891 tracked"}'

  # D2-1: GET /v1/tokenize/reload → 405
  - regex: "^/v1/tokenize/reload$"
    method: GET
    name: "openai/d2-1-method-gate-reload"
    headers:
      - "Allow: POST"
      - "Content-Type: application/json; charset=utf-8"
      - "Server: vllm/0.6.6"
    statusCode: 405
    handler: '{"detail":"Method Not Allowed"}'

  # 7. GET /debug/config — INTENTIONAL DEVIATION from real vLLM 0.6.6
  #    (no /debug/config route exists upstream — real vLLM 404s this path).
  #    This is a hand-crafted config-dump lure carrying the VLLM_ENV canary
  #    pair in the env block (natural channel: real ML-platform debug pages
  #    routinely surface AWS env vars). The `infrastructure` sub-block
  #    references mlflow indirectly via the cross-service mlflow_tracking
  #    refs we added — vLLM itself does not emit this block, but a custom
  #    debug-middleware wrapping vLLM would. Capture-first decision:
  #    keep this handler as a research surface; it is documented as a
  #    deviation in the YAML header (NOT in the real-vLLM-handler list).
  #    Real-vLLM-only fields like `tensor_parallel_size` / `dtype` /
  #    `max_model_len` are kept because they're documented Engine config
  #    fields a debug middleware would dump; `enable_auto_tool_choice`
  #    and `tool_call_parser` are CLI-flag-only (never in any real JSON
  #    response) and have been removed to reduce fingerprint.
  - regex: "^/debug/config$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
