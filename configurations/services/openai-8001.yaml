  # =========================================================================
  # Phase D Chain D2-1 — CVE-bait: vLLM tokenizer path traversal
  #
  # Designed: docs/strategy/2026-05-13-ws11-phase-d-and-realism.md §2.2
  #
  # Real vLLM has admin endpoints for hot-reloading custom tokenizers.
  # CVE-2024-10973 (and analogous path-traversal vulns) exploit the
  # tokenizer-load path to read arbitrary files. An actor who hits
  # /v1/tokenize/reload demonstrates CVE-awareness — the endpoint is
  # never advertised; only someone probing for vLLM admin surfaces would
  # find it. The response mimics a successful path traversal that leaked
  # /etc/shadow contents as "debug_output" alongside the reload status.
  #
  # Canary: VLLM_CVE_SHADOW_PASS — shadow-file password hash. Fire signal
  # is an attacker using the credential, not the HTTP request itself.
  # =========================================================================

  # D2-1: POST /v1/tokenize/reload → fake shadow file leak with canary
  - regex: "^/v1/tokenize/reload$"
    method: POST
    sessionAction: create
    name: "openai/d2-1-tokenizer-reload"
    headers:
      - "Content-Type: application/json; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"status":"reloaded","tokenizer":"custom","path_resolved":"/models/default/tokenizer.json","reload_time_ms":847,"debug_output":"# /etc/shadow (resolved via tokenizer path — this is a bug, file VLLM-4891)\nroot:!:19756:0:99999:7:::\ndaemon:*:19756:0:99999:7:::\napp:${VLLM_CVE_SHADOW_PASS}:19891:0:99999:7:::\npostgres:!:19756:0:99999:7:::\nnobody:*:19756:0:99999:7:::","warning":"tokenizer reload succeeded but path resolution traversed outside model directory — internal issue VLLM-4891 tracked"}'

  # D2-1: GET /v1/tokenize/reload → 405
  - regex: "^/v1/tokenize/reload$"
    method: GET
    name: "openai/d2-1-method-gate-reload"
    headers:
      - "Allow: POST"
      - "Content-Type: application/json; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 405
    handler: '{"detail":"Method Not Allowed"}'

  # 7. GET /debug/config — Configuration dump (canary target)
  - regex: "^/debug/config$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      {"model":"meta-llama/Llama-3.1-70B-Instruct","tensor_parallel_size":1,"gpu_memory_utilization":0.9,"max_model_len":4096,"served_model_name":null,"host":"0.0.0.0","port":8000,"trust_remote_code":true,"download_dir":"/models","hugging_face_hub_token":"","dtype":"auto","enable_auto_tool_choice":true,"tool_call_parser":"hermes","env":{"AWS_ACCESS_KEY_ID":"${OPENAI_CANARY_AWS_KEY}","AWS_SECRET_ACCESS_KEY":"${OPENAI_CANARY_AWS_SECRET}","AWS_DEFAULT_REGION":"us-east-2","S3_MODEL_CACHE":"s3://ml-models-prod.${OPENAI_CANARY_DNS}/cache","CUDA_VISIBLE_DEVICES":"0"},"infrastructure":{"ollama_fallback":"http://localhost:11434","monitoring":{"open_webui":"http://localhost:8888"},"database":"postgresql://vllm:@db-primary.${OPENAI_CANARY_DNS}:5432/inference","cache":"redis://{{ persona.coherence.world.hosts.redis_sentinel.hostname }}.{{ persona.coherence.world.company.internal_domain }}:6379/0"}}

  # 8. GET /metrics — Prometheus metrics
  - regex: "^/metrics$"
    headers:
      - "Content-Type: text/plain; version=0.0.4; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      # HELP vllm:num_requests_running Number of requests currently running on GPU.
      # TYPE vllm:num_requests_running gauge
      vllm:num_requests_running{model_name="meta-llama/Llama-3.1-70B-Instruct"} 0
      # HELP vllm:num_requests_waiting Number of requests waiting to be processed.
      # TYPE vllm:num_requests_waiting gauge
      vllm:num_requests_waiting{model_name="meta-llama/Llama-3.1-70B-Instruct"} 0
      # HELP vllm:gpu_cache_usage_perc GPU KV-cache usage. 1 means 100 percent usage.
      # TYPE vllm:gpu_cache_usage_perc gauge
      vllm:gpu_cache_usage_perc{model_name="meta-llama/Llama-3.1-70B-Instruct"} 0.12
      # HELP vllm:num_requests_swapped Number of requests swapped to CPU.
      # TYPE vllm:num_requests_swapped gauge
      vllm:num_requests_swapped{model_name="meta-llama/Llama-3.1-70B-Instruct"} 0
      # HELP vllm:cpu_cache_usage_perc CPU KV-cache usage. 1 means 100 percent usage.
      # TYPE vllm:cpu_cache_usage_perc gauge
      vllm:cpu_cache_usage_perc{model_name="meta-llama/Llama-3.1-70B-Instruct"} 0.0
      # HELP vllm:prompt_tokens_total Number of prefill tokens processed.
      # TYPE vllm:prompt_tokens_total counter
      vllm:prompt_tokens_total{model_name="meta-llama/Llama-3.1-70B-Instruct"} 48372
      # HELP vllm:generation_tokens_total Number of generation tokens processed.
      # TYPE vllm:generation_tokens_total counter
      vllm:generation_tokens_total{model_name="meta-llama/Llama-3.1-70B-Instruct"} 21847

  # =========================================================================
  # AI Scanner Lures — Prompt Injection Honeypot
  # =========================================================================
  # Added: 2026-02-26

  # Tier 1: OpenAI plugin manifest — only AI agents/frameworks probe this
  - regex: "^/\\.well-known/ai-plugin\\.json$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
