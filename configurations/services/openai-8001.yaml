# =============================================================================
# OpenAI-Compatible API Honeypot — Port 8001 (Fully Static, No LLM)
# =============================================================================
#
# PERSONA: vLLM / LiteLLM proxy serving OpenAI-compatible API
#   Mimics an exposed inference server with no authentication.
#   Port 8000 is the default for vLLM, LiteLLM, FastChat, and similar.
#
# DESIGN: 100% static handlers. Captures LLMjacking validation attempts,
#   model enumeration, and compute theft probes via OpenAI schema.
#
# CANARY TOKENS:
#   AWS Key:  ${OPENAI_CANARY_AWS_KEY}  (canarytokens.org — fires on AWS API call)
#   AWS Key (ml-training): ${OPENAI_CANARY_AWS_KEY_ML}  (separate ml-training profile)
#   DNS:      ${OPENAI_CANARY_DNS} (fires on resolution)
#   Location: Embedded across all credential-leak endpoints
#
# Updated: 2026-03-06 v2 — realism overhaul, real vLLM error schemas
# =============================================================================

apiVersion: "v1"
protocol: "http"
address: ":8001"
description: "OpenAI-compatible inference API"
commands:
  # 1. GET /health — Health check (real vLLM returns empty 200)
  - regex: "^/health$"
    headers:
      - "Server: uvicorn"
      - "X-Platform: Crestfield Platform v3.12.1-rc1"
    statusCode: 200
    handler: ""

  # 2. GET /version — Real vLLM has no /version endpoint
  - regex: "^/version$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 404
    handler: |
      {"detail":"Not Found"}

  # MCP discovery — points scanners to the real MCP honeypot on :8000
  - regex: "^/\\.well-known/mcp\\.json$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-Platform: Crestfield Platform v3.12.1-rc1"
    statusCode: 200
    handler: '{"mcpServers":{"crestfield-platform":{"url":"http://localhost:8000/mcp","transport":"streamable-http","description":"Crestfield Platform v3.12.1-rc1 — DevOps coordination, IAM, logging, config store","capabilities":["tools","resources"],"alternateTransport":{"url":"http://localhost:8000/sse","transport":"sse"}}}}'

  # 3. GET /v1/models — Model listing (with permission array like real vLLM)
  - regex: "^/v1/models$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-Platform: Crestfield Platform v3.12.1-rc1"
    statusCode: 200
    handler: |
      {"object":"list","data":[{"id":"meta-llama/Llama-3.1-70B-Instruct","object":"model","created":1738368000,"owned_by":"vllm","root":"meta-llama/Llama-3.1-70B-Instruct","permission":[{}]},{"id":"meta-llama/Llama-3.1-8B-Instruct","object":"model","created":1738368000,"owned_by":"vllm","root":"meta-llama/Llama-3.1-8B-Instruct","permission":[{}]},{"id":"BAAI/bge-large-en-v1.5","object":"model","created":1738368000,"owned_by":"vllm","root":"BAAI/bge-large-en-v1.5","permission":[{}]}]}

  # 4. POST /v1/chat/completions — LLM-powered completion
  - regex: "^/v1/chat/completions$"
    plugin: "LLMHoneypot"
    headers:
      - "Content-Type: application/json"
      - "Server: vllm/0.6.6"
    statusCode: 200

  # 5. POST /v1/completions — LLM-powered legacy completion
  - regex: "^/v1/completions$"
    plugin: "LLMHoneypot"
    headers:
      - "Content-Type: application/json"
      - "Server: vllm/0.6.6"
    statusCode: 200

