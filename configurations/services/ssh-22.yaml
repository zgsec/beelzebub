apiVersion: "v1"
protocol: "ssh"
address: ":22"
description: "SSH interactive"
commands:
  - regex: "^ls$"
    handler: "snap  .bashrc  .profile  .ssh  .docker  .kube  .local  .cache"
  - regex: "^pwd$"
    handler: "/root"
  - regex: "^uname -m$"
    handler: "x86_64"
  - regex: "^docker ps$"
    handler: "CONTAINER ID   IMAGE     COMMAND   CREATED   STATUS    PORTS     NAMES"
  - regex: "^docker .*$"
    handler: "Error response from daemon: dial unix docker.raw.sock: connect: connection refused"
  - regex: "^uname$"
    handler: "Linux"
  - regex: "^ps$"
    handler: "  PID TTY          TIME CMD\n    1 ?        00:00:03 /sbin/init\n  842 ?        00:00:12 /usr/bin/dockerd\n  903 ?        00:00:05 containerd\n 1247 pts/0    00:00:00 bash"
  - regex: "^whoami$"
    handler: "root"
  - regex: "^id$"
    handler: "uid=0(root) gid=0(root) groups=0(root)"
  - regex: "^hostname$"
    handler: "web-prod-03"
  - regex: "^uname -a$"
    handler: "Linux web-prod-03 5.15.0-91-generic #101-Ubuntu SMP Tue Nov 14 13:30:08 UTC 2023 x86_64 x86_64 x86_64 GNU/Linux"
  - regex: "^cat /etc/passwd"
    handler: "root:x:0:0:root:/root:/bin/bash\ndaemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin\nbin:x:2:2:bin:/bin:/usr/sbin/nologin\nsys:x:3:3:sys:/dev:/usr/sbin/nologin\nsync:x:4:65534:sync:/bin:/bin/sync\ngames:x:5:60:games:/usr/games:/usr/sbin/nologin\nman:x:6:12:man:/var/cache/man:/usr/sbin/nologin\nlp:x:7:7:lp:/var/spool/lpd:/usr/sbin/nologin\nmail:x:8:8:mail:/var/mail:/usr/sbin/nologin\nnews:x:9:9:news:/var/spool/news:/usr/sbin/nologin\nuucp:x:10:10:uucp:/var/spool/uucp:/usr/sbin/nologin\nproxy:x:13:13:proxy:/bin:/usr/sbin/nologin\nwww-data:x:33:33:www-data:/var/www:/usr/sbin/nologin\nbackup:x:34:34:backup:/var/backups:/usr/sbin/nologin\nlist:x:38:38:Mailing List Manager:/var/list:/usr/sbin/nologin\nnobody:x:65534:65534:nobody:/nonexistent:/usr/sbin/nologin\nsystemd-network:x:100:102:systemd Network Management,,,:/run/systemd:/usr/sbin/nologin\nsshd:x:110:65534::/run/sshd:/usr/sbin/nologin\nubuntu:x:1000:1000:Ubuntu:/home/ubuntu:/bin/bash"
  - regex: "^cat /etc/os-release"
    handler: "PRETTY_NAME=\"Ubuntu 22.04.4 LTS\"\nNAME=\"Ubuntu\"\nVERSION_ID=\"22.04\"\nVERSION=\"22.04.4 LTS (Jammy Jellyfish)\"\nVERSION_CODENAME=jammy\nID=ubuntu\nID_LIKE=debian\nHOME_URL=\"https://www.ubuntu.com/\"\nSUPPORT_URL=\"https://help.ubuntu.com/\"\nBUG_REPORT_URL=\"https://bugs.launchpad.net/ubuntu/\""
  - regex: "^ip addr"
    handler: "1: lo: <LOOPBACK,UP,LOWER_UP> mtu 65536 qdisc noqueue state UNKNOWN group default qlen 1000\n    link/loopback 00:00:00:00:00:00 brd 00:00:00:00:00:00\n    inet 127.0.0.1/8 scope host lo\n       valid_lft forever preferred_lft forever\n2: eth0: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500 qdisc fq_codel state UP group default qlen 1000\n    link/ether 02:42:ac:11:00:02 brd ff:ff:ff:ff:ff:ff\n    inet 10.0.1.100/24 brd 10.0.1.255 scope global eth0\n       valid_lft forever preferred_lft forever"
  - regex: "^ifconfig"
    handler: "eth0: flags=4163<UP,BROADCAST,RUNNING,MULTICAST>  mtu 1500\n        inet 10.0.1.100  netmask 255.255.255.0  broadcast 10.0.1.255\n        ether 02:42:ac:11:00:02  txqueuelen 0  (Ethernet)\n        RX packets 8421937  bytes 12847293847 (12.8 GB)\n        TX packets 5928471  bytes 894728194 (894.7 MB)"
  - regex: "^(cat /etc/shadow|cat /etc/sudoers)"
    handler: "cat: /etc/shadow: Permission denied"
  - regex: "^curl"
    handler: "curl: (7) Failed to connect to localhost port 80: Connection refused"
  - regex: "^wget"
    handler: "wget: unable to resolve host address"
  - regex: "^(uptime|uptime -p)"
    handler: "up 23 days, 0 hours, 14 minutes"
  - regex: "^free"
    handler: "               total        used        free      shared  buff/cache   available\nMem:         4028416     1847392      284736       12480     1896288     1923648\nSwap:        2097148      524288     1572860"
  - regex: "^df"
    handler: "Filesystem     1K-blocks    Used Available Use% Mounted on\n/dev/sda1       51474044 18247832  30587548  38% /\ntmpfs            2014208        0   2014208   0% /dev/shm\n/dev/sda15        106858     6186    100672   6% /boot/efi"
  - regex: "^env$"
    handler: "SHELL=/bin/bash\nPATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin\nHOME=/root\nLOGNAME=root\nUSER=root\nLANG=en_US.UTF-8\nOLLAMA_HOST=http://localhost:11434\nDOCKER_HOST=unix:///var/run/docker.sock"
  - regex: "^w$"
    handler: " 14:23:07 up 23 days,  0:14,  1 user,  load average: 0.42, 0.38, 0.31\nUSER     TTY      FROM             LOGIN@   IDLE   JCPU   PCPU WHAT\nroot     pts/0    10.0.1.1         14:22    0.00s  0.01s  0.00s w"
  - regex: "^(.+)$"
    handler: "command not found"
serverVersion: "OpenSSH_8.9p1 Ubuntu-3ubuntu0.10"
serverName: "ubuntu"
passwordRegex: "^(root|qwerty|Smoker666|123456|jenkins|minecraft|sinus|alex|postgres|Ly123456)$"
deadlineTimeoutSeconds: 300