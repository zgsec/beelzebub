apiVersion: "v1"
protocol: "http"
address: ":8042"
description: "ScreenConnect Remote Support — Crestfield Data GmbH"
serviceType: "screenconnect"

state:
  cookieName: ".ASPXAUTH"
  ttlSeconds: 1800
  artifactPath: "/var/lib/beelzebub/artifacts/screenconnect"
  artifactMaxBytes: 52428800  # 50 MiB

commands:
  # ---- recon ------------------------------------------------------------

  - regex: "^/$"
    method: "GET"
    statusCode: 302
    name: "screenconnect/recon"
    headers:
      - "Location: /Login.aspx"
      - "Server: ScreenConnect/23.9.7"
    handler: ""

  - regex: "^/Login\\.aspx$"
    method: "GET"
    statusCode: 200
    name: "screenconnect/recon"
    headers:
      - "Server: ScreenConnect/23.9.7"
      - "X-Powered-By: ASP.NET"
      - "Content-Type: text/html; charset=utf-8"
    handler: |
      <!DOCTYPE html><html lang="en"><head>
      <meta charset="utf-8"><title>ScreenConnect Login</title></head>
      <body><form method="post" action="Login.aspx" id="form1">
      <input type="hidden" name="__VIEWSTATE" id="__VIEWSTATE" value="/wEPDwUKMTQ2NTExNjI1Mg9kFgJmD2QWAgIBD2QWAgIBD2QWAmYPZBYCAgEPZBYCAgEPZBYWNg==" />
      <input type="hidden" name="__VIEWSTATEGENERATOR" id="__VIEWSTATEGENERATOR" value="CA0B0334" />
      <input type="hidden" name="__EVENTVALIDATION" id="__EVENTVALIDATION" value="/wEdAAUw" />
      <div class="login-box"><div class="brand">ScreenConnect</div>
      <input type="text" name="ctl00$Main$loginPanel$userNameBox" placeholder="Username">
      <input type="password" name="ctl00$Main$loginPanel$passwordBox" placeholder="Password">
      <input type="submit" name="ctl00$Main$loginPanel$loginButton" value="Login">
      <div class="footer">ScreenConnect 23.9.7 &middot; Crestfield Data GmbH</div>
      </div></form></body></html>

  - regex: "^/SetupWizard\\.aspx/?$"
    method: "GET"
    statusCode: 200
    name: "screenconnect/recon"
    headers:
      - "Server: ScreenConnect/23.9.7"
      - "X-Powered-By: ASP.NET"
      - "Content-Type: text/html; charset=utf-8"
    handler: |
      <!DOCTYPE html><html lang="en"><head>
      <meta charset="utf-8"><title>Welcome - ScreenConnect</title></head>
      <body><form method="post" action="SetupWizard.aspx" id="form1">
      <input type="hidden" name="__VIEWSTATE" id="__VIEWSTATE" value="/wEPDwUKMTQ2NTExNjI1Mg9kFgJmD2QWAgIBD2QWAgIBD2QWAmYPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYCAgEPZBYWNg==" />
      <input type="hidden" name="__VIEWSTATEGENERATOR" id="__VIEWSTATEGENERATOR" value="CA0B0334" />
      <input type="hidden" name="__EVENTVALIDATION" id="__EVENTVALIDATION" value="/wEdAAUw" />
      <h1>Welcome to ScreenConnect Setup</h1>
      <p>Configure your administrator account.</p>
      <input type="text" name="ctl00$Main$wizard$userNameBox" placeholder="Username" />
      <input type="password" name="ctl00$Main$wizard$passwordBox" placeholder="Password" />
      <input type="password" name="ctl00$Main$wizard$verifyPasswordBox" placeholder="Verify Password" />
      <input type="email" name="ctl00$Main$wizard$emailBox" placeholder="Email" />
      <input type="submit" name="ctl00$Main$wizard$nextButton" value="Next" />
      </form>
      <div class="footer">ScreenConnect 23.9.7 &middot; Crestfield Data GmbH</div>
      </body></html>

  # ---- auth_bypass (CVE-2024-1709) -------------------------------------

  - regex: "^/SetupWizard\\.aspx/.*$"
    method: "POST"
    statusCode: 302
    name: "screenconnect/auth_bypass"
    sessionAction: "create"
    sessionCapture:
      # ASP.NET WebForms postback field names from real CVE-2024-1709 exploits.
      # Operators send application/x-www-form-urlencoded with these field names
      # (Metasploit + jhonnybonny + W01fh4cker PoCs all use this exact form).
      "screenconnect.operator_user": 'userNameBox=([^&]+)'
      "screenconnect.operator_pass": 'passwordBox=([^&]+)'
      # Drop operator_role — real exploit form has no Role field.
    headers:
      - "Server: ScreenConnect/23.9.7"
      - "Location: /Host#"
    handler: ""

  # ---- enum -------------------------------------------------------------

  - regex: "^/Host$"
    method: "GET"
    statusCode: 200
    name: "screenconnect/enum"
    sessionAction: "require"
    headers:
      - "Server: ScreenConnect/23.9.7"
      - "X-Powered-By: ASP.NET"
      - "Content-Type: text/html; charset=utf-8"
    handler: |
      <!DOCTYPE html><html><head><title>ScreenConnect — Host</title></head>
      <body><div class="top">ScreenConnect &middot; All Machines</div>
      <iframe src="/Configure"></iframe></body></html>

  - regex: "^/Administration$"
    method: "GET"
    statusCode: 200
    name: "screenconnect/admin_panel"
    sessionAction: "require"
    headers:
      - "Server: ScreenConnect/23.9.7"
      - "X-Powered-By: ASP.NET"
      - "Content-Type: text/html; charset=utf-8"
    handler: |
      <!DOCTYPE html><html><head><title>Administration - ScreenConnect</title></head>
      <body><div class="top">ScreenConnect &middot; Administration</div>
      <iframe src="/Configure"></iframe></body></html>

  # ---- agent_view -------------------------------------------------------

  - regex: "^/Services/PageService\\.ashx/GetSessionDetails$"
    method: "POST"
    statusCode: 200
    name: "screenconnect/agent_view"
    sessionAction: "require"
    headers:
      - "Server: ScreenConnect/23.9.7"
      - "X-Powered-By: ASP.NET"
      - "Content-Type: application/json"
    handler: |
      {"SessionID":"a1b2c3d4-0003-4000-8000-000000000003","Hostname":"MULLER-DC01","OS":"Windows Server 2022","Organization":"Müller Fertigung GmbH","Online":true,"ConnectedSince":"2026-04-30T10:00:00Z"}

  # ---- extension_upload (CVE-2024-1708) — the prize --------------------

  - regex: "^/Services/ExtensionService\\.ashx/InstallExtension$"
    method: "POST"
    statusCode: 200
    name: "screenconnect/extension_upload"
    sessionAction: "require"
    artifactCapture: true
    headers:
      - "Server: ScreenConnect/23.9.7"
      - "X-Powered-By: ASP.NET"
      - "Content-Type: application/json"
    handler: '{"Success":true,"ExtensionID":"ext-${session.short}"}'

  - regex: "^/Services/ExtensionService\\.ashx/UninstallExtension$"
    method: "POST"
    statusCode: 200
    name: "screenconnect/extension_cleanup"
    sessionAction: "require"
    headers:
      - "Server: ScreenConnect/23.9.7"
      - "X-Powered-By: ASP.NET"
      - "Content-Type: application/json"
    handler: '{"Success":true}'

  # ---- run_command ------------------------------------------------------

  - regex: "^/Services/PageService\\.ashx/RunCommand$"
    method: "POST"
    statusCode: 200
    name: "screenconnect/run_command"
    sessionAction: "require"
    headers:
      - "Server: ScreenConnect/23.9.7"
      - "X-Powered-By: ASP.NET"
      - "Content-Type: application/json"
    handler: '{"Status":"Queued","CommandID":"cmd-${session.short}"}'

  # ---- misc -------------------------------------------------------------

  - regex: "^/Configure/Extensions$"
    method: "GET"
    statusCode: 200
    name: "screenconnect/enum"
    sessionAction: "require"
    headers:
      - "Server: ScreenConnect/23.9.7"
      - "X-Powered-By: ASP.NET"
      - "Content-Type: application/json"
    handler: '{"extensions":[]}'

fallbackCommand:
  statusCode: 404
  headers:
    - "Server: ScreenConnect/23.9.7"
  handler: "Not Found"
