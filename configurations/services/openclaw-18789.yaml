      - "Server: openclaw-gateway"
      - "WWW-Authenticate: Bearer realm=\"openclaw-hooks\""
      - "Cache-Control: no-store"
    statusCode: 401
    handler: |
      {"error":{"message":"Unauthorized hook","type":"auth_error","code":"invalid_hook_token"}}

  - regex: "^/hooks/[^/]+$"
    headers:
      - "Content-Type: application/json"
      - "Server: openclaw-gateway"
      - "WWW-Authenticate: Bearer realm=\"openclaw-hooks\""
      - "Cache-Control: no-store"
    statusCode: 401
