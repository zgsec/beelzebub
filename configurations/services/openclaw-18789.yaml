      - "Server: openclaw-gateway"
      - "Cache-Control: no-store"
    statusCode: 200
    handler: |
      {"sessions":[{"id":"sess-4a7f","agent_id":"agent-main","started":"2026-02-07T16:22:00Z","messages":23,"status":"active"},{"id":"sess-b3c1","agent_id":"agent-main","started":"2026-02-06T09:15:00Z","messages":8,"status":"completed"},{"id":"sess-e9d2","agent_id":"agent-code","started":"2026-02-05T11:40:00Z","messages":45,"status":"completed"}]}

  # =========================================================================
  # Auth-Gated Endpoints — 401 Unauthorized
  # =========================================================================
  - regex: "^/tools/invoke$"
    headers:
      - "Content-Type: application/json"
      - "Server: openclaw-gateway"
      - "WWW-Authenticate: Bearer realm=\"openclaw\""
      - "Cache-Control: no-store"
    statusCode: 401
    handler: |
