  - regex: "^/opt/openclaw/config/openclaw\\.json$"
    headers:
      - "Content-Type: application/json"
      - "Server: openclaw-gateway/2.0.1-enterprise"
      - "X-Ghost-Endpoint: config-file-traversal"
    statusCode: 200
    handler: '{"service":"openclaw-gateway","version":"2.0.1-enterprise","auth":{"mode":"schema_handshake","jwt_secret":"xK9mN2pR5sT8vW1yA4bC7dE0fG3hI6jK","token_ttl_s":3600},"database":{"host":"pg-openclaw.${OPENCLAW_CANARY_DNS}","port":5432,"name":"openclaw_prod","username":"openclaw_svc","password":"Vp7kNx2qLm"},"aws":{"access_key_id":"${OPENCLAW_CANARY_AWS_KEY}","secret_access_key":"${OPENCLAW_CANARY_AWS_SECRET}","region":"us-east-2","s3_bucket":"openclaw-backups"},"mcp":{"transport":"sse","protocol_version":"2024-11-05"},"connected_services":{"vllm":"http://gpu-worker-01.internal.corp:8000","ollama":"http://localhost:11434","docker_registry":"registry.internal.corp:5000","vault":"http://infra-vault-agent.internal.corp:8200"},"agents":{"max_registered":100,"reasoning_parity_threshold":0.95,"sandbox_enabled":true}}'

  # =========================================================================
  # Catch-all — Static 404 (MUST be last)
  # =========================================================================
  - regex: "^.*$"
    headers:
      - "Content-Type: application/json"
      - "Server: openclaw-gateway"
      - "Cache-Control: no-store"
    statusCode: 404
    handler: |
      {"error":{"message":"Not Found","type":"not_found","code":"unknown_endpoint"}}
