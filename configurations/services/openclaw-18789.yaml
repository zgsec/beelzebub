  # =========================================================================
  # Config Endpoint — Canary-Instrumented Auth Bypass Bait
  # =========================================================================
  # Crown jewel: attackers who reach config.get are looking for API keys
  # and credentials. We give them canary-instrumented ones.
  - regex: "^/config$"
