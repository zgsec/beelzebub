      # TYPE promhttp_metric_handler_requests_total counter
      promhttp_metric_handler_requests_total{code="200"} 0
      promhttp_metric_handler_requests_total{code="500"} 0
      promhttp_metric_handler_requests_total{code="503"} 0
    headers:
      - "Content-Type: text/plain; version=0.0.4; charset=utf-8"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # ---------------------------------------------------------------------------
  # Catch-all — real Influx 1.8.10 returns 404 + "404 page not found"
  # plain text with X-Content-Type-Options: nosniff (captured shape).
  # Covers `/`, `/api/v2/buckets`, `/foo/bar`, anything not above.
  # ---------------------------------------------------------------------------
  - regex: ".*"
    handler: '404 page not found'
    headers:
      - "Content-Type: text/plain; charset=utf-8"
      - "X-Content-Type-Options: nosniff"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "Server: InfluxDB/1.8.10"
    statusCode: 404
