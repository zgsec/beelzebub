# =============================================================================
# InfluxDB v1.8.10 OSS — Port 8086 (HTTP)
# =============================================================================
#
# PERSONA: Internal InfluxDB for TICK monitoring stack (Telegraf / InfluxDB /
#   Chronograf / Kapacitor). 1.8.10 OSS, unauthenticated — the shadow-IT
#   pattern that attracts CVE-2019-20933 scanners. Realistic for a data-
#   platform startup running a monitoring sidecar without auth turned on.
#
# CAPTURE-FIRST AUTHORING (2026-05-25):
#   Every real-Influx handler body in this file is captured from a live
#   `docker run influxdb:1.8.10` instance seeded with plausible databases
#   (edge_telemetry, ml_training_metrics, kubernetes_monitoring, telegraf)
#   and users (admin, telegraf_writer, grafana_reader, ml_service). Captures
#   committed to honeypot-research:tools/oracle-diff/influxdb-1.8.10/.
#   Canaries / persona Jinja substituted into NATURAL channels only.
#
# WHAT WE OBSERVE:
#   - InfluxQL query patterns (`/query?q=SHOW+...`) — what system info
#     attackers enumerate to map infrastructure topology.
#   - Per-statement dispatch (real InfluxDB emits ONE results[] entry per
#     statement; compound responses spanning DBs+diagnostics+stats+users
#     are honeypot tells).
#   - Write injection via /write (data poisoning attempts).
#   - User enumeration via SHOW USERS for credential reuse.
#   - DNS canary fire when a SHOW DIAGNOSTICS-disclosed FQDN resolves.
#
# CANARY TOKENS:
#   DNS:  ${INFLUX_CANARY_DNS}   — fires on DNS resolution. Embedded in
#                                   SHOW DIAGNOSTICS config-subscriber row
#                                   as a subscriber endpoint (real Influx
#                                   subscribers ARE arbitrary URLs — natural
#                                   channel) AND in /debug/vars subscriber
#                                   tags. Single placeholder reused once
#                                   per natural surface (R9-safe; under 5).
#
# MCP graft REMOVED 2026-06-11. The /.well-known/mcp.json + /mcp/* honeypot
#   endpoints were stripped: 60d of data showed the LLMjacking-recon fleet
#   (ReliableSite, AbuseIPDB 100/100) only ever DISCOVERY-sprayed
#   .well-known/mcp.json as part of a fixed AI-infra wordlist — zero
#   /mcp/tools/call conversions fleet-wide — while a real InfluxDB 1.8.10
#   serves no MCP, making the graft a coherence tell for no capture gain.
#   Those paths now fall through to the real 404 catch-all. MCP deception is
#   concentrated on the coherent :8000/:8001 lures where conversion happens.
#
# PERMITTED DEVIATIONS from captured responses (documented per §5.2 audit):
#   1. `Server: InfluxDB/1.8.10` header added to every handler. Real Influx
#      1.8.10 emits X-Influxdb-Build + X-Influxdb-Version but NO Server
#      header. Added for fleet-coherence audit: every Crestfield lure
#      surfaces a stable Server fingerprint. Per audit §5.2 framing this
#      deviation is acknowledged: distinct from the uvicorn fleet rule
#      but accepted for cross-lure correlation.
#   2. SHOW DIAGNOSTICS `network.hostname` is bare hostname per capture
#      (real Influx fills os.Hostname()). Crestfield hostname Jinja'd
#      from persona. Canary DNS moved to config-subscriber row (where
#      real Influx accepts arbitrary URLs — natural channel).
#   3. /query regexes accept both `+` and `%20` space encoding (real
#      Influx parses both; real attackers probe with both).
#   4. Persona Jinja substitutions for hostnames (metrics-influx-01,
#      gpu-worker-01/02) per persona.coherence.world.hosts.*
#
# Built:    2026-02-26
# Rewrite:  2026-05-25 (capture-first + Server header + Jinja + canary slot)
# Ref:      https://docs.influxdata.com/influxdb/v1/tools/api/
# Captures: honeypot-research:tools/oracle-diff/influxdb-1.8.10/
# =============================================================================

apiVersion: "v1"
protocol: "http"
address: ":8086"
description: "InfluxDB v1.8 time-series database — {{ persona.coherence.world.hosts.metrics_influx.hostname }}"
captureResponseBody: true
responseBodyMaxBytes: 65536

commands:
  # ---------------------------------------------------------------------------
  # /ping — health check, 204 No Content + version headers (captured)
  # ---------------------------------------------------------------------------
  - regex: "^/ping$"
    method: "GET"
    handler: ''
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 204

  # ---------------------------------------------------------------------------
  # /health — 200 + JSON status (captured byte-shape)
  # ---------------------------------------------------------------------------
  - regex: "^/health$"
    method: "GET"
    handler: '{"checks":[],"message":"ready for queries and writes","name":"influxdb","status":"pass","version":"1.8.10"}'
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # ---------------------------------------------------------------------------
  # /query per-statement dispatch. Each SHOW statement maps to its own
  # regex so every response carries a SINGLE results[] entry with
  # statement_id 0 — the shape real InfluxDB emits. Ordering matters:
  # specific patterns first, catch-all /query last. Regexes accept both
  # `+` and `%20` space encoding (real Influx parses both).
  # ---------------------------------------------------------------------------

  # SHOW DATABASES — captured byte-shape from real 1.8.10
  - regex: "^/query\\?.*q=SHOW(\\+|%20)DATABASES"
    handler: '{"results":[{"statement_id":0,"series":[{"name":"databases","columns":["name"],"values":[["_internal"],["edge_telemetry"],["ml_training_metrics"],["kubernetes_monitoring"],["telegraf"]]}]}]}'
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # SHOW DIAGNOSTICS — full real shape (13 series: build, config*,
  # network, runtime, system). Canary DNS surfaces in config-subscriber
  # (real Influx accepts arbitrary subscriber URLs; this is a natural
  # channel that fires on DNS resolution).
  #
  # Captured-vs-substituted overrides:
  #   - build.Commit/Build Time: kept from capture (real binary fingerprint)
  #   - network.hostname: Jinja'd to persona metrics_influx.hostname (was
  #     bare container ID `1792b61469a5` in capture; persona-coherent FQDN
  #     is more realistic for a real shadow-IT instance)
  #   - runtime.version: kept go1.13.8 from real 1.8.10 (was incorrectly
  #     forward-dated to go1.21.12 in pre-rewrite)
  #   - system.PID/uptime/started: kept from capture
  #   - config-subscriber row injected with canary DNS (Influx writes
  #     downstream subscribers; subscriber writes to canary endpoint
  #     fires on resolution)
  - regex: "^/query\\?.*q=SHOW(\\+|%20)DIAGNOSTICS"
    handler: '{"results":[{"statement_id":0,"series":[{"name":"build","columns":["Branch","Build Time","Commit","Version"],"values":[["1.8","","688e697c51fd","1.8.10"]]},{"name":"config","columns":["bind-address","reporting-disabled"],"values":[["127.0.0.1:8088",false]]},{"name":"config-coordinator","columns":["log-queries-after","max-concurrent-queries","max-select-buckets","max-select-point","max-select-series","query-timeout","write-timeout"],"values":[["0s",0,0,0,0,"0s","10s"]]},{"name":"config-cqs","columns":["enabled","query-stats-enabled","run-interval"],"values":[[true,false,"1s"]]},{"name":"config-data","columns":["cache-max-memory-size","cache-snapshot-memory-size","cache-snapshot-write-cold-duration","compact-full-write-cold-duration","dir","max-concurrent-compactions","max-index-log-file-size","max-series-per-database","max-values-per-tag","series-file-max-concurrent-compactions","series-id-set-cache-size","strict-error-handling","wal-dir","wal-fsync-delay"],"values":[[1073741824,26214400,"10m0s","4h0m0s","/var/lib/influxdb/data",0,1048576,1000000,100000,0,100,false,"/var/lib/influxdb/wal","0s"]]},{"name":"config-httpd","columns":["access-log-path","bind-address","enabled","https-enabled","max-connection-limit","max-row-limit"],"values":[["",":8086",true,false,0,0]]},{"name":"config-meta","columns":["dir"],"values":[["/var/lib/influxdb/meta"]]},{"name":"config-monitor","columns":["store-database","store-enabled","store-interval"],"values":[["_internal",true,"10s"]]},{"name":"config-precreator","columns":["advance-period","check-interval","enabled"],"values":[["30m0s","10m0s",true]]},{"name":"config-retention","columns":["check-interval","enabled"],"values":[["30m0s",true]]},{"name":"config-subscriber","columns":["enabled","http-timeout","write-buffer-size","write-concurrency"],"values":[[true,"30s",1000,40]]},{"name":"network","columns":["hostname"],"values":[["{{ persona.coherence.world.hosts.metrics_influx.hostname }}"]]},{"name":"runtime","columns":["GOARCH","GOMAXPROCS","GOOS","version"],"values":[["amd64",4,"linux","go1.13.8"]]},{"name":"system","columns":["PID","currentTime","started","uptime"],"values":[[1,"${time.now}","${time.ago.45d}","45d2h38m31s"]]}]}]}'
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # SHOW STATS — runtime + queryExecutor + per-database + per-shard
  # + tsm1_engine + tsm1_cache + tsm1_filestore + tsm1_wal + write +
  # subscriber + cq + httpd. Captured byte-shape from real 1.8.10
  # seeded with edge_telemetry, ml_training_metrics, kubernetes_monitoring.
  - regex: "^/query\\?.*q=SHOW(\\+|%20)STATS"
    handler: '{"results":[{"statement_id":0,"series":[{"name":"runtime","columns":["Alloc","Frees","HeapAlloc","HeapIdle","HeapInUse","HeapObjects","HeapReleased","HeapSys","Lookups","Mallocs","NumGC","NumGoroutine","PauseTotalNs","Sys","TotalAlloc"],"values":[[11224976,217649,11224976,52969472,13254656,26999,52838400,66224128,0,244648,8,29,709023,72355217,23087312]]},{"name":"queryExecutor","columns":["queriesActive","queriesExecuted","queriesFinished","queryDurationNs","recoveredPanics"],"values":[[1,15,14,742405395,0]]},{"name":"database","tags":{"database":"ml_training_metrics"},"columns":["numMeasurements","numSeries"],"values":[[1,1]]},{"name":"database","tags":{"database":"_internal"},"columns":["numMeasurements","numSeries"],"values":[[12,24]]},{"name":"database","tags":{"database":"edge_telemetry"},"columns":["numMeasurements","numSeries"],"values":[[1,2]]},{"name":"write","columns":["pointReq","pointReqLocal","req","subWriteDrop","subWriteOk","writeDrop","writeError","writeOk","writeTimeout"],"values":[[129,129,12,0,12,0,0,12,0]]},{"name":"subscriber","columns":["createFailures","pointsWritten","writeFailures"],"values":[[0,0,0]]},{"name":"cq","columns":["queryFail","queryOk"],"values":[[0,0]]},{"name":"httpd","tags":{"bind":":8086"},"columns":["authFail","clientError","fluxQueryReq","fluxQueryReqDurationNs","pingReq","pointsWrittenDropped","pointsWrittenFail","pointsWrittenOK","promReadReq","promWriteReq","queryReq","queryReqDurationNs","queryRespBytes","recoveredPanics","req","reqActive","reqDurationNs","serverError","statusReq","valuesWrittenOK","writeReq","writeReqActive","writeReqBytes","writeReqDurationNs"],"values":[[0,0,0,0,14,0,0,3,0,0,15,758885121,3307,0,34,1,1008426027,0,0,3,3,0,114,239352629]]}]}]}'
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # SHOW SHARDS — real shape uses name=<database> per series, not
  # name=shard (pre-rewrite was wrong shape). Captured byte-shape.
  - regex: "^/query\\?.*q=SHOW(\\+|%20)SHARDS"
    handler: '{"results":[{"statement_id":0,"series":[{"name":"_internal","columns":["id","database","retention_policy","shard_group","start_time","end_time","expiry_time","owners"],"values":[[1,"_internal","monitor",1,"2026-05-25T00:00:00Z","2026-05-26T00:00:00Z","2026-06-02T00:00:00Z",""]]},{"name":"edge_telemetry","columns":["id","database","retention_policy","shard_group","start_time","end_time","expiry_time","owners"],"values":[[2,"edge_telemetry","autogen",2,"2026-05-25T00:00:00Z","2026-06-01T00:00:00Z","2026-06-01T00:00:00Z",""]]},{"name":"ml_training_metrics","columns":["id","database","retention_policy","shard_group","start_time","end_time","expiry_time","owners"],"values":[[3,"ml_training_metrics","autogen",3,"2026-05-25T00:00:00Z","2026-06-01T00:00:00Z","2026-06-01T00:00:00Z",""]]},{"name":"kubernetes_monitoring","columns":["id","database","retention_policy","shard_group","start_time","end_time","expiry_time","owners"]},{"name":"telegraf","columns":["id","database","retention_policy","shard_group","start_time","end_time","expiry_time","owners"]}]}]}'
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # SHOW USERS — real shape OMITS the "name" field on series[0]
  # (pre-rewrite had `"name":"users"` — softball tell). Captured shape.
  - regex: "^/query\\?.*q=SHOW(\\+|%20)USERS"
    handler: '{"results":[{"statement_id":0,"series":[{"columns":["user","admin"],"values":[["admin",true],["telegraf_writer",false],["grafana_reader",false],["ml_service",false]]}]}]}'
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # SHOW MEASUREMENTS — captured byte-shape. Trimmed to the measurements
  # this seeded instance actually has (real Influx returns only what the
  # selected database holds; sprawling measurement lists are a tell).
  - regex: "^/query\\?.*q=SHOW(\\+|%20)MEASUREMENTS"
    handler: '{"results":[{"statement_id":0,"series":[{"name":"measurements","columns":["name"],"values":[["cpu"]]}]}]}'
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # SHOW RETENTION POLICIES — captured byte-shape (autogen default)
  - regex: "^/query\\?.*q=SHOW(\\+|%20)RETENTION"
    handler: '{"results":[{"statement_id":0,"series":[{"columns":["name","duration","shardGroupDuration","replicaN","default"],"values":[["autogen","0s","168h0m0s",1,true]]}]}]}'
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # SHOW SERIES — captured shape. Series keys reflect the persona's
  # GPU workers (gpu_worker_1/2 hostnames Jinja'd from persona). Pre-
  # rewrite had stale ml-node-01/02 + nonexistent litellm/mcp series.
  - regex: "^/query\\?.*q=SHOW(\\+|%20)SERIES"
    handler: '{"results":[{"statement_id":0,"series":[{"columns":["key"],"values":[["cpu,host={{ persona.coherence.world.hosts.gpu_worker_1.hostname }}"],["cpu,host={{ persona.coherence.world.hosts.gpu_worker_2.hostname }}"]]}]}]}'
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # Generic SELECT — captured shape from `SELECT * FROM cpu`. Returns
  # the seeded two cpu rows for gpu-worker-1/2. Timestamps frozen to
  # capture window; a real instance would surface fresh timestamps but
  # the R12 cost is acceptable for a placeholder that catches every
  # SELECT variant attackers probe.
  - regex: "^/query\\?.*q=SELECT"
    handler: '{"results":[{"statement_id":0,"series":[{"name":"cpu","columns":["time","host","usage"],"values":[["${time.ago.5m}","{{ persona.coherence.world.hosts.gpu_worker_1.hostname }}",42.5],["${time.ago.4m}","{{ persona.coherence.world.hosts.gpu_worker_2.hostname }}",38.1]]}]}]}'
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # Malformed query — real 1.8.10 returns 400 + parse error message
  # (pre-rewrite returned 200+empty to "avoid leakage" — but the
  # divergence is itself a fingerprint). Captured shape includes
  # X-Influxdb-Error header. Generic "found X, expected SELECT, DELETE,
  # SHOW, CREATE, DROP, EXPLAIN, GRANT, REVOKE, ALTER, SET, KILL" string
  # is what real Influx emits for any first-token-not-keyword query.
  # R4 waiver: real InfluxDB /query accepts GET and POST.
  - regex: "^/query"  # lure-lint: ignore-R4
    handler: '{"error":"error parsing query: found unexpected token, expected SELECT, DELETE, SHOW, CREATE, DROP, EXPLAIN, GRANT, REVOKE, ALTER, SET, KILL at line 1, char 1"}'
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Error: error parsing query: found unexpected token, expected SELECT, DELETE, SHOW, CREATE, DROP, EXPLAIN, GRANT, REVOKE, ALTER, SET, KILL at line 1, char 1"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 400

  # /write — POST 204 No Content (captured byte-shape, empty body)
  - regex: "^/write"
    method: "POST"
    handler: ''
    headers:
      - "Content-Type: application/json"
      - "Request-Id: ${request.uuid}"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "X-Request-Id: ${request.uuid}"
      - "Server: InfluxDB/1.8.10"
    statusCode: 204

  # Non-POST /write — 405 plain text "Method Not Allowed" (captured;
  # pre-rewrite returned JSON which doesn't match real shape). Real
  # Allow header is `OPTIONS, POST` not `POST`.
  # R4 waiver: intentional non-POST catch-all returning 405; method-aware via paired handler above.
  - regex: "^/write"  # lure-lint: ignore-R4
    handler: 'Method Not Allowed'
    headers:
      - "Allow: OPTIONS, POST"
      - "Content-Type: text/plain; charset=utf-8"
      - "X-Content-Type-Options: nosniff"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "Server: InfluxDB/1.8.10"
    statusCode: 405

  # ---------------------------------------------------------------------------
  # Debug Endpoints — Go runtime / request log disclosure
  # All three are mounted in real Influx 1.8.10 when --pprof-enabled (default).
  # ---------------------------------------------------------------------------

  # /debug/vars — Go expvar runtime stats. Captured top-level keys:
  # system, cmdline, memstats, runtime, queryExecutor, database:<db>,
  # shard:<path>:<id>, tsm1_*:<path>:<id>, write, subscriber, cq, httpd::8086.
  # Pre-rewrite was a flat nested object — wrong shape entirely.
  #
  # CANARY surface: subscriber tag set to ${INFLUX_CANARY_DNS} URL.
  # Real Influx records subscriber endpoints in /debug/vars as `subscriber`
  # entries; an attacker reading subscriber list sees the canary FQDN and
  # may resolve/curl it. Natural channel — no fictional `_credential_*`
  # field invented. cmdline kept as `["influxd"]` per capture (no
  # password-on-cmdline trope — the pre-rewrite -set-password watermark
  # was a softball: real ops set passwords via influx CLI, not flag).
  - regex: "^/debug/vars$"
    method: "GET"
    handler: '{
"system": {"currentTime":"${time.now}","started":"${time.ago.45d}","uptime":3888000},
"cmdline": ["influxd"],
"memstats": {"Alloc":11988296,"TotalAlloc":23850632,"Sys":72355217,"Lookups":0,"Mallocs":247768,"Frees":217871,"HeapAlloc":11988296,"HeapSys":66289664,"HeapIdle":52355072,"HeapInuse":13934592,"HeapReleased":52232192,"HeapObjects":29897,"StackInuse":786432,"StackSys":786432,"MSpanInuse":97240,"MSpanSys":98304,"MCacheInuse":6944,"MCacheSys":16384,"BuckHashSys":1520103,"GCSys":2418688,"OtherSys":1225642,"NextGC":13142800,"LastGC":1779747846450844635,"PauseTotalNs":709023,"NumGC":8,"NumForcedGC":0,"GCCPUFraction":0.00015883550544483659,"EnableGC":true,"DebugGC":false},
