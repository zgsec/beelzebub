  # /debug/requests — real Influx returns empty `{}` when not actively
  # collecting (must be started with ?seconds=N query). Pre-rewrite
  # returned a hardcoded fake request log — softball, easily fingerprinted.
  - regex: "^/debug/requests$"
    handler: '{
}'
    headers:
      - "Connection: close"
      - "Content-Type: application/json; charset=utf-8"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # /debug/pprof — captured HTML from real 1.8.10 (with HTML entity
  # encoding `&#61;` and profile descriptions). Pre-rewrite was stripped.
  - regex: "^/debug/pprof/?$"
    handler: |
      <html>
      <head>
      <title>/debug/pprof/</title>
      <style>
      .profile-name{
      	display:inline-block;
      	width:6rem;
      }
      </style>
      </head>
      <body>
      /debug/pprof/<br>
      <br>
      Types of profiles available:
      <table>
      <thead><td>Count</td><td>Profile</td></thead>

      	<tr>
      	<td>24</td><td><a href=allocs?debug&#61;1>allocs</a></td>
      	</tr>

      	<tr>
      	<td>15</td><td><a href=block?debug&#61;1>block</a></td>
      	</tr>

      	<tr>
      	<td>0</td><td><a href=cmdline>cmdline</a></td>
      	</tr>

      	<tr>
      	<td>25</td><td><a href=goroutine?debug&#61;1>goroutine</a></td>
      	</tr>

      	<tr>
      	<td>24</td><td><a href=heap?debug&#61;1>heap</a></td>
      	</tr>

      	<tr>
      	<td>2</td><td><a href=mutex?debug&#61;1>mutex</a></td>
      	</tr>

      	<tr>
      	<td>0</td><td><a href=profile>profile</a></td>
      	</tr>

      	<tr>
      	<td>15</td><td><a href=threadcreate?debug&#61;1>threadcreate</a></td>
      	</tr>

      	<tr>
      	<td>0</td><td><a href=trace>trace</a></td>
      	</tr>

      </table>
      <a href="goroutine?debug=2">full goroutine stack dump</a>
      <br/>
      <p>
      Profile Descriptions:
      <ul>

      <li><div class=profile-name>allocs:</div> A sampling of all past memory allocations</li>

      <li><div class=profile-name>block:</div> Stack traces that led to blocking on synchronization primitives</li>

      <li><div class=profile-name>cmdline:</div> The command line invocation of the current program</li>

      <li><div class=profile-name>goroutine:</div> Stack traces of all current goroutines</li>

      <li><div class=profile-name>heap:</div> A sampling of memory allocations of live objects. You can specify the gc GET parameter to run GC before taking the heap sample.</li>

      <li><div class=profile-name>mutex:</div> Stack traces of holders of contended mutexes</li>

      <li><div class=profile-name>profile:</div> CPU profile. You can specify the duration in the seconds GET parameter. After you get the profile file, use the go tool pprof command to investigate the profile.</li>

      <li><div class=profile-name>threadcreate:</div> Stack traces that led to the creation of new OS threads</li>

      <li><div class=profile-name>trace:</div> A trace of execution of the current program. You can specify the duration in the seconds GET parameter. After you get the trace file, use the go tool trace command to investigate the trace.</li>

      </ul>
      </p>
      </body>
      </html>
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "X-Influxdb-Build: OSS"
      - "X-Influxdb-Version: 1.8.10"
      - "Server: InfluxDB/1.8.10"
    statusCode: 200

  # /metrics — Prometheus exposition. Captured byte-shape (40+ Go runtime
  # + process_* + promhttp metrics). Pre-rewrite had 5 fake metrics —
  # any scanner checking for go_gc_duration_seconds would 0-match.
  - regex: "^/metrics$"
    handler: |
      # HELP go_gc_duration_seconds A summary of the GC invocation durations.
      # TYPE go_gc_duration_seconds summary
      go_gc_duration_seconds{quantile="0"} 3.6908e-05
      go_gc_duration_seconds{quantile="0.25"} 4.1368e-05
      go_gc_duration_seconds{quantile="0.5"} 5.1406e-05
      go_gc_duration_seconds{quantile="0.75"} 0.000134998
      go_gc_duration_seconds{quantile="1"} 0.000164048
      go_gc_duration_seconds_sum 0.000750391
      go_gc_duration_seconds_count 9
      # HELP go_goroutines Number of goroutines that currently exist.
      # TYPE go_goroutines gauge
      go_goroutines 30
      # HELP go_info Information about the Go environment.
      # TYPE go_info gauge
      go_info{version="go1.13.8"} 1
      # HELP go_memstats_alloc_bytes Number of bytes allocated and still in use.
      # TYPE go_memstats_alloc_bytes gauge
      go_memstats_alloc_bytes 7.52032e+06
      # HELP go_memstats_alloc_bytes_total Total number of bytes allocated, even if freed.
      # TYPE go_memstats_alloc_bytes_total counter
      go_memstats_alloc_bytes_total 2.4617184e+07
      # HELP go_memstats_buck_hash_sys_bytes Number of bytes used by the profiling bucket hash table.
      # TYPE go_memstats_buck_hash_sys_bytes gauge
      go_memstats_buck_hash_sys_bytes 1.520543e+06
      # HELP go_memstats_frees_total Total number of frees.
      # TYPE go_memstats_frees_total counter
      go_memstats_frees_total 231072
      # HELP go_memstats_gc_cpu_fraction The fraction of this program's available CPU time used by the GC since the program started.
      # TYPE go_memstats_gc_cpu_fraction gauge
      go_memstats_gc_cpu_fraction 0.00014640951422474112
      # HELP go_memstats_gc_sys_bytes Number of bytes used for garbage collection system metadata.
      # TYPE go_memstats_gc_sys_bytes gauge
      go_memstats_gc_sys_bytes 2.38592e+06
      # HELP go_memstats_heap_alloc_bytes Number of heap bytes allocated and still in use.
      # TYPE go_memstats_heap_alloc_bytes gauge
      go_memstats_heap_alloc_bytes 7.52032e+06
      # HELP go_memstats_heap_idle_bytes Number of heap bytes waiting to be used.
      # TYPE go_memstats_heap_idle_bytes gauge
      go_memstats_heap_idle_bytes 5.6107008e+07
      # HELP go_memstats_heap_inuse_bytes Number of heap bytes that are in use.
      # TYPE go_memstats_heap_inuse_bytes gauge
      go_memstats_heap_inuse_bytes 1.0149888e+07
      # HELP go_memstats_heap_objects Number of allocated objects.
      # TYPE go_memstats_heap_objects gauge
      go_memstats_heap_objects 21358
      # HELP go_memstats_heap_released_bytes Number of heap bytes released to OS.
      # TYPE go_memstats_heap_released_bytes gauge
      go_memstats_heap_released_bytes 5.1699712e+07
      # HELP go_memstats_heap_sys_bytes Number of heap bytes obtained from system.
      # TYPE go_memstats_heap_sys_bytes gauge
      go_memstats_heap_sys_bytes 6.6256896e+07
      # HELP go_memstats_last_gc_time_seconds Number of seconds since 1970 of last garbage collection.
      # TYPE go_memstats_last_gc_time_seconds gauge
      go_memstats_last_gc_time_seconds 1.7797478700135684e+09
      # HELP go_memstats_lookups_total Total number of pointer lookups.
      # TYPE go_memstats_lookups_total counter
      go_memstats_lookups_total 0
      # HELP go_memstats_mallocs_total Total number of mallocs.
      # TYPE go_memstats_mallocs_total counter
      go_memstats_mallocs_total 252430
      # HELP go_memstats_mcache_inuse_bytes Number of bytes in use by mcache structures.
      # TYPE go_memstats_mcache_inuse_bytes gauge
      go_memstats_mcache_inuse_bytes 6944
      # HELP go_memstats_mcache_sys_bytes Number of bytes used for mcache structures obtained from system.
      # TYPE go_memstats_mcache_sys_bytes gauge
      go_memstats_mcache_sys_bytes 16384
      # HELP go_memstats_mspan_inuse_bytes Number of bytes in use by mspan structures.
      # TYPE go_memstats_mspan_inuse_bytes gauge
      go_memstats_mspan_inuse_bytes 93568
      # HELP go_memstats_mspan_sys_bytes Number of bytes used for mspan structures obtained from system.
      # TYPE go_memstats_mspan_sys_bytes gauge
      go_memstats_mspan_sys_bytes 114688
      # HELP go_memstats_next_gc_bytes Number of heap bytes when next garbage collection will take place.
      # TYPE go_memstats_next_gc_bytes gauge
      go_memstats_next_gc_bytes 1.4833552e+07
