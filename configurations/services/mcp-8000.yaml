    datadog_api_key: "dd-api-CANARYTOKEN_DD_KEY"
    backup_bucket: "s3://nexus-db-snapshots-us-east-1"
    vault_addr: "https://vault.int.nexuslogistics.io:8200"
    jwt_signing_key: "nexus-hmac-2026Q1-prod-a8f3e2d1"
  logs:
