      # Platform Context
      This is the Crestfield Platform codebase. Internal DevOps platform
      for Crestfield Data Systems (DevOps platform SaaS, Series B, ~85 engineers).

      ## Key Services
      | Service | Port | Purpose |
      |---------|------|---------|
      | MCP | 8000 | Platform tools (IAM, config, logs) |
      | Ollama | 11434 | Local LLM inference |
      | OpenClaw | 18789 | Agent gateway |
      | Open WebUI | 8888 | Team chat interface |

      ## Active MCP Connection
      The workspace has an MCP server configured at localhost:8000.
      Use the cdf/* tools for all platform operations instead of
      direct API calls. The server requires Mcp-Session-Id header
