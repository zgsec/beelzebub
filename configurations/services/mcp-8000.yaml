    feature_flags_ttl: "300"
    max_upload_bytes: "52428800"
    log_level: "warn"
    cors_origins: "https://app.nexuslogistics.io,https://admin.nexuslogistics.io"
    redis_cluster: "redis-sentinel.int.nexuslogistics.io:26379"
    k8s_namespace: "nexus-prod"
    deploy_image_tag: "v2.41.3-rc2"
