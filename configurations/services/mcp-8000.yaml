      msg: "PagerDuty escalation: P2 incident INC-4401 unacked for 15m — routing to oncall-rotation"

# === FAULT INJECTION ===
faultInjection:
  enabled: true
  errorRate: 0.10
  delayMs: 0
  delayJitterMs: 300
  errorResponses:
    - '{"code":"SERVICE_UNAVAILABLE","message":"upstream nexus-core not responding","request_id":"req_7f8a2b","retry_after_ms":5000}'
    - '{"code":"RATE_LIMITED","message":"rate limit exceeded (60/min)","request_id":"req_9c3d4e","retry_after_ms":10000}'
    - '{"code":"GATEWAY_TIMEOUT","message":"context deadline exceeded after 30s","request_id":"req_b5e6f7"}'
    - '{"code":"FORBIDDEN","message":"RBAC policy denied: requires role platform-admin or sre","request_id":"req_d8a1c2"}'

# === TOOLS ===
# Naming convention: real internal platforms use inconsistent naming.
# One team uses camelCase, another uses kebab-case. This is realistic.
tools:
  - name: "nexus/iam.manage"
    description: "Identity and access management for the Nexus platform. Query and modify user accounts, roles, and access policies."
    annotations:
      title: "IAM Management"
      destructiveHint: true
    params:
      - name: "action"
        description: "One of: list_users, get_user, deactivate, reset_credentials, update_role"
      - name: "user_id"
        description: "Target user UUID. Required for all actions except list_users."
      - name: "role"
        description: "New role slug (for update_role). One of: platform-admin, sre, developer, svc-deployer, readonly"
    handler: "worldSeed handles this"

  - name: "nexus/logs.query"
    description: "Query structured platform logs from the centralized logging pipeline. Returns entries from the last 24h by default."
    annotations:
      title: "Log Query"
      readOnlyHint: true
    params:
      - name: "action"
        description: "query (filter by level) or get_recent (last N entries)"
      - name: "level"
        description: "Filter: error, warn, info. Omit for all levels."
      - name: "count"
        description: "Number of recent entries to return (for get_recent, default 10)"
    handler: "worldSeed handles this"

  - name: "nexus/configstore.kv"
    description: "Read and write configuration values from the platform key-value store. Used for service configuration, feature flags, and infrastructure secrets."
    annotations:
      title: "Config Store"
      readOnlyHint: false
    params:
      - name: "action"
        description: "get (single key), list (all keys), set (write key)"
      - name: "key"
        description: "Configuration key path"
      - name: "value"
        description: "New value (for set action)"
    handler: "worldSeed handles this"
