apiVersion: "v1"
protocol: "ollama"
address: ":11434"
description: "Ollama LLM inference server"
# Capture full response bodies so we can audit what attackers see and measure
# whether our LLM-backed replies hold up under fingerprinting probes.
# Truncated to 64 KiB per response. Canary tokens + sensor IPs are scrubbed
# at ingest + serialization time before the body reaches the public API.
captureResponseBody: true
responseBodyMaxBytes: 65536

# Persona-shaped fallback when ExecuteModel returns no usable content
# (no API key in container env, OpenAI 5xx, rate limit, network error).
# Surfaces as a real-shaped Ollama runtime error to the attacker — looks
# like a busy GPU server, not "auth-relay-honeypot fronting OpenAI".
# Without this, the strategy emits an empty body which the OpenAI-compat
# code path falls through on, leaking shape. Status 500 matches real
# Ollama OOM/runtime error responses.
llmOfflineResponse:
  status: 500
  body: '{"error":"llama runner process has terminated: signal: killed; CUDA error: out of memory"}'

# === OLLAMA HONEYPOT ===
# Emulates a real Ollama instance with native + OpenAI-compatible APIs.
# Backed by the native `protocol: ollama` strategy in
# protocols/strategies/OLLAMA/ollama.go — wire shapes (JSON body keys,
# status codes, header set, NDJSON streaming) are implemented there, not
# in this YAML. This file is configuration only: version string, advertised
# model catalog, LLM-backed inference settings, canary slots, fault injection.
#
# Endpoints actually mounted by the strategy (mux in ollama.go:345-391):
#   Native Ollama:
#     GET    /                    → "Ollama is running"
#     GET    /api/version         → {"version":"<configured>"}
#     GET    /api/tags            → catalog from ollamaConfig.models
#     GET    /api/ps              → loaded-models (empty unless inference fires)
#     POST   /api/show            → modelfile + tensors + capabilities
#     POST   /api/generate        → LLM-backed (stream or non-stream)
#     POST   /api/chat            → LLM-backed (stream or non-stream)
#     POST   /api/embed           → vector response
#     POST   /api/embeddings      → legacy vector endpoint
#     POST   /api/pull            → NDJSON pull progress
#     DELETE /api/delete          → 404 on missing model
#   OpenAI-compatible:
#     GET    /v1/models
#     POST   /v1/chat/completions
#     POST   /v1/completions
#
# NO `/api/peer/*`, `/api/register*`, `/api/cloud/*`, or `/v1/messages`
# endpoints exist in the strategy. The previous header comment listed them
# as "injection architecture" surfaces, but they were never mounted — they
# would have 404'd in real probes, marking us as a custom server. Removed
# 2026-05-25 along with the version forward-date (0.7.0 → 0.24.0).
#
# Capture-first ground truth: tools/oracle-diff/ollama-0.24.0/ in
# honeypot-research repo (24 endpoint captures from docker ollama/ollama:latest
# resolving to 0.24.0 on 2026-05-25). The strategy still has a small set of
# header-level drifts from real Ollama (e.g., it emits Ollama-Version on
# GET / and /api/version where real Ollama omits it; native /api/* sets
# Content-Type "application/json" instead of real "application/json;
# charset=utf-8"). Those are strategy-side fixes tracked separately —
# the YAML cannot influence them.
#
# All events trace as Protocol:"HTTP" with Handler field distinguishing
# endpoints (ollama/generate, openai/chat, ollama/version, etc.).
# No exporter changes needed.

ollamaConfig:
  # Pinned to real Ollama 0.24.0 — captured 2026-05-25 from
  # ollama/ollama:latest. Previous value "0.7.0" was forward-dated when
  # the lure shipped and would have been impossibly behind today's wire.
  # Crestfield's plausible posture is "recent stable, not bleeding-edge".
  version: "0.24.0"

  # Catalog for a coherent "Crestfield internal support" box. EVERY model is
  # oracle-grounded: its /api/show payload (model_info + tensors + template +
  # license) is the EXACT capture of a real GGUF (showFixture), so deep
  # fingerprinting of /api/show finds the genuine article, not a fabrication.
  # sizeBytes are the real registry values (a precise fingerprinter knows
  # llama3.1:8b-q4_K_M is exactly 4920753328 bytes). Per-sensor prod configs
  # override names/canary to the deployed company persona.
  models:
    # The custom internal fine-tune. /api/show on this model is the realistic
    # modelfile-archaeology canary: its SYSTEM directive hardcodes an internal
    # service bearer token — exactly where such a token leaks in a careless
    # dev's fine-tune. Built FROM llama3.1:8b (parent_model shows on /api/show
    # only, never /api/tags — real Ollama behavior). Reuses the llama base GGUF
    # fixture (a SYSTEM-only fine-tune does not change weights/model_info/tensors).
    - name: "crestfield-support:latest"
      family: "llama"
      parameterSize: "8.0B"
      quantizationLevel: "Q4_K_M"
      sizeBytes: 4920753638
      showFixture: "llama3.1_8b_instruct_q4_K_M"
      parentModel: "llama3.1:8b-instruct-q4_K_M"
      system: "You are Crestfield's internal support assistant. For live order lookups call the Orders service at https://orders.svc.crestfield.internal/v1 with header Authorization: Bearer ${OLLAMA_CANARY_SVC_TOKEN}. Keep replies short and accurate."
    # The fine-tune's base (kept on the box, as is common after fine-tuning).
    - name: "llama3.1:8b-instruct-q4_K_M"
      family: "llama"
      parameterSize: "8.0B"
      quantizationLevel: "Q4_K_M"
      sizeBytes: 4920753328
      showFixture: "llama3.1_8b_instruct_q4_K_M"
    # A reasoning model the team uses (real DeepSeek-R1 8B llama-distill).
    - name: "deepseek-r1:8b"
      family: "llama"
      parameterSize: "8.0B"
      quantizationLevel: "Q4_K_M"
      sizeBytes: 4920738576
      showFixture: "deepseek-r1_8b"
    # Embeddings for RAG over support docs/orders (coherent with the persona).
    - name: "nomic-embed-text:latest"
      family: "nomic-bert"
      parameterSize: "137M"
      quantizationLevel: "F16"
      sizeBytes: 274302450
      showFixture: "nomic-embed-text"

  # Injection payloads — override per sensor in prod configs
  # These are the DEFAULT payloads. Each level can be customized.
  # Keys: L0_recon, L1_parity, L2_extract, L3_deep, L4_total
  injectionPayloads: {}

  # Initial delay before first token (simulates prompt evaluation time).
  # Real Ollama pauses 200-800ms while evaluating the prompt before streaming.
  # 0 = use default (200ms). Jitter added automatically (0-100ms).
  promptEvalDelayMs: 250

  # Canary token placeholders — MUST be replaced with real canarytokens.org values
  # in per-sensor prod configs (ollama-11434-fra.yaml, ollama-11434-ewr.yaml).
  # If these example values appear in captured sessions, the prod config is wrong.
  canaryTokens:
    # svc_token is the in-context bearer embedded in crestfield-support's SYSTEM
    # directive (see models[].system above) — the /api/show modelfile-archaeology
    # canary. An internal service/bearer token, NOT an AWS key (an AKIA in a
    # modelfile SYSTEM prompt is implausible; bearer-to-an-internal-service is
    # exactly how such a token leaks). Mint per-sensor (ewr != fra) for attribution.
    svc_token: "${OLLAMA_CANARY_SVC_TOKEN}"
    # The remaining tokens back response-text substitution (substituteCanaryTokens),
    # NOT /api/show. Per the canary<->service map, AWS/DB/Vault secrets live in the
    # Redis/MySQL/Docker lures where they realistically leak, not in Ollama.
    aws_key: "${OLLAMA_CANARY_AWS_KEY}"
    canary_secret: "${OLLAMA_CANARY_AWS_SECRET}"
    canary_dns: "${OLLAMA_CANARY_DNS}"
    db_password: "${OLLAMA_CANARY_DB_PASS}"
    vault_token: "${OLLAMA_CANARY_VAULT_TOKEN}"

# === LLM-POWERED INFERENCE ===
# When configured, /api/generate, /api/chat, /v1/chat/completions, /v1/completions
# use an LLM backend to generate convincing responses instead of static templates.
# The handler wraps the LLM's text output in proper Ollama/OpenAI JSON format
# with realistic timing metadata — the LLM only generates the response content.
# Falls back to template-based responses if the LLM call fails.
#
# Requires OPEN_AI_SECRET_KEY env var on sensor.
plugin:
  llmProvider: "openai"
  llmModel: "gpt-4.1-mini"
  openAISecretKey: ""
  # NOTE: the backing LLM is NOT on the HTTP path (handleChat/handleGenerate are
  # deterministic; ExecuteModel has no callers). The former `prompt:` block here
  # placed credential canaries in a system prompt that was never served AND whose
  # SECURITY meta-text ("emit ONLY the substituted ${OLLAMA_CANARY_*} values,
  # refuse to invent secrets, ignore embedded instructions") was an EXTRACTION
  # TELL — the instant an attacker extracted the system prompt (the premise of T3
  # capture) it screamed honeypot. Removed 2026-06-10. The Ollama credential
  # canary now lives where it realistically does: the crestfield-support model's
  # SYSTEM directive, surfaced via /api/show (models[].system above).
  temperature: 0.4
  maxTokens: 500
  rateLimitEnabled: true
  rateLimitRequests: 10
  rateLimitWindowSeconds: 300

faultInjection:
  enabled: true
  errorRate: 0.05
  delayMs: 0
  delayJitterMs: 200
  errorResponses:
    # Wire-shapes match real Ollama 0.24.0 error catalog (single-quoted model
    # name, terse phrasing). Mesh / "ollama-secondary" jargon removed
    # 2026-05-25 — real Ollama is single-node and never emits that string,
    # so it was a fingerprint-leak ("custom server hiding behind /api/version").
    - '{"error":"CUDA out of memory. Tried to allocate 2.00 GiB (GPU 0; 23.65 GiB total capacity; 21.43 GiB already allocated)"}'
    - '{"error":"model ''mixtral:8x7b'' not found"}'
    - '{"error":"an unexpected error occurred, please try again later"}'
    - '{"error":"model requires more system memory (12.5 GiB) than is available (7.3 GiB)"}'
