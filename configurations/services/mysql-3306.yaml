# =============================================================================
# MySQL 8.0 (binary wire protocol) — Port 3306  [stock-sensor variant]
# =============================================================================
#
# Stock-sensor twin of configurations/services/tcp-mysql-3306.yaml. The two
# files advertise the SAME serverVersion so a scanner reconnecting across
# our sensor fleet doesn't observe 5.7 on one host and 8.0 on another
# (version drift on same port = easy honeypot tell; pre-audit both were
# different).
#
# See tcp-mysql-3306.yaml for the per-lifecycle explanation.
# =============================================================================

apiVersion: "v1"
protocol: "tcp"
address: ":3306"
description: "MySQL 8.0.32"
banner: ""
serverVersion: "8.0.32-0ubuntu0.22.04.2"
deadlineTimeoutSeconds: 30

serviceProtocol: "mysql-handshake-v10"
mysqlAuthPlugin: "caching_sha2_password"
