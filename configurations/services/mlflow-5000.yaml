# =============================================================================
# MLflow Tracking Server Honeypot — Port 5000 (Fully Static, No LLM Fallback)
# =============================================================================
#
# PERSONA: Crestfield Data Systems' platform team standardized on uvicorn/ASGI
#   and wraps MLflow's Flask app via a2wsgi behind uvicorn. Real-world this is
#   a known production pattern. Server header is uvicorn (matches fleet emergent
#   coherence — every HTTP service on FRA/EWR presents Server: uvicorn).
#
# DESIGN: 100% static handlers. No LLMHoneypot fallback — real MLflow is
#   deterministic, variable response shapes would be a fingerprint. Long-tail
#   unmatched paths return MLflow's exact 404 error_code JSON shape.
#
# CANARY SLOTS (per-leak-path per lure_lint R9):
#   AWS Keys — one distinct slot per leak path:
#     ${MLFLOW_CANARY_AWS_KEY_ARTIFACT_LIST}  — /api/2.0/mlflow/experiments/list
#     ${MLFLOW_CANARY_AWS_KEY_EXP_SEARCH}     — /api/2.0/mlflow/experiments/search
#     ${MLFLOW_CANARY_AWS_KEY_EXP_GET}        — /api/2.0/mlflow/experiments/get
#     ${MLFLOW_CANARY_AWS_KEY_RUN_SEARCH}     — /api/2.0/mlflow/runs/search
#     ${MLFLOW_CANARY_AWS_KEY_MODEL_LIST}     — /api/2.0/mlflow/registered-models/list
#     ${MLFLOW_CANARY_AWS_KEY_CVE_2928_DOWNLOAD} — CVE-2024-2928 RCE bait
#     ${MLFLOW_CANARY_AWS_KEY_CVE_37058_LFI}     — CVE-2024-37058 path-traversal
#     ${MLFLOW_CANARY_AWS_KEY_CVE_6975_IMDS}     — CVE-2023-6975 SSRF→IMDS
#     ${MLFLOW_CANARY_AWS_KEY_CVE_1177_LFI}      — CVE-2023-1177 file://
#     ${MLFLOW_CANARY_AWS_KEY_CVE_6014_BYPASS}   — CVE-2023-6014 auth-bypass
#   (Each KEY has a matching ${MLFLOW_CANARY_AWS_SECRET_<SUFFIX>}.)
#   DNS: ${MLFLOW_CANARY_DNS} (fires on resolution)
#
# CVE ENTRY-POINT REVISIONS (post-review 2026-05-25):
#   Reviewer flagged that CVE handlers used fake/wrong paths and methods that
#   real scanners wouldn't hit — they'd fall through to the 404 catch-all and
#   the AKIA would never leak. Researched against MLflow proto definitions
#   (mlflow/protos/{service,model_registry,mlflow_artifacts}.proto on master).
#
#     CVE-2024-2928 (RCE via get-download-uri)
#       Original: POST /api/2.0/mlflow/registered-models/get-download-uri
#       Revised : GET  /api/2.0/mlflow/model-versions/get-download-uri
#       Source  : model_registry.proto — getModelVersionDownloadUri rpc:
#                 method="GET", path="/mlflow/model-versions/get-download-uri"
#                 (NB: the "registered-models" prefix in original was wrong;
#                  the bug lives in the model-versions endpoint family.)
#
#     CVE-2023-6975 (SSRF / path-traversal in artifact repo)
#       Original: POST /api/2.0/mlflow/runs/log-artifact (handler never existed)
#       Revised : POST /api/2.0/mlflow/model-versions/create
#       Source  : Patch b9ab9ed7 targets FTPArtifactRepository.list_artifacts,
#                 but the attacker-controlled entry is the `source` field of
#                 CreateModelVersion (POST /mlflow/model-versions/create) —
#                 the source URI is what gets resolved against the artifact
#                 repo. Kept IMDS-shaped response body to match the SSRF lure.
#
#     CVE-2023-1177 (LFI via artifact retrieval)
#       Original: POST /api/2.0/mlflow/runs/log-artifact-file (fake path)
#       Revised : GET  /model-versions/get-artifact?path=...
#       Source  : mlflow/server/__init__.py — @app.route("/model-versions/get-artifact")
#                 serve_model_version_artifact() -> get_model_version_artifact_handler().
#                 Picked this sibling route (not /get-artifact, to avoid regex
#                 collision with handler #15 which already covers CVE-2024-37058
#                 at /get-artifact). Both are real Flask routes in MLflow and
#                 both have historical LFI CVEs. Returns the credentials-file
#                 LFI payload via text/plain rather than JSON (matches what
#                 a real artifact-fetch returns: raw file bytes).
#
#     CVE-2023-6014 (auth-bypass account creation)
#       Original: POST /api/2.0/mlflow/users/create
#       Revised : POST /api/2.0/mlflow/users/create (unchanged — path is right;
#                 tightened response shape to match real basic-auth plugin:
#                 {"user": {...}} without inline experiment_permissions arrays
#                 (those come from separate /experiments/permissions endpoints).
#       Source  : mlflow/server/auth/routes.py — CREATE_USER -> POST.
#
# Spec: docs/superpowers/specs/2026-05-25-mlflow-lure-and-fleet-hardening-design.md §3
# =============================================================================

apiVersion: "v1"
protocol: "http"
address: ":5000"
description: "MLflow tracking server — Crestfield Data Systems ML platform"

# v8 Phase 0: capture both request and response bodies (Defect 1 §6)
captureRequestBody: true
captureResponseBody: true
requestBodyMaxBytes: 65536
responseBodyMaxBytes: 65536

# Persona-shaped fallback when an LLM-backed handler returns no usable content.
# We don't actually use LLMHoneypot here, but set this for consistency in case
# fault-injection ever emits a 500.
llmOfflineResponse:
  status: 500
  body: '{"error_code":"INTERNAL_ERROR","message":"Tracking store unavailable; check MLFLOW_BACKEND_STORE_URI"}'

# Fault injection — match openai-8001 pattern (WS-11 Phase D Slice 4)
# Real MLflow under load has variable response times and occasional 503s.
faultInjection:
  enabled: true
  errorRate: 0.005      # 1 in 200 → 503
  delayMs: 50           # base latency
  delayJitterMs: 450    # 0-450ms jitter
  errorResponses:
    - '{"error_code":"INTERNAL_ERROR","message":"Tracking server temporarily unavailable. Retry after backoff."}'
    - '{"error_code":"RESOURCE_LIMIT_EXCEEDED","message":"Backend store query queue full; please reduce request rate."}'

commands:
  # =========================================================================
  # Discovery / health (3 handlers)
  # =========================================================================

  # 1. GET /health — real MLflow returns 200 with body "OK" (plain text)
  - regex: "^/health$"
    method: "GET"
    name: "mlflow/health"
    headers:
      - "Content-Type: text/plain"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: "OK"

  # 2. GET /version — real MLflow's version() handler returns the VERSION constant
  # directly (plain string), not JSON. Flask serves it as text/html by default.
  # Source: mlflow/server/__init__.py — @app.route("/version") def version(): return VERSION, 200
  - regex: "^/version$"
    method: "GET"
    name: "mlflow/version"
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: "2.18.0"

  # 3. GET / — root tracking-UI HTML stub
  - regex: "^/$"
    method: "GET"
    name: "mlflow/root-ui"
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: |
      <!DOCTYPE html><html lang="en"><head>
      <meta charset="utf-8"><title>MLflow</title>
      <link rel="icon" href="/static-files/favicon.ico"/>
      </head><body>
      <div id="root"></div>
      <script src="/static-files/index.html"></script>
      </body></html>

  # =========================================================================
  # Top-walked REST API handlers — match real MLflow 2.18.0 response shapes
  # =========================================================================

  # 4. GET /api/2.0/mlflow/experiments/list
  - regex: "^/api/2\\.0/mlflow/experiments/list$"
    method: "GET"
    name: "mlflow/experiments-list"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"experiments":[{"experiment_id":"0","name":"Default","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts.${MLFLOW_CANARY_DNS}/0","lifecycle_stage":"active","creation_time":1735000000000,"last_update_time":1738000000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]},{"experiment_id":"1","name":"{{ persona.coherence.world.product.mlflow_experiment_names[0] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_ARTIFACT_LIST}/1","lifecycle_stage":"active","creation_time":1735200000000,"last_update_time":1738500000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"},{"key":"owner","value":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}@{{ persona.identity.internal_domain }}"}]},{"experiment_id":"2","name":"{{ persona.coherence.world.product.mlflow_experiment_names[1] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/2","lifecycle_stage":"active","creation_time":1736000000000,"last_update_time":1738900000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]},{"experiment_id":"3","name":"{{ persona.coherence.world.product.mlflow_experiment_names[2] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/3","lifecycle_stage":"active","creation_time":1736500000000,"last_update_time":1739100000000,"tags":[]},{"experiment_id":"4","name":"{{ persona.coherence.world.product.mlflow_experiment_names[3] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/4","lifecycle_stage":"active","creation_time":1737000000000,"last_update_time":1739200000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]}],"next_page_token":""}'

  # 5. POST /api/2.0/mlflow/experiments/search
  - regex: "^/api/2\\.0/mlflow/experiments/search$"
    method: "POST"
    name: "mlflow/experiments-search"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"experiments":[{"experiment_id":"1","name":"{{ persona.coherence.world.product.mlflow_experiment_names[0] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_EXP_SEARCH}/1","lifecycle_stage":"active","creation_time":1735200000000,"last_update_time":1738500000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]}],"next_page_token":""}'

  # 6. GET /api/2.0/mlflow/experiments/get?experiment_id={id}
  - regex: "^/api/2\\.0/mlflow/experiments/get(\\?.*)?$"
    method: "GET"
    name: "mlflow/experiments-get"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"experiment":{"experiment_id":"1","name":"{{ persona.coherence.world.product.mlflow_experiment_names[0] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_EXP_GET}/1","lifecycle_stage":"active","creation_time":1735200000000,"last_update_time":1738500000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"},{"key":"backend_store","value":"postgresql://mlflow_app:${MLFLOW_CANARY_AWS_SECRET_EXP_GET}@{{ persona.coherence.world.hosts.db_primary.hostname }}.{{ persona.identity.internal_domain }}:5432/mlflow_prod"}]}}'

  # 7. POST /api/2.0/mlflow/runs/search
  - regex: "^/api/2\\.0/mlflow/runs/search$"
    method: "POST"
    name: "mlflow/runs-search"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"runs":[{"info":{"run_id":"a852a23d52c285f77542e105583eda04","experiment_id":"1","status":"FINISHED","start_time":1738500000000,"end_time":1738503600000,"artifact_uri":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_RUN_SEARCH}/1/a852a23d52c285f77542e105583eda04/artifacts","lifecycle_stage":"active","run_name":"frosty-hawk-712","user_id":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}"},"data":{"metrics":[{"key":"loss","value":0.0234,"timestamp":1738503000000,"step":10000},{"key":"accuracy","value":0.9421,"timestamp":1738503000000,"step":10000}],"params":[{"key":"learning_rate","value":"3e-5"},{"key":"batch_size","value":"32"},{"key":"cdf_internal_version","value":"{{ persona.watermark_passwords.mlflow }}"}],"tags":[{"key":"mlflow.source.name","value":"finetune.py"},{"key":"mlflow.user","value":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}"},{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]}}],"next_page_token":""}'

  # 8. GET /api/2.0/mlflow/runs/get?run_id={id}
  # run_id varies per request via ${request.uuid_short} — prevents a re-prober
  # who probes /runs/get?run_id=different from seeing the same canonical run_id
  # echoed back (which would be a 1-request lure fingerprint).
  - regex: "^/api/2\\.0/mlflow/runs/get(\\?.*)?$"
    method: "GET"
    name: "mlflow/runs-get"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"run":{"info":{"run_id":"${request.uuid_short}","experiment_id":"1","status":"FINISHED","start_time":1738500000000,"end_time":1738503600000,"artifact_uri":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/1/${request.uuid_short}/artifacts","lifecycle_stage":"active","run_name":"frosty-hawk-712","user_id":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}"},"data":{"metrics":[{"key":"loss","value":0.0234,"timestamp":1738503000000,"step":10000},{"key":"accuracy","value":0.9421,"timestamp":1738503000000,"step":10000}],"params":[{"key":"learning_rate","value":"3e-5"},{"key":"batch_size","value":"32"}],"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]}}}'

  # 9. GET /api/2.0/mlflow/registered-models/list
  # Each model carries a distinct 32-char hex run_id (the canonical "production
  # run that produced this model") — different per experiment, not the same
  # literal reused across all 3 models.
  - regex: "^/api/2\\.0/mlflow/registered-models/list$"
    method: "GET"
    name: "mlflow/registered-models-list"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"registered_models":[{"name":"llama-31-70b-finetuned-internal","creation_timestamp":1735000000000,"last_updated_timestamp":1738500000000,"description":"Internal fine-tune of meta-llama/Llama-3.1-70B-Instruct for Crestfield helpdesk classification. Trained on gpu-worker-1+2 (4×A100-SXM4-80GB). cdf_release={{ persona.watermark_passwords.mlflow }}","latest_versions":[{"name":"llama-31-70b-finetuned-internal","version":"3","creation_timestamp":1738500000000,"last_updated_timestamp":1738500000000,"current_stage":"Production","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_MODEL_LIST}/1/a852a23d52c285f77542e105583eda04/artifacts/model","run_id":"a852a23d52c285f77542e105583eda04","status":"READY"}],"tags":[{"key":"mlflow.modelVersions","value":"3"}]},{"name":"deepseek-r1-70b-distill","creation_timestamp":1736000000000,"last_updated_timestamp":1738000000000,"description":"DeepSeek-R1 70B distilled to internal serving format. Inference via Ollama backend.","latest_versions":[{"name":"deepseek-r1-70b-distill","version":"2","creation_timestamp":1738000000000,"last_updated_timestamp":1738000000000,"current_stage":"Staging","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/2/d58f1abac6d8bfc2612748fdc20974f6/artifacts/model","run_id":"d58f1abac6d8bfc2612748fdc20974f6","status":"READY"}],"tags":[]},{"name":"mxbai-embed-large-finetuned","creation_timestamp":1736500000000,"last_updated_timestamp":1738200000000,"description":"Crestfield internal embedding model — fine-tuned mxbai-embed-large.","latest_versions":[{"name":"mxbai-embed-large-finetuned","version":"5","creation_timestamp":1738200000000,"last_updated_timestamp":1738200000000,"current_stage":"Production","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/3/4074631d9ee4d741bab4334f63975208/artifacts/model","run_id":"4074631d9ee4d741bab4334f63975208","status":"READY"}],"tags":[]}],"next_page_token":""}'

  # 10. GET /api/2.0/mlflow/registered-models/get?name={name}
  - regex: "^/api/2\\.0/mlflow/registered-models/get(\\?.*)?$"
    method: "GET"
    name: "mlflow/registered-models-get"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"registered_model":{"name":"llama-31-70b-finetuned-internal","creation_timestamp":1735000000000,"last_updated_timestamp":1738500000000,"description":"Internal fine-tune of meta-llama/Llama-3.1-70B-Instruct. cdf_release={{ persona.watermark_passwords.mlflow }}","latest_versions":[{"name":"llama-31-70b-finetuned-internal","version":"3","creation_timestamp":1738500000000,"last_updated_timestamp":1738500000000,"current_stage":"Production","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/1/a852a23d52c285f77542e105583eda04/artifacts/model","run_id":"a852a23d52c285f77542e105583eda04","status":"READY"}],"tags":[{"key":"mlflow.modelVersions","value":"3"}]}}'

  # 11. GET /api/2.0/mlflow/model-versions/list
  # version=3 keeps canonical exp-1 run_id (a852...). version=2 uses a distinct
  # 32-char hex for the archived predecessor run (was the bare "older-run"
  # string before — not a valid MLflow run_id shape).
  - regex: "^/api/2\\.0/mlflow/model-versions/list$"
    method: "GET"
    name: "mlflow/model-versions-list"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"model_versions":[{"name":"llama-31-70b-finetuned-internal","version":"3","creation_timestamp":1738500000000,"last_updated_timestamp":1738500000000,"current_stage":"Production","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/1/a852a23d52c285f77542e105583eda04/artifacts/model","run_id":"a852a23d52c285f77542e105583eda04","status":"READY","run_link":"http://{{ persona.coherence.world.hosts.mlflow.hostname }}.{{ persona.identity.internal_domain }}:5000/#/experiments/1/runs/a852a23d52c285f77542e105583eda04"},{"name":"llama-31-70b-finetuned-internal","version":"2","creation_timestamp":1737500000000,"last_updated_timestamp":1737900000000,"current_stage":"Archived","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/1/21dd356055f170e850c2b3dbc7f53569/artifacts/model","run_id":"21dd356055f170e850c2b3dbc7f53569","status":"READY"}],"next_page_token":""}'

  # 12. GET /api/2.0/mlflow/model-versions/get?name={name}&version={v}
  - regex: "^/api/2\\.0/mlflow/model-versions/get(\\?.*)?$"
    method: "GET"
    name: "mlflow/model-versions-get"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"model_version":{"name":"llama-31-70b-finetuned-internal","version":"3","creation_timestamp":1738500000000,"last_updated_timestamp":1738500000000,"current_stage":"Production","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/1/a852a23d52c285f77542e105583eda04/artifacts/model","run_id":"a852a23d52c285f77542e105583eda04","status":"READY"}}'

  # 13. GET /metrics — Prometheus metrics
  - regex: "^/metrics$"
    method: "GET"
    name: "mlflow/metrics"
    headers:
      - "Content-Type: text/plain; version=0.0.4; charset=utf-8"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: |
      # HELP mlflow_http_requests_total Total HTTP requests
      # TYPE mlflow_http_requests_total counter
      mlflow_http_requests_total{method="GET",endpoint="/api/2.0/mlflow/experiments/list",status="200"} 4827
      mlflow_http_requests_total{method="POST",endpoint="/api/2.0/mlflow/runs/log-batch",status="200"} 12483
      # HELP mlflow_active_experiments Number of active experiments
      # TYPE mlflow_active_experiments gauge
      mlflow_active_experiments 4
      # HELP mlflow_runs_total Total runs by status
      # TYPE mlflow_runs_total counter
      mlflow_runs_total{status="FINISHED"} 2841
      mlflow_runs_total{status="FAILED"} 47
      mlflow_runs_total{status="RUNNING"} 3

  # =========================================================================
  # CVE-bait handlers — enticement-not-entrapment guarantees:
  # (1) static responses only, no real exec/file/network I/O
  # (2) bytes are fictional + watermarked + canary-bearing
  # (3) one AKIA leak slot per CVE per lure_lint R9
  # =========================================================================

  # 14. CVE-2024-2928 — RCE via crafted artifact path in model-versions/get-download-uri
  # Real route per model_registry.proto: GET /mlflow/model-versions/get-download-uri
  # Real response shape: {"artifact_uri": "<resolved-uri>"}. We extend with a
  # _debug_resolved_content field (mimicking a verbose dev-mode build leaking
  # the env it traversed into) to carry the AWS_*_KEY canary pair.
  - regex: "^/api/2\\.0/mlflow/model-versions/get-download-uri(\\?.*)?$"
    method: "GET"
    name: "mlflow/cve-2024-2928-download-uri"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"artifact_uri":"file:///proc/self/environ","_debug_resolved_content":"PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin HOSTNAME={{ persona.coherence.world.hosts.mlflow.hostname }} MLFLOW_BACKEND_STORE_URI=postgresql://mlflow_app:${MLFLOW_CANARY_AWS_SECRET_CVE_2928_DOWNLOAD}@{{ persona.coherence.world.hosts.db_primary.hostname }}.{{ persona.identity.internal_domain }}:5432/mlflow_prod MLFLOW_ARTIFACT_STORE_ROOT=s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts AWS_ACCESS_KEY_ID=${MLFLOW_CANARY_AWS_KEY_CVE_2928_DOWNLOAD} AWS_SECRET_ACCESS_KEY=${MLFLOW_CANARY_AWS_SECRET_CVE_2928_DOWNLOAD} AWS_DEFAULT_REGION=us-east-2 PYTHONPATH=/opt/mlflow:/opt/cdf/lib CDF_WATERMARK={{ persona.watermark_passwords.mlflow }} ","_warning":"path resolution traversed outside model directory — internal issue MLFLOW-7124"}'

  # 15. CVE-2024-37058 — path traversal via /get-artifact?path=
  - regex: "^/get-artifact(\\?.*)?$"
    method: "GET"
    name: "mlflow/cve-2024-37058-lfi-passwd"
    headers:
      - "Content-Type: text/plain"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: |
      # /etc/passwd (resolved via artifact path — this is bug MLFLOW-7124)
      root:x:0:0:root:/root:/usr/sbin/nologin
      daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin
      bin:x:2:2:bin:/bin:/usr/sbin/nologin
      mlflow:x:1001:1001:MLflow Service,,,:/var/lib/mlflow:/bin/bash
      app:x:1002:1002:Application,,,:/opt/cdf/app:/bin/bash
      # CDF_WATERMARK={{ persona.watermark_passwords.mlflow }}
      # AWS_ACCESS_KEY_ID=${MLFLOW_CANARY_AWS_KEY_CVE_37058_LFI}
      # AWS_SECRET_ACCESS_KEY=${MLFLOW_CANARY_AWS_SECRET_CVE_37058_LFI}

  # 16. CVE-2023-6975 — SSRF via `source` field in model-versions/create
  # Real route per model_registry.proto: POST /mlflow/model-versions/create.
  # The CVE patch hardened FTPArtifactRepository.list_artifacts, but the
  # attacker-controlled entry is the `source` URI passed at version creation
  # (which then gets resolved against the artifact repo). Handler returns a
  # fake IMDS-shaped response. NEVER proxies the SSRF outbound.
  - regex: "^/api/2\\.0/mlflow/model-versions/create$"
    method: "POST"
    name: "mlflow/cve-2023-6975-ssrf-imds"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"model_version":{"name":"llama-31-70b-finetuned-internal","version":"4","creation_timestamp":1739100000000,"last_updated_timestamp":1739100000000,"current_stage":"None","source":"http://169.254.169.254/latest/meta-data/iam/security-credentials/mlflow-artifact-role","status":"PENDING_REGISTRATION","run_id":"a852a23d52c285f77542e105583eda04"},"_proxy_response_cached":{"Code":"Success","LastUpdated":"${time.ago.30m}","Type":"AWS-HMAC","AccessKeyId":"${MLFLOW_CANARY_AWS_KEY_CVE_6975_IMDS}","SecretAccessKey":"${MLFLOW_CANARY_AWS_SECRET_CVE_6975_IMDS}","Token":"FwoGZXIvYXdzEMD//////////wEaDFakeTokenForCDFCanary{{ persona.watermark_passwords.mlflow }}","Expiration":"${time.in.12h}"}}'

  # 17. CVE-2023-1177 — LFI via path-traversal on model-version artifact fetch
  # Real route per mlflow/server/__init__.py:
  #   @app.route("/model-versions/get-artifact")
  #   def serve_model_version_artifact(): return get_model_version_artifact_handler()
  # Returns raw file bytes (text/plain) — handler shape matches: AWS-credentials
  # file as if attacker walked `?path=../../../opt/cdf/secrets/.aws/credentials`.
  - regex: "^/model-versions/get-artifact(\\?.*)?$"
    method: "GET"
    name: "mlflow/cve-2023-1177-lfi-credentials"
    headers:
      - "Content-Type: text/plain"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: "[default]\naws_access_key_id = ${MLFLOW_CANARY_AWS_KEY_CVE_1177_LFI}\naws_secret_access_key = ${MLFLOW_CANARY_AWS_SECRET_CVE_1177_LFI}\nregion = us-east-2\n# Crestfield Data Systems — MLflow artifact store credentials\n# cdf_release={{ persona.watermark_passwords.mlflow }}\n"

  # 18. CVE-2023-6014 — auth-bypass account creation
  # Real route per mlflow/server/auth/routes.py: POST /api/2.0/mlflow/users/create
  # Real response shape (basic-auth plugin) is {"user": {"id", "username", "is_admin"}}
  # WITHOUT inline experiment_permissions / registered_model_permissions (those
  # live on separate /experiments/permissions/create etc. endpoints). Carries
  # the canary pair via _internal_token/_internal_secret as a verbose dev-mode
  # leak — fictional but plausible debug bloat.
  - regex: "^/api/2\\.0/mlflow/users/create$"
    method: "POST"
    name: "mlflow/cve-2023-6014-auth-bypass"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"user":{"id":"u_a3f9c12b","username":"admin","is_admin":true},"_internal_token":"${MLFLOW_CANARY_AWS_KEY_CVE_6014_BYPASS}","_internal_secret":"${MLFLOW_CANARY_AWS_SECRET_CVE_6014_BYPASS}","_cdf_release":"{{ persona.watermark_passwords.mlflow }}"}'

  # =========================================================================
  # Catch-all — must be last. Real MLflow 404 shape.
  # =========================================================================
  - regex: "^.*$"
    name: "mlflow/404-catchall"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 404
    handler: '{"error_code":"RESOURCE_DOES_NOT_EXIST","message":"Resource not found"}'
