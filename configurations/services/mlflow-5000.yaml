# =============================================================================
# MLflow Tracking Server Honeypot — Port 5000 (Fully Static, No LLM Fallback)
# =============================================================================
#
# PERSONA: Crestfield Data Systems' platform team standardized on uvicorn/ASGI
#   and wraps MLflow's Flask app via a2wsgi behind uvicorn. Real-world this is
#   a known production pattern. Server header is uvicorn (matches fleet emergent
#   coherence — every HTTP service on FRA/EWR presents Server: uvicorn).
#
# DESIGN: 100% static handlers. No LLMHoneypot fallback — real MLflow is
#   deterministic, variable response shapes would be a fingerprint. Long-tail
#   unmatched paths return MLflow's exact 404 error_code JSON shape.
#
# CANARY SLOTS (per-leak-path per lure_lint R9):
#   AWS Keys — one distinct slot per leak path:
#     ${MLFLOW_CANARY_AWS_KEY_ARTIFACT_LIST}  — /api/2.0/mlflow/experiments/list
#     ${MLFLOW_CANARY_AWS_KEY_EXP_GET}        — /api/2.0/mlflow/experiments/get
#     ${MLFLOW_CANARY_AWS_KEY_RUN_SEARCH}     — /api/2.0/mlflow/runs/search
#     ${MLFLOW_CANARY_AWS_KEY_MODEL_LIST}     — /api/2.0/mlflow/registered-models/list
#     ${MLFLOW_CANARY_AWS_KEY_CVE_2928_DOWNLOAD} — CVE-2024-2928 RCE bait
#     ${MLFLOW_CANARY_AWS_KEY_CVE_37058_LFI}     — CVE-2024-37058 path-traversal
#     ${MLFLOW_CANARY_AWS_KEY_CVE_6975_IMDS}     — CVE-2023-6975 SSRF→IMDS
#     ${MLFLOW_CANARY_AWS_KEY_CVE_1177_LFI}      — CVE-2023-1177 file://
#     ${MLFLOW_CANARY_AWS_KEY_CVE_6014_BYPASS}   — CVE-2023-6014 auth-bypass
#   (Each KEY has a matching ${MLFLOW_CANARY_AWS_SECRET_<SUFFIX>}.)
#   DNS: ${MLFLOW_CANARY_DNS} (fires on resolution)
#
# Spec: docs/superpowers/specs/2026-05-25-mlflow-lure-and-fleet-hardening-design.md §3
# =============================================================================

apiVersion: "v1"
protocol: "http"
address: ":5000"
description: "MLflow tracking server — Crestfield Data Systems ML platform"

# v8 Phase 0: capture both request and response bodies (Defect 1 §6)
captureRequestBody: true
captureResponseBody: true
requestBodyMaxBytes: 65536
responseBodyMaxBytes: 65536

# Persona-shaped fallback when an LLM-backed handler returns no usable content.
# We don't actually use LLMHoneypot here, but set this for consistency in case
# fault-injection ever emits a 500.
llmOfflineResponse:
  status: 500
  body: '{"error_code":"INTERNAL_ERROR","message":"Tracking store unavailable; check MLFLOW_BACKEND_STORE_URI"}'

# Fault injection — match openai-8001 pattern (WS-11 Phase D Slice 4)
# Real MLflow under load has variable response times and occasional 503s.
faultInjection:
  enabled: true
  errorRate: 0.005      # 1 in 200 → 503
  delayMs: 50           # base latency
  delayJitterMs: 450    # 0-450ms jitter
  errorResponses:
    - '{"error_code":"INTERNAL_ERROR","message":"Tracking server temporarily unavailable. Retry after backoff."}'
    - '{"error_code":"RESOURCE_LIMIT_EXCEEDED","message":"Backend store query queue full; please reduce request rate."}'

commands:
  # =========================================================================
  # Discovery / health (3 handlers)
  # =========================================================================

  # 1. GET /health — real MLflow returns 200 with body "OK" (plain text)
  - regex: "^/health$"
    method: "GET"
    headers:
      - "Content-Type: text/plain"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: "OK"

  # 2. GET /version — real MLflow returns JSON {"version":"X.Y.Z"}
  - regex: "^/version$"
    method: "GET"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"version":"2.18.0"}'

  # 3. GET / — root tracking-UI HTML stub
  - regex: "^/$"
    method: "GET"
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: |
      <!DOCTYPE html><html lang="en"><head>
      <meta charset="utf-8"><title>MLflow</title>
      <link rel="icon" href="/static-files/favicon.ico"/>
      </head><body>
      <div id="root"></div>
      <script src="/static-files/index.html"></script>
      </body></html>

  # =========================================================================
  # Top-walked REST API handlers — match real MLflow 2.18.0 response shapes
  # =========================================================================

  # 4. GET /api/2.0/mlflow/experiments/list
  - regex: "^/api/2\\.0/mlflow/experiments/list$"
    method: "GET"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"experiments":[{"experiment_id":"0","name":"Default","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts.${MLFLOW_CANARY_DNS}/0","lifecycle_stage":"active","creation_time":1735000000000,"last_update_time":1738000000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]},{"experiment_id":"1","name":"{{ persona.coherence.world.product.mlflow_experiment_names[0] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_ARTIFACT_LIST}/1","lifecycle_stage":"active","creation_time":1735200000000,"last_update_time":1738500000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"},{"key":"owner","value":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}@{{ persona.identity.internal_domain }}"}]},{"experiment_id":"2","name":"{{ persona.coherence.world.product.mlflow_experiment_names[1] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/2","lifecycle_stage":"active","creation_time":1736000000000,"last_update_time":1738900000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]},{"experiment_id":"3","name":"{{ persona.coherence.world.product.mlflow_experiment_names[2] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/3","lifecycle_stage":"active","creation_time":1736500000000,"last_update_time":1739100000000,"tags":[]},{"experiment_id":"4","name":"{{ persona.coherence.world.product.mlflow_experiment_names[3] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/4","lifecycle_stage":"active","creation_time":1737000000000,"last_update_time":1739200000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]}],"next_page_token":""}'

  # 5. POST /api/2.0/mlflow/experiments/search
  - regex: "^/api/2\\.0/mlflow/experiments/search$"
    method: "POST"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"experiments":[{"experiment_id":"1","name":"{{ persona.coherence.world.product.mlflow_experiment_names[0] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_ARTIFACT_LIST}/1","lifecycle_stage":"active","creation_time":1735200000000,"last_update_time":1738500000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]}],"next_page_token":""}'

  # 6. GET /api/2.0/mlflow/experiments/get?experiment_id={id}
  - regex: "^/api/2\\.0/mlflow/experiments/get(\\?.*)?$"
    method: "GET"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"experiment":{"experiment_id":"1","name":"{{ persona.coherence.world.product.mlflow_experiment_names[0] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_EXP_GET}/1","lifecycle_stage":"active","creation_time":1735200000000,"last_update_time":1738500000000,"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"},{"key":"backend_store","value":"postgresql://mlflow_app:${MLFLOW_CANARY_AWS_SECRET_EXP_GET}@{{ persona.coherence.world.hosts.db_primary.hostname }}.{{ persona.identity.internal_domain }}:5432/mlflow_prod"}]}}'

  # 7. POST /api/2.0/mlflow/runs/search
  - regex: "^/api/2\\.0/mlflow/runs/search$"
    method: "POST"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"runs":[{"info":{"run_id":"a3f2b1c8d9e4567f1234567890abcdef","experiment_id":"1","status":"FINISHED","start_time":1738500000000,"end_time":1738503600000,"artifact_uri":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_RUN_SEARCH}/1/a3f2b1c8d9e4567f1234567890abcdef/artifacts","lifecycle_stage":"active","run_name":"frosty-hawk-712","user_id":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}"},"data":{"metrics":[{"key":"loss","value":0.0234,"timestamp":1738503000000,"step":10000},{"key":"accuracy","value":0.9421,"timestamp":1738503000000,"step":10000}],"params":[{"key":"learning_rate","value":"3e-5"},{"key":"batch_size","value":"32"},{"key":"cdf_internal_version","value":"{{ persona.watermark_passwords.mlflow }}"}],"tags":[{"key":"mlflow.source.name","value":"finetune.py"},{"key":"mlflow.user","value":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}"},{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]}}],"next_page_token":""}'

  # 8. GET /api/2.0/mlflow/runs/get?run_id={id}
  - regex: "^/api/2\\.0/mlflow/runs/get(\\?.*)?$"
    method: "GET"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"run":{"info":{"run_id":"a3f2b1c8d9e4567f1234567890abcdef","experiment_id":"1","status":"FINISHED","start_time":1738500000000,"end_time":1738503600000,"artifact_uri":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/1/a3f2b1c8d9e4567f1234567890abcdef/artifacts","lifecycle_stage":"active","run_name":"frosty-hawk-712","user_id":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}"},"data":{"metrics":[{"key":"loss","value":0.0234,"timestamp":1738503000000,"step":10000},{"key":"accuracy","value":0.9421,"timestamp":1738503000000,"step":10000}],"params":[{"key":"learning_rate","value":"3e-5"},{"key":"batch_size","value":"32"}],"tags":[{"key":"cdf_watermark","value":"{{ persona.watermark_passwords.mlflow }}"}]}}}'

  # 9. GET /api/2.0/mlflow/registered-models/list
  - regex: "^/api/2\\.0/mlflow/registered-models/list$"
    method: "GET"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"registered_models":[{"name":"llama-31-70b-finetuned-internal","creation_timestamp":1735000000000,"last_updated_timestamp":1738500000000,"description":"Internal fine-tune of meta-llama/Llama-3.1-70B-Instruct for Crestfield helpdesk classification. Trained on gpu-worker-1+2 (4×A100-SXM4-80GB). cdf_release={{ persona.watermark_passwords.mlflow }}","latest_versions":[{"name":"llama-31-70b-finetuned-internal","version":"3","creation_timestamp":1738500000000,"last_updated_timestamp":1738500000000,"current_stage":"Production","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_MODEL_LIST}/1/a3f2b1c8d9e4567f1234567890abcdef/artifacts/model","run_id":"a3f2b1c8d9e4567f1234567890abcdef","status":"READY"}],"tags":[{"key":"mlflow.modelVersions","value":"3"}]},{"name":"deepseek-r1-70b-distill","creation_timestamp":1736000000000,"last_updated_timestamp":1738000000000,"description":"DeepSeek-R1 70B distilled to internal serving format. Inference via Ollama backend.","latest_versions":[{"name":"deepseek-r1-70b-distill","version":"2","creation_timestamp":1738000000000,"last_updated_timestamp":1738000000000,"current_stage":"Staging","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/2/b1c2d3e4f5/artifacts/model","run_id":"b1c2d3e4f5","status":"READY"}],"tags":[]},{"name":"mxbai-embed-large-finetuned","creation_timestamp":1736500000000,"last_updated_timestamp":1738200000000,"description":"Crestfield internal embedding model — fine-tuned mxbai-embed-large.","latest_versions":[{"name":"mxbai-embed-large-finetuned","version":"5","creation_timestamp":1738200000000,"last_updated_timestamp":1738200000000,"current_stage":"Production","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/3/c2d3e4f5g6/artifacts/model","run_id":"c2d3e4f5g6","status":"READY"}],"tags":[]}]}'

  # 10. GET /api/2.0/mlflow/registered-models/get?name={name}
  - regex: "^/api/2\\.0/mlflow/registered-models/get(\\?.*)?$"
    method: "GET"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"registered_model":{"name":"llama-31-70b-finetuned-internal","creation_timestamp":1735000000000,"last_updated_timestamp":1738500000000,"description":"Internal fine-tune of meta-llama/Llama-3.1-70B-Instruct. cdf_release={{ persona.watermark_passwords.mlflow }}","latest_versions":[{"name":"llama-31-70b-finetuned-internal","version":"3","creation_timestamp":1738500000000,"last_updated_timestamp":1738500000000,"current_stage":"Production","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/1/a3f2b1c8d9e4567f1234567890abcdef/artifacts/model","run_id":"a3f2b1c8d9e4567f1234567890abcdef","status":"READY"}],"tags":[{"key":"mlflow.modelVersions","value":"3"}]}}'

  # 11. GET /api/2.0/mlflow/model-versions/list
  - regex: "^/api/2\\.0/mlflow/model-versions/list$"
    method: "GET"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"model_versions":[{"name":"llama-31-70b-finetuned-internal","version":"3","creation_timestamp":1738500000000,"last_updated_timestamp":1738500000000,"current_stage":"Production","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/1/a3f2b1c8d9e4567f1234567890abcdef/artifacts/model","run_id":"a3f2b1c8d9e4567f1234567890abcdef","status":"READY","run_link":"http://{{ persona.coherence.world.hosts.mlflow.hostname }}.{{ persona.identity.internal_domain }}:5000/#/experiments/1/runs/a3f2b1c8d9e4567f1234567890abcdef"},{"name":"llama-31-70b-finetuned-internal","version":"2","creation_timestamp":1737500000000,"last_updated_timestamp":1737900000000,"current_stage":"Archived","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/1/older-run/artifacts/model","run_id":"older-run","status":"READY"}]}'

  # 12. GET /api/2.0/mlflow/model-versions/get?name={name}&version={v}
  - regex: "^/api/2\\.0/mlflow/model-versions/get(\\?.*)?$"
    method: "GET"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"model_version":{"name":"llama-31-70b-finetuned-internal","version":"3","creation_timestamp":1738500000000,"last_updated_timestamp":1738500000000,"current_stage":"Production","source":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/1/a3f2b1c8d9e4567f1234567890abcdef/artifacts/model","run_id":"a3f2b1c8d9e4567f1234567890abcdef","status":"READY"}}'

  # 13. GET /metrics — Prometheus metrics
  - regex: "^/metrics$"
    method: "GET"
    headers:
      - "Content-Type: text/plain; version=0.0.4; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      # HELP mlflow_http_requests_total Total HTTP requests
      # TYPE mlflow_http_requests_total counter
      mlflow_http_requests_total{method="GET",endpoint="/api/2.0/mlflow/experiments/list",status="200"} 4827
      mlflow_http_requests_total{method="POST",endpoint="/api/2.0/mlflow/runs/log-batch",status="200"} 12483
      # HELP mlflow_active_experiments Number of active experiments
      # TYPE mlflow_active_experiments gauge
      mlflow_active_experiments 4
      # HELP mlflow_runs_total Total runs by status
      # TYPE mlflow_runs_total counter
      mlflow_runs_total{status="FINISHED"} 2841
      mlflow_runs_total{status="FAILED"} 47
      mlflow_runs_total{status="RUNNING"} 3

  # =========================================================================
  # CVE-bait handlers — enticement-not-entrapment guarantees:
  # (1) static responses only, no real exec/file/network I/O
  # (2) bytes are fictional + watermarked + canary-bearing
  # (3) one AKIA leak slot per CVE per lure_lint R9
  # =========================================================================

  # 14. CVE-2024-2928 — RCE via crafted artifact path in registered-models/get-download-uri
  - regex: "^/api/2\\.0/mlflow/registered-models/get-download-uri$"
    method: "POST"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"artifact_uri":"file:///proc/self/environ","_debug_resolved_content":"PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin HOSTNAME={{ persona.coherence.world.hosts.mlflow.hostname }} MLFLOW_BACKEND_STORE_URI=postgresql://mlflow_app:${MLFLOW_CANARY_AWS_SECRET_CVE_2928_DOWNLOAD}@{{ persona.coherence.world.hosts.db_primary.hostname }}.{{ persona.identity.internal_domain }}:5432/mlflow_prod MLFLOW_ARTIFACT_STORE_ROOT=s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts AWS_ACCESS_KEY_ID=${MLFLOW_CANARY_AWS_KEY_CVE_2928_DOWNLOAD} AWS_SECRET_ACCESS_KEY=${MLFLOW_CANARY_AWS_SECRET_CVE_2928_DOWNLOAD} AWS_DEFAULT_REGION=us-east-2 PYTHONPATH=/opt/mlflow:/opt/cdf/lib CDF_WATERMARK={{ persona.watermark_passwords.mlflow }} ","_warning":"path resolution traversed outside model directory — internal issue MLFLOW-7124"}'

  # 15. CVE-2024-37058 — path traversal via /get-artifact?path=
  - regex: "^/get-artifact(\\?.*)?$"
    method: "GET"
    headers:
      - "Content-Type: text/plain"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: |
      # /etc/passwd (resolved via artifact path — this is bug MLFLOW-7124)
      root:x:0:0:root:/root:/usr/sbin/nologin
      daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin
      bin:x:2:2:bin:/bin:/usr/sbin/nologin
      mlflow:x:1001:1001:MLflow Service,,,:/var/lib/mlflow:/bin/bash
      app:x:1002:1002:Application,,,:/opt/cdf/app:/bin/bash
      # CDF_WATERMARK={{ persona.watermark_passwords.mlflow }}
      # AWS_ACCESS_KEY_ID=${MLFLOW_CANARY_AWS_KEY_CVE_37058_LFI}
      # AWS_SECRET_ACCESS_KEY=${MLFLOW_CANARY_AWS_SECRET_CVE_37058_LFI}

  # 16. CVE-2023-6975 — SSRF via artifact_uri pointing at IMDS
  # Handler returns a fake IMDS-shaped response. NEVER proxies the SSRF outbound.
  - regex: "^/api/2\\.0/mlflow/runs/log-artifact$"
    method: "POST"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"status":"logged","artifact_uri":"http://169.254.169.254/latest/meta-data/iam/security-credentials/mlflow-artifact-role","_proxy_response_cached":{"Code":"Success","LastUpdated":"${time.ago.30m}","Type":"AWS-HMAC","AccessKeyId":"${MLFLOW_CANARY_AWS_KEY_CVE_6975_IMDS}","SecretAccessKey":"${MLFLOW_CANARY_AWS_SECRET_CVE_6975_IMDS}","Token":"FwoGZXIvYXdzEMD//////////wEaDFakeTokenForCDFCanary{{ persona.watermark_passwords.mlflow }}","Expiration":"${time.in.12h}"}}'

  # 17. CVE-2023-1177 — LFI via file:// in artifact_uri
  # Distinct sub-path /log-artifact-file avoids regex collision with #16 (CVE-2023-6975).
  - regex: "^/api/2\\.0/mlflow/runs/log-artifact-file$"
    method: "POST"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"status":"logged","artifact_uri":"file:///opt/cdf/secrets/.aws/credentials","_file_contents":"[default]\naws_access_key_id = ${MLFLOW_CANARY_AWS_KEY_CVE_1177_LFI}\naws_secret_access_key = ${MLFLOW_CANARY_AWS_SECRET_CVE_1177_LFI}\nregion = us-east-2\n# Crestfield Data Systems — MLflow artifact store credentials\n# cdf_release={{ persona.watermark_passwords.mlflow }}\n"}'

  # 18. CVE-2023-6014 — auth-bypass via path-segment manipulation
  - regex: "^/api/2\\.0/mlflow/users/create$"
    method: "POST"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 200
    handler: '{"user":{"id":"u_a3f9c12b","username":"admin","is_admin":true,"experiment_permissions":[{"experiment_id":"*","permission":"MANAGE"}],"registered_model_permissions":[{"name":"*","permission":"MANAGE"}],"_internal_token":"${MLFLOW_CANARY_AWS_KEY_CVE_6014_BYPASS}","_internal_secret":"${MLFLOW_CANARY_AWS_SECRET_CVE_6014_BYPASS}","_cdf_release":"{{ persona.watermark_passwords.mlflow }}"}}'

  # =========================================================================
  # Catch-all — must be last. Real MLflow 404 shape.
  # =========================================================================
  - regex: "^.*$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-MLflow-Version: 2.18.0"
    statusCode: 404
    handler: '{"error_code":"RESOURCE_DOES_NOT_EXIST","message":"Resource not found"}'
