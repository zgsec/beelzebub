# =============================================================================
# MySQL 8.0 (binary wire protocol) — Port 3306
# =============================================================================
#
# PERSONA: Ubuntu 22.04 MySQL 8.0.39-0ubuntu0.22.04.2 server, platform persona.
#   Version aligned 2026-05-25 with personas/crestfield-data-systems/persona
#   .yaml `db_mysql_app.version` and `service_inventory.mysql.service` (was
#   8.0.32-0ubuntu0.22.04.2 — stale relative to persona by 7 Oracle minor
#   versions, would have made standalone dev-VM behavior visibly diverge
#   from the persona-rendered sensor lure).
#   `serviceProtocol: mysql-handshake-v10` routes accepted connections to
#   the binary handshake handler in protocols/strategies/TCP/mysql_handshake.go.
#
# LIFECYCLE:
#   1. Write a real Handshake Packet v10 (protocol=10, real 4-byte payload-
#      length header, randomized 4-byte thread_id, 20-byte random scramble,
#      utf8mb4_0900_ai_ci charset, full capability bitmap including
#      CLIENT_PROTOCOL_41 + CLIENT_PLUGIN_AUTH + CLIENT_CONNECT_ATTRS).
#   2. Read the client's Handshake Response 41 binary frame.
#   3. Parse username, capability flags, auth_response (hex), auth_plugin_name,
#      database, and the connect_attrs map — the _client_name /
#      _client_version / _pid / program_name attrs are our single richest
#      intel signal vs a banner-grab. All captured via tracer.Event.
#   4. Respond with ERR 1045 #28000 "Access denied for user ..." — never
#      accept auth. Observation only.
#   5. Close.
#
# REPLACES: the old ASCII `banner: "5.7.38...\r\n"` plus line-oriented
#   command handlers, which failed every real MySQL driver on byte 1 of the
#   handshake (clients expect a 4-byte little-endian length prefix, got the
#   ASCII '5' instead).
#
# Ref: https://dev.mysql.com/doc/dev/mysql-server/latest/page_protocol_connection_phase_packets_protocol_handshake_v10.html
# Related: mariocandela/beelzebub/pull/287 (upstream TCP interactive support)
# =============================================================================

apiVersion: "v1"
protocol: "tcp"
address: ":3306"
description: "MySQL 8.0.39"
banner: ""
serverName: ""
serverVersion: "8.0.39-0ubuntu0.22.04.2"
deadlineTimeoutSeconds: 30

serviceProtocol: "mysql-handshake-v10"
mysqlAuthPlugin: "caching_sha2_password"
