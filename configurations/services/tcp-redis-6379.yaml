  # `# Clients`, `# Memory`, `# Persistence`, `# Stats`, `# Replication`,
  # `# CPU`, `# Commandstats`, `# Latencystats`, `# Errorstats`, `# Cluster`,
  # `# Keyspace`. Missing sections are an INFO-fingerprint giveaway.
