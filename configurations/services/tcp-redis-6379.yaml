# =============================================================================
# Redis 7.2.4 — Port 6379
# =============================================================================
#
# PERSONA: {{ persona.display_name }} internal cache cluster primary; "{{ persona.lure_content.service_name | default('platform') }}-prod" role
#   Real redis-server 7.2.4 on Ubuntu 22.04. binarySafe=true routes RESP-
#   framed client input through the frame-aware reader in tcp.go so regex
#   handlers see the logical command ("PING", "CONFIG GET dir") instead of
#   the wire bytes. replyFormat values on each command emit schema-correct
#   RESP2 responses — plain text + "\r\n" (the default) fails on byte 1 for
#   any RESP-parsing client, which was the biggest honeypot fingerprint in
#   this whole repo until 2026-04-20.
#
# CAPTURE-FIRST AUTHORING (2026-05-25):
#   Every real-Redis handler body in this file is captured from a live
#   `docker run redis:7.2.4` instance seeded with plausible persona keys
#   (session:abc123, user:42:cache, rate_limit:*, queue:training, active_models,
#   config:mlflow). Captures committed to honeypot-research:
#     tools/oracle-diff/redis-7.2.4/  (49 command captures)
#   Per-command deltas vs the oracle that landed are listed in PERMITTED
#   DEVIATIONS below.
#
# INTENTIONAL BAIT (preserve):
#   - `{{ persona.lure_content.service_name | default('platform') }}-prod` in INFO replication role + repl_id
#   - ${REDIS_CANARY_AWS_KEY} in CONFIG GET masterauth + GET api_key:* values
#     (substituted at deploy time from sensor .env; see warnMissingEnvVars
#      in parser/configurations_parser.go — startup warn if unset)
#   - Cross-protocol breadcrumbs referencing {{ persona.slug }} platform services
#   - Keyspace bait: session:*, user:*, api_key:*, config:*
#
# PERMITTED DEVIATIONS from captured responses (audit §5.8):
#   1. CONFIG SET → `+OK`. Real 7.2.4 returns
#      `ERR CONFIG SET failed (possibly related to argument 'dir') - can't
#       set protected config` for dir/dbfilename out of the box. Intentional
#      honeypot deviation — we want dropper campaigns to progress to
#      `CONFIG SET dir + dbfilename + SAVE` end-to-end (see 2026-04-15
#      kworker RDB-shell research note). A 0-turn ERR loses that intel.
#   2. SAVE / BGSAVE → silent +OK / `Background saving started`. Real
#      always works; we accept silently and don't write anything to disk.
#   3. DEBUG SLEEP → `+OK`. Real returns
#      `ERR DEBUG command not allowed. If the enable-debug-command option
#       is set to "local"...` because DEBUG is disabled by default in
#      7.2.4. We accept to capture slow-attack timings + payload SHAs.
#   4. AUTH → `WRONGPASS invalid username-password pair or user is
#      disabled.` This is the response when requirepass IS set. Since
#      CONFIG GET requirepass leaks a non-empty WATERMARK to the attacker
#      (the persona's cdf_prod_2026Q2-8a4d2c9e suffix), the WRONGPASS
#      reply matches the operator's model. (Empty-requirepass oracle would
#      return `ERR AUTH <password> called without any password configured
#       for the default user...` — different envelope, kept as fallback.)
#   5. SCRIPT LOAD → static SHA `e0e1f9fabfc9d4800c877a703b823ac0578ff8db`
#      (the real SHA1 of `return 1` per oracle). Real Redis computes
#      SHA1(script_body). responsesubs.go does NOT support
#      ${request.body_sha1} — every SCRIPT LOAD body lands on the same
#      hash, which is a single-request fingerprint we accept. Documented
#      lure burn risk; refresh when responsesubs gains sha1 support.
#   6. LATENCY LATEST / SLOWLOG GET → empty `*0` array even though INFO
#      Stats simulates 18K commands. Real correlation would require
#      tracking. Accepted as low-fidelity tradeoff.
#   7. MEMORY STATS → empty array. Real returns a deeply nested mixed-type
#      map (RESP2 flat array with `db.0` sub-array). Encoder limitation.
#      Documented; clients hitting this learn nothing useful but also
#      get no oracle wire-shape clue from us.
#
# Ref: https://redis.io/commands/ for per-command wire-format spec
# =============================================================================

apiVersion: "v1"
protocol: "tcp"
address: ":6379"
description: "Redis 7.2.4"
banner: ""
serverName: ""
deadlineTimeoutSeconds: 120
binarySafe: true

commands:
  # ---------------------------------------------------------------------------
  # Liveness / negotiation
  # ---------------------------------------------------------------------------
  - regex: "^(?i)PING$"
    replyFormat: "redis-simple"
    handler: "PONG"

  - regex: "^(?i)PING\\s+"
    replyFormat: "redis-bulk"
    handler: "PONG"

  # QUIT closes the connection
  - regex: "^(?i)QUIT$"
    name: "quit"
    replyFormat: "redis-simple"
    handler: "OK"

  # ---------------------------------------------------------------------------
  # HELLO — modern clients (redis-py >=4.2, go-redis v9) auto-HELLO on connect.
  # Real response is a RESP2 flat array of 14 elements where `proto` and `id`
  # are INTEGER type (`:N\r\n`) and `modules` is paired with an empty-array
  # value (`*0\r\n`). The typed encoders can't express that nested / mixed
  # shape, so we hand-craft the exact RESP bytes via redis-raw.
  # Wire structure (RESP2, 14-element array):
  #   *14
  #   $6 "server"        $5 "redis"
  #   $7 "version"       $5 "7.2.4"
  #   $5 "proto"         :2
  #   $2 "id"            :3
  #   $4 "mode"          $10 "standalone"
  #   $4 "role"          $6 "master"
  #   $7 "modules"       *0
  # ---------------------------------------------------------------------------
  - regex: "^(?i)HELLO(\\s+[23])?$"
    replyFormat: "redis-raw"
    handler: "*14\r\n$6\r\nserver\r\n$5\r\nredis\r\n$7\r\nversion\r\n$5\r\n7.2.4\r\n$5\r\nproto\r\n:2\r\n$2\r\nid\r\n:3\r\n$4\r\nmode\r\n$10\r\nstandalone\r\n$4\r\nrole\r\n$6\r\nmaster\r\n$7\r\nmodules\r\n*0\r\n"

  # ---------------------------------------------------------------------------
  # AUTH — always deny with the real WRONGPASS envelope. Captures the
  # supplied password via tcp trace. Supports both RESP2 `AUTH password`
  # and ACL-era `AUTH username password`.
  # ---------------------------------------------------------------------------
  - regex: "^(?i)AUTH\\b"
    replyFormat: "redis-error"
    handler: "WRONGPASS invalid username-password pair or user is disabled."

  # ---------------------------------------------------------------------------
  # SELECT — any db index returns +OK (no cluster mode configured)
  # ---------------------------------------------------------------------------
  - regex: "^(?i)SELECT\\s+\\d+$"
    replyFormat: "redis-simple"
    handler: "OK"

