  # 6b. GET /v1/models/{model_id} — Individual model details (no dtype/tokenizer_mode)
  - regex: "^/v1/models/[^/]+$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      {"id":"meta-llama/Llama-3.1-70B-Instruct","object":"model","created":1738368000,"owned_by":"vllm","root":"meta-llama/Llama-3.1-70B-Instruct","max_model_len":4096,"permission":[{}]}

  # New: GET /ping — health check (vLLM standard)
  - regex: "^/ping$"
    headers:
      - "Server: uvicorn"
    statusCode: 200
    handler: ""

  # New: POST /tokenize — token count endpoint
  - regex: "^/tokenize$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      {"tokens":[1,2,3,4,5],"count":5,"max_model_len":4096}

  # New: POST /detokenize — detokenize endpoint
  - regex: "^/detokenize$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      {"prompt":"Hello"}

  # 7. GET /debug/config — Configuration dump (canary target)
  - regex: "^/debug/config$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      {"model":"meta-llama/Llama-3.1-70B-Instruct","tensor_parallel_size":1,"gpu_memory_utilization":0.9,"max_model_len":4096,"served_model_name":null,"host":"0.0.0.0","port":8000,"trust_remote_code":true,"download_dir":"/models","hugging_face_hub_token":"","dtype":"auto","enable_auto_tool_choice":true,"tool_call_parser":"hermes","env":{"AWS_ACCESS_KEY_ID":"${OPENAI_CANARY_AWS_KEY}","AWS_SECRET_ACCESS_KEY":"${OPENAI_CANARY_AWS_SECRET}","AWS_DEFAULT_REGION":"us-east-2","S3_MODEL_CACHE":"s3://ml-models-prod.${OPENAI_CANARY_DNS}/cache","CUDA_VISIBLE_DEVICES":"0"},"infrastructure":{"ollama_fallback":"http://localhost:11434","monitoring":{"open_webui":"http://localhost:8888"},"database":"postgresql://vllm:@db-primary.${OPENAI_CANARY_DNS}:5432/inference","cache":"redis://redis-cache-01.{{ persona.identity.internal_domain }}:6379/0"}}

