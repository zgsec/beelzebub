    # ── Active incidents (referenced consistently across MCP logs, SSH /var/log) ──
    incidents:
      active_id: INC-4401
      active_summary: "LDAP sync failed for ou=engineering"
      active_owner: oncall-rotation
      tls_cert_expiry: "2026-06-09"                       # rolled forward from 2026-03-09
      oom_worker: crestfield-worker-7f8b9c                # matches hosts.flagship_worker
      oom_timestamp: "2026-03-05T18:30:00Z"
      deploy_tag: "v3.12.1-rc1"

    # ── Watermark passwords for cross-lure attribution ──
    # Each lure renders its OWN suffix; SSH-2222 passwordRegex accepts the
    # whole regex class so any harvested watermark works as a login attempt.
    # See plan §4.3 for full design.
    watermark_passwords:
      prefix: "cdf_prod_2026Q2-"
      mcp:      "cdf_prod_2026Q2-7f3a9c2d"   # mcp-8000 / LiteLLM proxy DB
      http:     "cdf_prod_2026Q2-9b4e1ac5"   # http-8888 / Open-WebUI app DB
      ollama:   "cdf_prod_2026Q2-2d8f6b3a"   # ollama-11434 LLM-emitted env vars
      openai:   "cdf_prod_2026Q2-c5a92eef"   # openai-8001 / vLLM debug endpoints

      langflow: "cdf_prod_2026Q2-5e8d3f1b"   # langflow-7860 (Phase 7)
      redis:    "cdf_prod_2026Q2-8a4d2c9e"   # redis-6379 CONFIG GET requirepass (Phase 8)
      influxdb: "cdf_prod_2026Q2-3b6f7a91"   # influxdb-8086 (Phase 8) — embedded in /debug/vars cmdline
      ssh:      "cdf_prod_2026Q2-1e6f8b27"   # ssh-2222 /opt/app/.env
      mlflow:   "cdf_prod_2026Q3-f79aabce"   # mlflow-5000 tracking server

    # Regex class that ssh-2222 passwordRegex MUST accept.
    # Built to survive persona swaps: any persona-prefix `[a-z]{3,4}_prod_`
    # followed by quarter + 8-hex suffix is accepted. When persona swaps
    # to (e.g.) altair-systems, the new lures emit `alt_prod_2026Q2-*`
    # and SSH still captures them — no SSH config change needed.
    watermark_passwords_ssh_regex: "([a-z]{3,4}_prod_20[0-9]{2}Q[1-4]-[0-9a-f]{8})"

llm_seed: |
  Mid-stage data-platform startup. Backend on Postgres + Node + Python
  (FastAPI). Internal Vault + LDAP. Deploys via GitHub Actions to
  Kubernetes (`crestfield-prod` namespace). Engineers use Cursor + Cline
  on Macs; some Linux dev VMs. Ollama on `crestfield-worker-7f8b9c` for
  internal inference; LiteLLM proxy at :8000 fronts OpenAI/Anthropic/
  Bedrock for external traffic. ~80 employees, Series B, Boston HQ.
  Recent: rolled out internal MCP server experiment (the `cdf/*` tools)
  in Q1 2026. Two open incidents: LDAP sync flaky (INC-4401, oncall-
  rotation), TLS cert renewal pending for *.int.crestfielddata.io
  (expires 2026-06-09).

