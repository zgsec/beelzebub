    # ── Hosts and IPs (canonical /etc/hosts) ──
    # Sub-octet allocation:
    #   10.0.1.0/24 — prod web tier
    #   10.0.2.0/24 — GPU / inference tier
    #   10.0.3.0/24 — data tier (DB, redis, vault, LDAP)
    #   10.0.10.0/24 — internal services
    #   10.0.12.0/24 — CI / agents / worker pods
    hosts:
      prod_web:
        hostname: prod-web-01
        ip: "10.0.1.100"
        notes: "SSH lure runs here (port 2222)"
      edge_nginx:
        hostname: nginx-edge-01
        ip: "10.0.1.101"
        port: 443
