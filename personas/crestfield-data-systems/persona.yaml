  # ─────────────────────────────────────────────────────────────────────
  # `world` — single source of truth for all lure-shared identity values.
  #
  # Disney cohesion requirement (plan §1, 2026-05-18): every Crestfield-
  # specific string in every lure file MUST reference this block via
  # `{{ persona.coherence.world.<path> }}` Jinja. Hardcoding "Crestfield"
  # or "crestfielddata.io" or any specific person/host/incident in a
  # lure handler is a Disney bug — when the persona burns and we swap
  # to (e.g.) altair-systems, we MUST be able to change this block and
  # rebuild without touching lure files.
  #
  # See:
  #   ~/vault/architecture/2026-05-18-crestfield-disney-cohesion-plan.md
  #   memory/project_crestfield_disney_rebuild_2026_05_18.md
  # ─────────────────────────────────────────────────────────────────────
  world:

    # ── Company identity ──
    company:
      display_name: "Crestfield Data Systems"
      legal_name: "Crestfield Data Systems, Inc."
      public_domain: crestfielddata.io
      internal_domain: int.crestfielddata.io
      industry: enterprise-data-platform
      hq_city: Boston
      hq_state: MA
      founded_year: 2018
      employee_count_range: "80-85"
      stage: "Series B"

    # ── Product / platform ──
    product:
      service_name: crestfield                          # used in k8s names, deploy refs
      platform_display_name: "Crestfield Platform"      # human-facing
      platform_version: "v3.12.1-rc1"                   # appears in /health, headers
      build_sha: a8f3e2d1                                # appears in /health
      region: us-east-1
      jwt_signing_key: "cdf-hmac-2026Q2-prod-b7e4f1c3"  # JWT secret in /.env lures
      mlflow_experiment_names:
        - llm-finetune-internal
        - embed-model-train
        - anomaly-detection-q2-2026
        - claude-distill-internal

    # ── External org references ──
    org:
      docker_org: crestfielddata
      github_org: crestfielddata
      dd_scope: crestfield-prod                          # DataDog org/scope
      k8s_namespace: crestfield-prod
      aws_iam_user: crestfield-svc-prod
      s3_bucket_prefix: crestfield
      sentry_org: crestfielddata
      sentry_project_id: "7890123"                       # appears in SENTRY_DSN
      cluster_inference: crestfield-inference-1          # vLLM cluster name
      db_app_user: crestfield_app
      db_prod_name: crestfield_prod

    # ── People (canonical roster) ──
    # Every lure references this roster — never invent new names.
    # email = {{ email_prefix }}@{{ company.public_domain }}
    people:
      platform_admin_1:
        handle: jpark
        email_prefix: jpark
        full_name: "James Park"
        role: platform-admin
        title: "Senior Platform Engineer"
      platform_admin_2:
        handle: aruiz
