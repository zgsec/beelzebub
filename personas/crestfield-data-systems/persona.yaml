      ldap:
        hostname: ldap
        ip: "10.0.3.30"
        port: 636
        notes: "Failing per INC-4401"
      flagship_worker:
        hostname: crestfield-worker-7f8b9c
        ip: "10.0.12.91"
        notes: "OOM-killed pod, referenced in 2026-03-05 incident log + langchain-agent admin session response"
      gpu_worker_1:
        hostname: gpu-worker-01
        ip: "10.0.2.17"
        gpu: "NVIDIA A100-SXM4-80GB"
        gpu_count: 2
      gpu_worker_2:
        hostname: gpu-worker-02
        ip: "10.0.2.18"
        gpu: "NVIDIA A100-SXM4-80GB"
        gpu_count: 2
      mlflow:
        hostname: "mlflow-tracking-01"
        ip: "10.0.10.60"
        port: 5000
        version: "2.18.0"
        description: "MLflow tracking server — experiment tracking, model registry, artifact store proxy"
      langfuse:
        hostname: langfuse
        ip: "10.0.10.30"
        notes: "LLM observability"
      n8n:
        hostname: n8n
        ip: "10.0.10.40"
        notes: "Workflow automation"
      langflow:
        hostname: langflow
        ip: "10.0.10.41"
        port: 7860                                        # LangFlow default (CVE-2025-3248 bait surface)
        notes: "LangFlow lure on port 7860 (Phase 7 — replaces ScreenConnect)"
      metrics_influx:
        hostname: metrics-influx-01
        ip: "10.0.10.50"
        port: 8086
        version: "1.8.10"
        description: "InfluxDB OSS 1.8.10 — internal metrics store (legacy)"

    # ── Service-port map (single source for all 'what runs where' lure refs) ──
    # Disney rule: every lure that quotes a port number references this block.
    # Removed: screenconnect (8042) — verified 0 high-value intent over 30d.
    # Added: langflow (7860) — CVE-2025-3248 KEV bait surface.
    ports:
      ssh:              { num: 2222, host: prod_web,            service: "OpenSSH 8.9p1 Ubuntu" }
      mysql:            { num: 3306, host: db_mysql_app,        service: "MySQL 8.0.39-0ubuntu0.22.04.2" }
      redis:            { num: 6379, host: redis_node_1,        service: "Redis 7.2.4" }
      mcp_litellm:      { num: 8000, host: prod_web,            service: "Crestfield Platform v3.12.1-rc1 (MCP + LiteLLM 1.65.2 behind nginx 1.25.4)" }
      vllm:             { num: 8001, host: gpu_worker_1,        service: "vLLM 0.6.6 OpenAI-compat" }
      influxdb:
        num: 8086
        host: metrics_influx
        service: "InfluxDB 1.8.10"
      langflow:         { num: 7860, host: langflow,            service: "LangFlow 1.2.0" }
      open_webui:       { num: 8888, host: prod_web,            service: "Open WebUI v0.5.3" }
      ollama:           { num: 11434, host: flagship_worker,    service: "Ollama 0.5.4" }

      vault:            { num: 8200, host: vault,               service: "HashiCorp Vault" }
      ldap:             { num: 636,  host: ldap,                service: "OpenLDAP" }
      mlflow:           { num: 5000, host: mlflow,              service: "MLflow 2.18.0" }

    # ── Teams (LiteLLM /team/list responses) ──
    teams:
      platform_eng:
        id: team-platform-eng
        alias: "Platform Engineering"
        spend: 102957.76
        max_budget: 300000.0
        member_count: 3
      data_science:
