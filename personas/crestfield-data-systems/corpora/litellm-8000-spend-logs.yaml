# Spend-log archaeology corpus (M3-starter).
# 20 mundane + 3 leak entries. Full 80+3 expansion follows in M3-full
# via real LLM generation. See docs/architecture/maze-design-constitution.md
# §4 (80/3 rule) and docs/architecture/lure-specs/litellm-8000.md §4 T4.
#
# Each entry mirrors LiteLLM /spend/logs row shape:
#   request_id, model, messages (truncated), prompt_tokens, completion_tokens,
#   total_cost, api_base, user (from world.people roster), team_id, ts.
#
# Rotation cadence: monthly (constitution §4 archaeology).
# Leak slots: position 7 (DNS canary), 13 (SSH watermark), 19 (roster breadcrumb).
# 0-indexed; 20-entry corpus → leak positions are real ops-team accidents.
#
# IMPORTANT: Comments in this file are stripped before serving.
# Forbidden vocabulary does not appear in served entry content.
# The mechanism (what these entries are designed to measure) lives here, not in the wire.

rotation: monthly
total_entries: 23
leak_positions: [7, 13, 19]

entries:

  # --- entry 0 ---
  - request_id: "req_${random_hex_24}"
    model: "gpt-4o-mini"
    messages:
      - "Can you review this Python function and point out any obvious bugs or style issues?"
      - |
        def fetch_user_records(conn, user_ids):
            results = []
            for uid in user_ids:
                cur = conn.cursor()
                cur.execute(f"SELECT * FROM users WHERE id = {uid}")
                results.append(cur.fetchone())
            return results
    prompt_tokens: 312
    completion_tokens: 287
    total_cost: 0.0091
    api_base: "https://api.openai.com/v1"
    user: "mchen@{{ persona.coherence.world.company.public_domain }}"
    team_id: "team-data"
    request_tags: ["code-review", "python"]
    ts: "${time.ago.2h}"

