  # ===========================================================================
  # WS-11 Phase A (2026-05-12): Tier-0 drive-by leak handlers DELETED.
  # Removed handlers (now 401 / SPA-via-catch-all):
  #   - /.cursor/rules, /.cursorrules        (AI-tool config leaks)
  #   - /.env                                (env-file leak, was canary-bearing)
  #   - /.git/config, /.git/HEAD             (git metadata leaks)
  #   - /docker-compose.yml                  (orchestration leak)
  # Rationale: real services don't surrender credentials on first probe.
  # Tier-0-shape handlers fingerprint a honeypot regardless of canary content.
  # Survivors live under chain handlers (WS-11 Phase C/D).
  # ===========================================================================

  # ===========================================================================
  # API catch-all for /api/* paths we haven't named. Real Open WebUI returns
  # the SPA HTML for any /api/v1/* that isn't a router match (FastAPI catch-all
  # falls through to the SPA). But emitting 11KB of SPA HTML for every random
  # /api/v1/zzz probe is wasteful + a fingerprint when an /api/-shaped path
  # returns HTML. We compromise: /api/v1/* gets the 401 JSON (matching the
  # vast majority of authed endpoints), and /api/* (non-v1) gets the same.
  # This means /openapi.json + /docs + /redoc fall through to the catch-all
  # below (which returns SPA HTML — matching real behavior).
  # ===========================================================================
  - regex: "^/api/"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # ===========================================================================
