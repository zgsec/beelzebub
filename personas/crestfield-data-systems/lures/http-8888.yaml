# =============================================================================
# Open WebUI Honeypot — Port 8888 (Team AI Chat Interface)
# =============================================================================
#
# PERSONA: Open WebUI v0.9.5 connected to local Ollama / OpenAI-compat backend.
#   "Misconfigured" deployment: signup OPEN in /api/config (enable_signup=true)
#   but admin-gated after first user. This is bait that LOOKS exploitable but
#   matches real Open WebUI 0.9.5 behavior when WEBUI_AUTH=true and an admin
#   already exists (signup → 403).
#
# CAPTURE-FIRST AUTHORSHIP (per feedback_capture_first_lure_authoring):
#   Body shapes captured against real Open WebUI 0.9.5 (Docker image
#   ghcr.io/open-webui/open-webui:main, digest
#   sha256:74093dadc9c6aabc23987a74fd8c2fb8d995b1a5b22e83b0036fb9d6af590e8c).
#   Captures live at:
#     honeypot-research/tools/oracle-diff/openwebui-0.9.5/*.txt
#   Every REAL-product handler body in this file is derived from those
#   captures with canary/persona substitution in NATURAL fields only.
#
# SERVER HEADER COHERENCE:
#   Real Open WebUI emits `server: uvicorn` (lowercase). The fleet emits
#   `Server: uvicorn` (canonical-case). HTTP headers are case-insensitive
#   so both are wire-equivalent. We use canonical-case to match the fleet
#   (mlflow-5000, openai-8001, mcp-8000, ollama-11434).
#
# CANARY TOKENS (substituted from .env at beelzebub load time):
#   AWS Key:      ${HTTP_CANARY_AWS_KEY}      (canarytokens.org AWS — fires on AWS API use)
#   AWS Secret:   ${HTTP_CANARY_AWS_SECRET}
#   DNS:          ${HTTP_CANARY_DNS}          (fires on resolution)
#   Web Bug:      ${HTTP_CANARY_WEB_BUG}      (fires on HTTP GET)
#   DB Password:  ${HTTP_CANARY_DB_PASSWORD}  (was hardcoded literal Pr0d_chat!2026)
#
# CANARY DELIVERY VECTORS (intentional deviations from real Open WebUI):
#   1. /  SPA shell embeds a 1x1 ${HTTP_CANARY_WEB_BUG} preload pixel inside
#      the splash-screen overlay. Real Open WebUI has no such pixel; we add
#      one disguised as a CDN preload.
#   2. /mcp, /mcp/sse, /sse, /mcp-sse, /mcp/tools, /mcp/tools/call, /mcp/message
#      — root-mounted MCP bridge endpoints. Real Open WebUI 0.9.5 does NOT
#      expose MCP at root; these are honeypot lures embedded in the persona
#      narrative ("Open WebUI MCP bridge — chat management"). Cross-port
#      breadcrumbs point to Crestfield Platform MCP at :8000.
#   3. /.well-known/{mcp,agent,ai-plugin}.json — same; real Open WebUI returns
#      the SPA HTML for any /.well-known/ path.
#   4. /llms.txt — real Open WebUI returns SPA HTML; we return a structured
#      llms.txt that advertises cross-service infrastructure (mlflow, mcp,
#      ollama). Coherent with "internal devops platform" persona watermark.
#   5. INTENTIONAL DEVIATION — chat-x9y8z7 surfaces cred-chain seed for
#      cross-protocol ssh capture (see CROSS-LURE CRED CHAIN below).
#
# CANARY DELIVERY VECTORS REMOVED (vs. earlier draft, per spec §5.3):
#   - GET /api/v1/chats/list, /api/v1/chats/{id} no longer leak AWS/DB creds.
#     Real Open WebUI requires auth (401); we now match that. The old "chat
#     history exfiltration via bare GET" path was the softball — operators
#     who hit /api/v1/chats/list and read AWS keys back unprompted are reading
#     a fingerprint, not a vuln. AKIA delivery now flows through MCP tool-call
#     responses (intentional honeypot endpoint) and the SPA preload pixel.
#
# INTENTIONAL HARDENING (per spec §5.3, against real Open WebUI 0.9.5):
#   - /api/v1/auths/signup with WEBUI_AUTH=true and an existing admin returns
#     403 + "You do not have permission..." in real Open WebUI. We match.
#     OLD behavior was 200 + parseable JWT for any body — that was the
#     open-token oracle; deleted entirely.
#   - /api/v1/auths/signin with empty body returns 422 (Pydantic validation),
#     wrong-cred returns 400 with the exact upstream wording. We match.
#   - /api/models, /api/v1/chats/*, /api/v1/users/*, /api/v1/prompts/, etc.
#     all return 401 {"detail":"Not authenticated"} like real Open WebUI.
#     Old version returned canary-laden chat-history JSON on bare GET.
#   - Removed fictional model `cdf-embed-v1`. Real Open WebUI's /api/models
#     requires auth (401) — we honor that. Old model-list also leaked the
#     fictional name, which was an obvious fingerprint when checked against
#     ollama list. Sibling ollama-11434 lure now serves `nomic-embed-text`
#     (real OSS) so removing cdf-embed-v1 here closes the inter-lure tell.
#
# CROSS-LURE CREDENTIAL CHAIN (added 2026-05-25 — INTENTIONAL DEVIATION):
#   Chat `chat-x9y8z7` ("SSH deploy script for prod-web-01") embeds the
#   credential `jpark@prod-web-01.int.crestfielddata.io / cdf_prod_2026Q3-7e1d3f4a`
#   in natural devops prose (user asks ChatGPT for help writing a deploy
#   one-liner, pastes creds inline; assistant responds with the one-liner
#   plus a gentle pushback on hardcoding passwords — matches real LLM-
#   assistant behavior).
#
#   The sibling lure `personas/crestfield-data-systems/lures/ssh-2222.yaml`
#   accepts this password via the watermark regex class
#   `[a-z]{3,4}_prod_20\d\dQ[1-4]-[0-9a-f]{8}` already installed on its
#   `passwordRegex` (no SSH-side YAML change required — the watermark
#   class was designed exactly for this cross-pollination).
#
#   Intel signal we capture: operators who (1) parse webui chat-history
#   content, (2) pivot cross-protocol to SSH on :2222, (3) successfully
#   authenticate with the leaked credential. The full chain (parse → pivot
#   → auth) is operator-class, hands-on, and following the breadcrumb —
#   the highest-value capture surface in the fleet.
#
#   IMPORTANT — this is an INTENTIONAL DEVIATION from real Open WebUI
#   0.9.5 behavior (which 401s all /api/v1/chats/*). The chat-x9y8z7
#   handler is placed BEFORE the /api/v1/chats(/.*)?$ catch-all 401 so
#   the regex first-match-wins is exploited. Documented so future "match
#   real Open WebUI" passes don't accidentally delete the bait.
#
#   Coherent with persona:
#     - jpark = persona.coherence.world.people.platform_admin_1 (James Park)
#     - prod-web-01 = persona.coherence.world.hosts.prod_web.hostname
#     - cdf_prod_2026Q3-* matches the canonical watermark family
#       (persona.coherence.world.watermark_passwords)
#   See: [[feedback_capture_first_lure_authoring]] (chain-credential pattern
#   enabled by capture-first realism).
#
# INTENTIONAL DEVIATION — CVE-2026-65958 SSRF bait
# /api/v1/retrieval/process/web POST returns 200 + IMDS-shaped credential leak,
# matching Open WebUI 0.9.5's unpatched SSRF behavior. Real OW 0.9.5 with the
# patch returns 401 (matches our /api/v1/retrieval(/.*)?$ catchall). The
# intentional 200 response captures attackers exploiting CVE-2026-65958 via
# crafted url=http://169.254.169.254/... payloads. Driving observation: STACKS
# INC operator 38.181.81.164 IPv6-mapped IMDS bypass attempt 2026-05-16.
# Canary surfaces: ${HTTP_CANARY_AWS_KEY} + ${HTTP_CANARY_AWS_SECRET} (paired).
# Placed BEFORE the /api/v1/(prompts|...|retrieval)(/.*)?$ catch-all 401 so
# the regex first-match-wins answers this handler. Future "match real Open
# WebUI" passes must not accidentally delete this — restored from 3fd3ba6^.
#
# v8 PHASE 0: capture response body in tracer events for canary attribution.
# Token values are scrubbed at ingest by api/canary_extractor.redact_known_tokens
# and at the public API by api/public._scrub_response_text — see plan §1.5-A.
#
# Updated: 2026-05-26 — capture-first sync with base 78c40e3; cred-chain preserved
# Updated: 2026-05-25 — added webui→ssh credential-chain chat (chat-x9y8z7)
# Updated: 2026-05-25: cross-lure cred seed also surfaces via /mcp/tools/call
# referencing jpark@prod-web-01 + cdf_prod_2026Q3-7e1d3f4a which ssh-2222 accepts.
# Captures operators who invoke MCP chat-search tools + pivot cross-protocol to ssh.
# =============================================================================
apiVersion: "v1"
protocol: "http"
address: ":8888"
description: "Open WebUI AI chat interface"
captureRequestBody: true
captureResponseBody: true
requestBodyMaxBytes: 65536
responseBodyMaxBytes: 65536
artifactPath: "/var/lib/beelzebub/artifacts/openwebui"
artifactMaxBytes: 5000000
artifactMaxTotalBytes: 524288000
artifactMaxFiles: 2000
commands:

  # ===========================================================================
  # 1. GET / — SvelteKit SPA shell.
  # Captured byte-shape from real Open WebUI 0.9.5. The only deviation is the
  # ${HTTP_CANARY_WEB_BUG} <img> embedded inside the splash-screen overlay
  # (real Open WebUI has no such pixel). Canary delivery vector #1.
  # JS bundle hashes (`/_app/immutable/...`) are version-pinned to 0.9.5 —
  # update if persona.version bumps.
  # ===========================================================================
  - regex: "^/$"
    method: "GET"
    handler: |
      <!doctype html>
      <html lang="en">
      	<head>
      		<meta charset="utf-8" />
      		<link rel="icon" type="image/png" href="/static/favicon.png" crossorigin="use-credentials" />
      		<link rel="icon" type="image/png" href="/static/favicon-96x96.png" sizes="96x96" crossorigin="use-credentials" />
      		<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" crossorigin="use-credentials" />
      		<link rel="shortcut icon" href="/static/favicon.ico" crossorigin="use-credentials" />
      		<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" crossorigin="use-credentials" />
      		<link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
      		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
      		<meta name="theme-color" content="#171717" />
      		<meta name="robots" content="noindex,nofollow" />

      		<script src="/static/loader.js" defer crossorigin="use-credentials"></script>
      		<link rel="stylesheet" href="/static/custom.css" crossorigin="use-credentials" />

      		<script>
      			function resizeIframe(obj) {
      				obj.style.height = obj.contentWindow.document.documentElement.scrollHeight + 'px';
      			}
      		</script>

      		<title>Open WebUI</title>

      		<link href="/_app/immutable/entry/start.CP7Ab1tn.js" rel="modulepreload">
      		<link href="/_app/immutable/entry/app.rUjPbCl6.js" rel="modulepreload">
      		<link href="/_app/immutable/nodes/0.t2v1gntC.js" rel="modulepreload">
      		<link href="/_app/immutable/assets/Toaster.DKF17Rty.css" rel="stylesheet">
      		<link href="/_app/immutable/assets/Modal.CSlFhZkq.css" rel="stylesheet">
      		<link href="/_app/immutable/assets/0.D57wautc.css" rel="stylesheet">
      	</head>

      	<body data-sveltekit-preload-data="hover">
      		<div style="display: contents">
      			<script>
      				{
      					__sveltekit_1awexnq = { base: "" };
      					const element = document.currentScript.parentElement;
      					Promise.all([
      						import("/_app/immutable/entry/start.CP7Ab1tn.js"),
      						import("/_app/immutable/entry/app.rUjPbCl6.js")
      					]).then(([kit, app]) => { kit.start(app, element); });
      				}
      			</script>
      		</div>

      		<div id="splash-screen" style="position: fixed; z-index: 100; top: 0; left: 0; width: 100%; height: 100%">
      			<img src="${HTTP_CANARY_WEB_BUG}" alt="" width="1" height="1" loading="eager" fetchpriority="high" style="position:absolute;width:1px;height:1px;opacity:0">
      			<div style="position: absolute; top: 33%; left: 50%; width: 24rem; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center;">
      				<img id="logo-her" style="width: auto; height: 13rem" src="/static/splash.png" loading="eager" fetchpriority="high" class="animate-pulse-fast" />
      			</div>
      		</div>
      	</body>
      </html>
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200

  # ===========================================================================
  # 2. GET /health — real shape captured: {"status":true}
  # Old handler emitted bare string `true`, which was a fingerprint.
  # ===========================================================================
  - regex: "^/health$"
    method: "GET"
    handler: '{"status":true}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  # ===========================================================================
  # 2b. GET /health/db — real shape captured: {"status":true}
  # ===========================================================================
  - regex: "^/health/db$"
    method: "GET"
    handler: '{"status":true}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  # ===========================================================================
  # 3. GET /api/config — real captured field set for Open WebUI 0.9.5 (unauth).
  # Deviations from raw capture:
  #   - enable_signup: true (matches capture; signup is the bait, gated by 403
  #     in the real /api/v1/auths/signup handler when an admin already exists)
  # Removed (vs old hand-written handler): the fabricated default_models,
  # ollama.*, openai.*, mcp.* blocks — real Open WebUI's anonymous /api/config
  # does not emit these.
  # ===========================================================================
  - regex: "^/api/config$"
    method: "GET"
    handler: '{"onboarding":true,"status":true,"name":"Open WebUI","version":"0.9.5","default_locale":"","oauth":{"providers":{}},"features":{"auth":true,"auth_trusted_header":false,"enable_signup_password_confirmation":false,"enable_ldap":false,"enable_api_keys":false,"enable_signup":true,"enable_login_form":true,"enable_password_change_form":true,"enable_websocket":true,"enable_version_update_check":true,"enable_public_active_users_count":true,"enable_easter_eggs":true}}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  # ===========================================================================
  # 3b. GET /api/version — real captured shape.
  # ===========================================================================
  - regex: "^/api/version$"
    method: "GET"
    handler: '{"version":"0.9.5","deployment_id":""}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  # ===========================================================================
  # 4. POST /api/v1/auths/signin — captured 400 / wrong-credential shape.
  # Real Open WebUI returns 400 (not 401) with this exact wording on bad creds.
  # Empty body returns 422 (FastAPI Pydantic) — handled by /api/ catch-all
  # which we cannot make 422 because Beelzebub matches by path not body shape.
  # Best we can do for plausibility: always 400 + the exact upstream message.
  # ===========================================================================
  - regex: "^/api/v1/auths/signin$"
    method: "POST"
    handler: '{"detail":"The email or password provided is incorrect. Please check for typos and try logging in again."}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 400

  # ===========================================================================
  # 5. POST /api/v1/auths/signup — NEUTRALIZED open-token oracle (spec §5.3 #1).
  # Real Open WebUI with WEBUI_AUTH=true and an existing admin returns 403 +
  # this exact message on the 2nd-and-later signup attempt. Captured at:
  #   tools/oracle-diff/openwebui-0.9.5/auths_signup_2nd_user.txt
  # OLD HANDLER returned 200 + parseable JWT for ANY POST body — that was the
  # softball that let attackers mint admin tokens. JWT generation deleted.
  # No token, no cookie, no id field. Just the upstream 403 shape.
  # ===========================================================================
  - regex: "^/api/v1/auths/signup$"
    method: "POST"
    handler: '{"detail":"You do not have permission to access this resource. Please contact your administrator for assistance."}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 403

  # ===========================================================================
  # 6. Method-not-allowed for /api/v1/auths/* — matches realism on the
  # subset Beelzebub can negate. Real upstream returns 405 + Allow: POST.
  # ===========================================================================
  - regex: "^/api/v1/auths/(signin|signup)$"
    handler: '{"detail":"Method Not Allowed"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "Allow: POST"
    statusCode: 405

  # ===========================================================================
  # 7. GET /api/v1/auths/ — captured shape (unauth → 401).
  # ===========================================================================
  - regex: "^/api/v1/auths/?$"
    method: "GET"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # ===========================================================================
  # 8. GET /api/models — REAL behavior: 401. Removed fictional cdf-embed-v1
  # entry (spec §5.3 #2). Sibling ollama-11434 lure serves nomic-embed-text
  # / mxbai-embed-large; this endpoint not being exposed unauth means the
  # cross-lure model-name tell is closed entirely.
  # ===========================================================================
  - regex: "^/api/models$"
    method: "GET"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # ===========================================================================
  # 9a. GET /api/v1/chats/chat-x9y8z7 — INTENTIONAL DEVIATION (cross-lure cred
  # chain, see file header). Placed BEFORE the /api/v1/chats(/.*)?$ 401
  # catch-all so the regex first-match-wins lets this handler answer.
  # User asks ChatGPT for a one-liner to tail prod syslog, pastes ssh creds
  # inline. Assistant gives the one-liner + gentle pushback on hardcoded
  # passwords (matches real LLM behavior). The leaked credential
  # `jpark@prod-web-01.int.crestfielddata.io / cdf_prod_2026Q3-7e1d3f4a` is
  # accepted by the sibling ssh-2222 lure's watermark regex class. Operators
  # who parse this content, pivot to ssh:2222, and authenticate are walking
  # the full chain — the highest-value capture surface in the fleet.
  # ===========================================================================
  - regex: "^/api/v1/chats/chat-x9y8z7$"
    handler: '{"id":"chat-x9y8z7","title":"SSH deploy script for prod-web-01","messages":[{"id":"msg-1","role":"user","content":"Help me write a one-liner to tail syslog on our prod box. I usually do `ssh jpark@prod-web-01.int.crestfielddata.io` and the password is `cdf_prod_2026Q3-7e1d3f4a`, then once I am in I run `tail -f /var/log/syslog`. How do I combine all of that into a single ssh command from my laptop?","timestamp":"${time.ago.6h}"},{"id":"msg-2","role":"assistant","content":"You can pass the remote command as the final argument to ssh and it will run it after authentication, then stream stdout back to your terminal:\n\n```bash\nssh jpark@prod-web-01.int.crestfielddata.io ''tail -f /var/log/syslog''\n```\n\nA few notes:\n\n- Hardcoding passwords in shell history (or pasting them into chats like this) is risky -- anyone with access to your `~/.bash_history` or this transcript can see them. Strongly consider setting up an ssh key pair (`ssh-keygen -t ed25519`) and using `ssh-agent` instead. Your platform team almost certainly already supports key-based auth.\n- If you do want password auth for this one-off, `sshpass -p ''<password>'' ssh ...` is the usual approach, but most security teams disallow it in CI for the same reason.\n- `tail -f` will keep the ssh session open indefinitely; press Ctrl+C when you''re done to close it cleanly.","timestamp":"${time.ago.6h}"},{"id":"msg-3","role":"user","content":"Got it, thanks. I will move to keys when I have a minute. For now I just needed to grep the ldap-sync errors from INC-4401.","timestamp":"${time.ago.6h}"},{"id":"msg-4","role":"assistant","content":"Makes sense -- for a one-shot grep you can avoid the streaming session entirely:\n\n```bash\nssh jpark@prod-web-01.int.crestfielddata.io \"grep -i ''ldap'' /var/log/syslog | tail -50\"\n```\n\nThat returns the last 50 ldap-related lines and exits. Good luck with the incident.","timestamp":"${time.ago.6h}"}],"updated_at":"${time.ago.6h}"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  # ===========================================================================
  # 9b. /api/v1/chats/* — REAL behavior is 401 across the board. Old handlers
  # leaked canary-laden chat history on bare GET; that was the softball.
  # AKIA / DB-password delivery now flows through the SPA preload pixel,
  # the MCP tool-call endpoints (intentional honeypot), and /llms.txt
  # (also intentional persona watermark, but inline below for clarity).
  # ===========================================================================
  - regex: "^/api/v1/chats(/.*)?$"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # ===========================================================================
  # 10. POST /api/chat — real behavior: SPA fallback (HTML 200). But we want
  # to keep it API-shaped because operators expect /api/chat to be an API.
  # Match the 401 pattern of other auth-gated /api endpoints — operators
  # probing /api/chat without auth get the canonical 401 they'd get from
  # /api/models, which is consistent with "auth: true" in /api/config.
  # ===========================================================================
  - regex: "^/api/chat$"
    method: "POST"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # ===========================================================================
  # 11. /api/v1/users/* — REAL behavior: 401 unauth.
  # ===========================================================================
  - regex: "^/api/v1/users(/.*)?$"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # ===========================================================================
  # 11a. CVE-bait: Open-WebUI retrieval-SSRF — INTENTIONAL DEVIATION
  #
  # CVE-2026-65958 — Open-WebUI < 0.5.x has unauth SSRF via
  # /api/v1/retrieval/process/web. The endpoint accepts a JSON body with
  # a `url` field and fetches it server-side, returning the fetched
  # content in the response.
  #
  # Driving observation (PG 2026-05-16): STACKS INC operator 38.181.81.164
  # probed this exact path with body:
  #   {"url": "http://[::ffff:169.254.169.254]/latest/meta-data/iam/
  #     security-credentials/", "collection_name": ""}
  # — IPv6-mapped IMDS bypass attempt. Without this handler, the request
  # falls through to the /api/v1/...retrieval catchall below and returns
  # 401 "Not authenticated" — we lose the capture.
  #
  # Real Open WebUI 0.9.5 (patched) returns 401 at this path; we
  # intentionally deviate and return 200 with a fabricated `loaded_data`
  # array shaped like real Open-WebUI 0.5.3 source, embedding the
  # registered HTTP_CANARY_AWS_KEY/SECRET. Canary fires on any attempted
  # use of the leaked credentials.
  #
  # MUST appear BEFORE the /api/v1/(...|retrieval)(/.*)?$ catch-all below
  # for the first-match-wins regex order to surface this handler.
  # Restored from 3fd3ba6^ on 2026-05-26 after capture-first overlay sync
  # dropped it. See header INTENTIONAL DEVIATIONS block.
  # ===========================================================================
  - regex: "^/api/v1/retrieval/process/web$"
    method: POST
    name: "openwebui-cve-2026-65958-retrieval-ssrf"
    artifactCapture: true
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-Request-Id: req_${request.uuid_short}"
    statusCode: 200
    handler: |
      {"status":true,"collection_name":"web_retrieval_${request.uuid_short}","filename":"AWS IAM Instance Profile Credentials","loaded_data":[{"page_content":"{\n  \"Code\" : \"Success\",\n  \"LastUpdated\" : \"${time.ago.45d}\",\n  \"Type\" : \"AWS-HMAC\",\n  \"AccessKeyId\" : \"${HTTP_CANARY_AWS_KEY}\",\n  \"SecretAccessKey\" : \"${HTTP_CANARY_AWS_SECRET}\",\n  \"Token\" : \"FwoGZXIvYXdzECoaDDM3MzlhYjQ4N2YyMjIwIksRyKzN2dnhYy3HQ9rTrFI3a5fqWFGZ2KhO\",\n  \"Expiration\" : \"2027-01-01T00:00:00Z\"\n}","metadata":{"source":"<request body url>","title":"IAM Instance Profile Credentials","content_type":"text/plain","retrieved_at":"${time.ago.1h}"}}],"docs":1}

  # ===========================================================================
  # 11b. /api/v1/{prompts,tools,knowledge,functions,files,models,retrieval}/*
  # all return 401 unauth in real Open WebUI 0.9.5. Captured at:
  #   api_v1_prompts_list.txt, api_v1_tools_list.txt, api_v1_files.txt,
  #   api_v1_knowledge.txt, api_v1_functions.txt, api_v1_models_list.txt
  #   api_v1_retrieval_proc.txt
  # NOTE: retrieval/process/web POST is intercepted by handler 11a above
  # (intentional CVE-2026-65958 bait); all other retrieval paths fall here.
  # ===========================================================================
  - regex: "^/api/v1/(prompts|tools|knowledge|functions|files|models|retrieval)(/.*)?$"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # ===========================================================================
  # 11c. /ollama/* and /openai/* — Open WebUI's proxy routes to the upstream
  # Ollama/OpenAI backends. Captured behavior:
  #   GET /ollama/api/tags     → 401 {"detail":"Not authenticated"}
  #   GET /ollama/api/version  → 500 {"detail":"WebUI could not connect to Ollama"}
  #   GET /ollama/             → 200 {"status":true}
  #   GET /openai/models       → 401
  #   GET /openai/             → 401
  # The /ollama/api/version 500 is informative: it tells the operator
  # there's a backend connectivity issue, which is realistic. We emit it
  # to preserve realism without exposing inference (which would burn LLM budget).
  # ===========================================================================
  - regex: "^/ollama/?$"
    method: "GET"
    handler: '{"status":true}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  - regex: "^/ollama/api/version$"
    method: "GET"
    handler: '{"detail":"WebUI could not connect to Ollama"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 500

  - regex: "^/ollama/"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  - regex: "^/openai(/.*)?$"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # ===========================================================================
  # 12. GET /static/* — REAL captured behavior: 404 + {"detail":"Not Found"}.
  # Real /static/ paths that exist serve the file; unknown paths return JSON
  # 404, NOT the SPA HTML. Captured at static_app_css.txt + static_nonexist.txt.
  # ===========================================================================
  - regex: "^/static/"
    handler: '{"detail":"Not Found"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 404

  # ===========================================================================
  # 13. GET /favicon.ico — REAL Open WebUI serves the SPA shell for the
  # favicon path (FastAPI catch-all matches before the static mount). Capture
  # confirms content-length=11028 + content-type=text/html. We emit a tiny
  # ICO byte sequence instead — small deviation, but a true SPA-shaped HTML
  # for /favicon.ico would itself be a tell (browsers expect image bytes).
  # This is an INTENTIONAL DEVIATION documented here. Status 204 preserves
  # zero-body behavior; the empty `handler: ""` plus 204 is wire-compatible
  # with the "favicon does not exist" path that most fingerprinters expect.
  # ===========================================================================
  - regex: "^/favicon\\.ico$"
    handler: ""
    headers:
      - "Content-Type: image/x-icon"
      - "Server: uvicorn"
    statusCode: 204

  # ===========================================================================
  # 14. GET /manifest.json — captured shape verbatim from real Open WebUI
  # 0.9.5. Only Open WebUI emits this exact JSON shape; matching it lets
  # us pass PWA fingerprint checks.
  # ===========================================================================
  - regex: "^/manifest\\.json$"
    method: "GET"
    handler: '{"name":"Open WebUI","short_name":"Open WebUI","description":"Open WebUI is an open, extensible, user-friendly interface for AI that adapts to your workflow.","start_url":"/","display":"standalone","background_color":"#343541","icons":[{"src":"/static/logo.png","type":"image/png","sizes":"500x500","purpose":"any"},{"src":"/static/logo.png","type":"image/png","sizes":"500x500","purpose":"maskable"}],"share_target":{"action":"/","method":"GET","params":{"text":"shared"}}}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  # ===========================================================================
  # 15. GET /robots.txt — captured verbatim: "User-agent: *\nDisallow: /\n"
  # Real Open WebUI blanket-disallows crawlers. We match.
  # ===========================================================================
  - regex: "^/robots\\.txt$"
    handler: |
      User-agent: *
      Disallow: /
    headers:
      - "Content-Type: text/plain; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200

  # ===========================================================================
  # ========== INTENTIONAL-DEVIATION HANDLERS (HONEYPOT LURES) ================
  # The following endpoints are NOT served by real Open WebUI 0.9.5 (they
  # all return SPA HTML in the capture). We expose them as deliberate
  # bait for MCP-aware / agent-aware scanners that probe well-known paths.
  # Documented as intentional deviations per feedback_capture_first_lure_authoring.
