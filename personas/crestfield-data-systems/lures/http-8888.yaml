  # MCP discovery — advertises both Open WebUI's "bridge" + Crestfield Platform
  # on :8000 (cross-port coherence with sibling mcp-8000 lure).
  - regex: "^/\\.well-known/mcp\\.json$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"mcpServers":{"webui-mcp":{"url":"http://localhost:8888/mcp/sse","transport":"sse","description":"Open WebUI MCP bridge — chat management and model interaction","capabilities":["tools"]},"{{ persona.lure_content.service_name | default("platform") }}-platform":{"url":"http://localhost:8000/mcp","transport":"streamable-http","description":"{{ persona.lure_content.platform_display_name | default(persona.display_name) }} — IAM, logging, config store, MLflow tracking proxy","capabilities":["tools","resources"],"alternateTransport":{"url":"http://localhost:8000/sse","transport":"sse"}}}}'

  # Root-level /sse — scanners check this first for MCP SSE transport.
  - regex: "^/sse$"
