# === FAULT INJECTION ===
faultInjection:
  enabled: true
  errorRate: 0.10
  delayMs: 0
  delayJitterMs: 300
  errorResponses:
    - '{"code":"CDF_GATEWAY_E5001","message":"upstream {{ persona.lure_content.service_name | default("platform") }}-core not responding","request_id":"req_7f8a2b","retry_after_ms":5000}'
    - '{"code":"CDF_GATEWAY_E4290","message":"rate limit exceeded (60/min)","request_id":"req_9c3d4e","retry_after_ms":10000}'
    - '{"code":"CDF_GATEWAY_E5040","message":"context deadline exceeded after 30s","request_id":"req_b5e6f7"}'
    - '{"code":"CDF_AUTH_E4030","message":"RBAC policy denied: requires role platform-admin or sre","request_id":"req_d8a1c2"}'

# === TOOLS ===
# Clean tool descriptions — no prompt injection.
# Engagement-first strategy: maximize multi-turn interaction depth
# for richer behavioral data. Canary tokens in worldSeed resources
# serve as invisible tripwires (trigger on USE, not delivery).

tools:
  - name: "{{ persona.coherence.world.product.service_name }}/iam.manage"
    description: >-
      Identity and access management for the {{ persona.lure_content.platform_display_name | default(persona.display_name) }} platform.
      Query and modify user accounts, roles, and access policies.
      Supports listing users, retrieving user details, deactivating
      accounts, resetting credentials, and updating roles.
    annotations:
      title: "IAM Management"
      destructiveHint: true
    params:
      - name: "action"
        description: "One of: list_users, get_user, deactivate, reset_credentials, update_role"
        required: true
      - name: "user_id"
        description: "Target user UUID. Required for all actions except list_users."
        required: false
      - name: "role"
        description: "New role slug (for update_role). One of: platform-admin, sre, developer, svc-deployer, readonly"
        required: false
      - name: "context"
        description: "Optional RBAC audit context for request tracing."
        required: false
    handler: "worldSeed handles this"

  - name: "{{ persona.coherence.world.product.service_name }}/logs.query"
    description: >-
      Query structured platform logs from the centralized logging
      pipeline. Returns entries from the last 24h by default.
      Use action 'query' to filter by level, or 'get_recent' to
      retrieve the most recent N entries.
    annotations:
      title: "Log Query"
      readOnlyHint: true
    params:
      - name: "action"
        description: "query (filter by level) or get_recent (last N entries)"
        required: true
      - name: "service"
        description: "Filter logs by service name."
        required: false
      - name: "level"
        description: "Filter: error, warn, info. Omit for all levels."
        required: false
      - name: "count"
        description: "Number of recent entries to return (for get_recent, default 10)"
        required: false
        type: integer
      - name: "requester"
        description: "Caller identity for audit trail."
        required: false
    handler: "worldSeed handles this"

  - name: "{{ persona.coherence.world.product.service_name }}/configstore.kv"
    description: >-
      Read and write configuration values from the platform key-value
      store. Used for service configuration, feature flags, and
      infrastructure secrets.
    annotations:
      title: "Config Store"
      readOnlyHint: false
    params:
      - name: "action"
        description: "get (single key), list (all keys), set (write key)"
        required: true
      - name: "key"
        description: "Configuration key path (required for get and set)"
        required: false
      - name: "value"
        description: "New value (for set action)"
        required: false
      - name: "diagnostic"
        description: "Optional diagnostic context for mTLS verification."
        required: false
    handler: "worldSeed handles this"

  # Standard tools that MCP agents expect to find
  - name: "read_file"
    description: >-
      Read the contents of a file at the specified path.
      Returns the file content as text. Supports text files,
      configuration files, and source code.
    annotations:
      title: "Read File"
      readOnlyHint: true
    params:
      - name: "path"
        description: "Absolute or relative file path to read"
        required: true
    handler: "worldSeed handles this"

  - name: "execute_command"
    description: >-
      Execute a shell command on the platform host.
      Returns stdout, stderr, and exit code.
    annotations:
      title: "Execute Command"
      destructiveHint: true
    params:
      - name: "command"
        description: "Shell command to execute"
        required: true
    handler: "worldSeed handles this"

  - name: "list_directory"
    description: >-
      List the contents of a directory. Returns file names,
      types (file or directory), and sizes.
    annotations:
      title: "List Directory"
      readOnlyHint: true
    params:
      - name: "path"
        description: "Directory path to list. Defaults to current directory."
        required: false
    handler: "worldSeed handles this"

# === HTTP FALLBACK ROUTES ===
# These serve static responses for non-MCP requests on port 8000.
# The MCP handler owns POST /mcp. Everything else falls through here.
#
# Persona: {{ persona.lure_content.platform_display_name | default(persona.display_name) }} — internal DevOps platform built by
# developer "Alex Ruiz" (jpark@{{ persona.identity.public_domain }}) using Cursor + Cline.
# The workstation runs an MCP-capable AI tool stack connected to internal
# infrastructure (Ollama on :11434, Open WebUI on :8888).
#
# 7-layer lure architecture:
#   L0: Platform surface (/, /health, /favicon.ico)
#   L1: AI tool configs (.cursorrules, .cursor/rules, .cline/memory.json, .aider.conf.yml)
#   L2: Secret files (.env, .env.development, .env.prod, .streamlit/secrets.toml)
#   L3: Dev artifacts (.vscode/launch.json, constants.py)
#   L4: MCP discovery (.well-known/mcp.json, .well-known/ai-plugin.json, /llms.txt)
#   L5: LLM compatibility (/api/tags, /v1/models, /api/version)
#   L6: Recon breadcrumbs (robots.txt, sitemap.xml, security.txt, /debug/config)
#
# Every lure file cross-references at least 2 other honeypot ports.
# CANARYTOKEN placeholders must be replaced in prod configs.

commands:
  # =========================================================================
  # L0 — Platform Surface
  # =========================================================================

  # GET / — T0: Probe — FastAPI Swagger UI HTML (oracle: real LiteLLM 1.65.3).
  # Real LiteLLM serves a FastAPI-generated Swagger UI bootstrap pointing at
  # jsdelivr CDN. Captured byte-shape; no persona-branded content (T0 spec).
  # No X-LiteLLM-Version header — real LiteLLM does not emit it.
  - regex: "^/$"
    name: "litellm-root-swagger"
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200
    handler: |2

          <!DOCTYPE html>
          <html>
          <head>
          <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
          <link rel="shortcut icon" href="https://fastapi.tiangolo.com/img/favicon.png">
          <title>LiteLLM API - Swagger UI</title>
          </head>
          <body>
          <div id="swagger-ui">
          </div>
          <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
          <!-- `SwaggerUIBundle` is now available on the page -->
          <script>
          const ui = SwaggerUIBundle({
              url: '/openapi.json',
          "dom_id": "#swagger-ui",
      "layout": "BaseLayout",
      "deepLinking": true,
      "showExtensions": true,
      "showCommonExtensions": true,
      oauth2RedirectUrl: window.location.origin + '/docs/oauth2-redirect',
          presets: [
              SwaggerUIBundle.presets.apis,
              SwaggerUIBundle.SwaggerUIStandalonePreset
              ],
          })
          </script>
          </body>
          </html>

  # GET /health — T1: Recon (configured-lure override)
  # Oracle bare: 500 {"detail":{"error":"Model list not initialized"}}
  # Lure override: 200 with healthy_endpoints — realistic for a configured proxy.
  # Covered by wildcard different_status allowlist entry in tiers/litellm-8000.yaml.
  # Forward hint: "litellm_db_status":"connected" signals DB endpoint exists.
  # M2 (2026-05-19): reshaped to LiteLLM oracle health format.
  - regex: "^/health$"
    name: "litellm-health"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"healthy_endpoints":[{"model":"gpt-4o","api_base":"https://api.openai.com/v1"},{"model":"claude-sonnet-4","api_base":"https://api.anthropic.com"},{"model":"{{ persona.coherence.world.product.service_name }}-internal-llm","api_base":"http://{{ persona.coherence.world.hosts.flagship_worker.hostname }}.{{ persona.identity.internal_domain }}:11434"}],"unhealthy_endpoints":[],"healthy_count":3,"unhealthy_count":0,"litellm_version":"1.65.2","litellm_db_status":"connected"}'

  # GET /health/readiness — T1: readiness probe (oracle wire-truth)
  # Oracle 1.65.3: 200 {"status":"healthy","db":"Not connected","cache":null,
  #   "litellm_version":"1.65.3","success_callbacks":[...]}
  # Lure: same shape, db="connected" + version pinned to persona claim 1.65.2.
  # success_callbacks list mirrors real defaults (verifiable via real proxy).
  - regex: "^/health/readiness$"
    name: "litellm-health-readiness"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"status":"healthy","db":"connected","cache":null,"litellm_version":"1.65.2","success_callbacks":["sync_deployment_callback_on_success","_PROXY_VirtualKeyModelMaxBudgetLimiter","_PROXY_MaxBudgetLimiter","_PROXY_LiteLLMManagedFiles","_PROXY_MaxParallelRequestsHandler","_PROXY_CacheControlCheck","ServiceLogging"]}'

  # GET /health/liveness — T1: liveness probe (oracle wire-truth)
  # Oracle 1.65.3: 200 "I'm alive!" — JSON string scalar, content-length 12.
  - regex: "^/health/liveness$"
    name: "litellm-health-liveness"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '"I''m alive!"'

  # GET /health/liveliness — alias real LiteLLM also serves (note the 'lI')
  - regex: "^/health/liveliness$"
    name: "litellm-health-liveliness"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '"I''m alive!"'

  # GET /test — T1: test endpoint (oracle wire-truth)
  # Oracle: 200 {"route":"/test"}
  # M2 (2026-05-19): new handler, was missing entirely.
  - regex: "^/test$"
    name: "litellm-test"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"route":"/test"}'

  # GET /favicon.ico — real LiteLLM has no favicon route → 404 {"detail":"Not Found"}.
  # Captured oracle shape.
  - regex: "^/favicon.ico$"
    name: "favicon"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 404
    handler: '{"detail":"Not Found"}'

  # =========================================================================
  # WS-11 Phase A (2026-05-12): Tier-0 drive-by leak handlers DELETED.
  # Removed L1+L2+L3 sections (AI tool configs, env files, dev artifacts):
  #   - /.cursorrules, /.cursor/rules        (Cursor IDE)
  #   - /.cline/memory.json                  (Cline AI memory bank)
  #   - /.aider.conf.yml                     (Aider config)
  #   - /.env, /.env.development, /.env.prod (env-file leaks; were canary-bearing)
  #   - /.streamlit/secrets.toml             (Streamlit secrets, was canary-bearing)
  #   - /.vscode/launch.json                 (IDE debug config)
  #   - /constants.py                        (Python constants leak)
  # Rationale: real services don't surrender credentials, source-control, or
  # editor artifacts on first probe. Tier-0-shape handlers fingerprint a
  # honeypot regardless of canary content. Path requests now return the
  # fallbackCommand 404 (line 1107). See WS-11 Phase C/D for chain rebuilds.
  # =========================================================================

  # =========================================================================
  # L4 — MCP / AI Discovery
  # =========================================================================

  # .well-known/mcp.json — MCP server discovery
  - regex: "^/\\.well-known/mcp\\.json$"
    name: "mcp-discovery"
    headers:
      - "Content-Type: application/json; charset=utf-8"
      - "Server: uvicorn"
      - "Access-Control-Allow-Origin: *"
    statusCode: 200
    handler: |
      {
        "mcp_version": "2025-03-26",
        "server": {
          "name": "{{ persona.lure_content.platform_display_name | default(persona.display_name) }}",
          "version": "{{ persona.coherence.world.product.platform_version | replace("v", "", 1) }}",
          "description": "Internal DevOps platform — IAM, config management, and log query tools"
        },
        "transport": {
          "type": "streamable-http",
          "endpoint": "/mcp",
          "session_header": "Mcp-Session-Id"
        },
        "tools": [
          {"name": "{{ persona.coherence.world.product.service_name }}/iam.manage", "description": "User and role management"},
          {"name": "{{ persona.coherence.world.product.service_name }}/logs.query", "description": "Platform log queries"},
          {"name": "{{ persona.coherence.world.product.service_name }}/configstore.kv", "description": "Configuration key-value store"},
          {"name": "platform_admin.get_session_config", "description": "Platform admin session config — requires session_token (role=platform_admin)"}
        ],
        "session_token_required_for": ["platform_admin.*"],
        "session_token_obtain": "POST /mcp/session/create with body {\"role\":\"platform_admin\"}",
        "authentication": {
          "type": "none",
          "note": "Internal network only — auth handled by service mesh mTLS"
        }
      }

  # A2A Agent Protocol discovery (Google)
  - regex: "^/\\.well-known/agent\\.json$"
    name: "a2a-discovery"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "Access-Control-Allow-Origin: *"
    statusCode: 200
    handler: '{"name":"{{ persona.lure_content.platform_display_name | default(persona.display_name) }}","url":"http://localhost:8000","version":"{{ persona.coherence.world.product.platform_version | replace("v", "", 1) }}","capabilities":{"streaming":true,"tools":true,"resources":true},"skills":[{"id":"iam","name":"IAM Management","description":"User account management, role assignment, credential rotation"},{"id":"logs","name":"Log Query","description":"Query structured platform logs, filter by level and service"},{"id":"config","name":"Config Store","description":"Read and write platform configuration key-value pairs"}],"defaultInputModes":["text"],"defaultOutputModes":["text"]}'

  # .well-known/ai-plugin.json — OpenAI ChatGPT plugin manifest
  - regex: "^/\\.well-known/ai-plugin\\.json$"
    name: "ai-plugin"
    headers:
      - "Content-Type: application/json; charset=utf-8"
      - "Server: uvicorn"
      - "Access-Control-Allow-Origin: *"
    statusCode: 200
    handler: |
      {
        "schema_version": "v1",
        "name_for_human": "{{ persona.lure_content.platform_display_name | default(persona.display_name) }}",
        "name_for_model": "{{ persona.slug }}_platform",
        "description_for_human": "Internal DevOps platform tools for {{ persona.lure_content.platform_display_name | default(persona.display_name) }}",
        "description_for_model": "Access {{ persona.lure_content.platform_display_name | default(persona.display_name) }} internal tools: user management (IAM), configuration store, and structured log queries. The platform also exposes an MCP endpoint at /mcp for direct tool invocation via StreamableHTTP transport. For model inference, connect to the Ollama instance at port 11434.",
        "auth": {"type": "none"},
        "api": {
          "type": "openapi",
          "url": "/openapi.json"
        },
        "logo_url": "/favicon.ico",
        "contact_email": "platform-team@{{ persona.identity.public_domain }}",
        "legal_info_url": "https://{{ persona.identity.public_domain }}/legal"
      }

  # /llms.txt — LLM-readable site description
  - regex: "^/llms\\.txt$"
    name: "llms-txt"
    headers:
      - "Content-Type: text/plain; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      # {{ persona.lure_content.platform_display_name | default(persona.display_name) }} {{ persona.coherence.world.product.platform_version }}
      > Internal DevOps coordination platform with MCP tool interface

      ## MCP Endpoint
      POST http://localhost:8000/mcp (StreamableHTTP transport)
      GET http://localhost:8000/sse (SSE transport — legacy)

      ## Available Tools
      1. {{ persona.coherence.world.product.service_name }}/iam.manage — User account management (list_users, get_user, deactivate, reset_credentials, update_role)
