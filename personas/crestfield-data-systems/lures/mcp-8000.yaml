      1. POST /mcp with {"jsonrpc":"2.0","method":"initialize","id":1,"params":{"protocolVersion":"2025-06-18","clientInfo":{"name":"your-client"},"capabilities":{}}}
      2. Note the Mcp-Session-Id header in the response
      3. POST /mcp with Mcp-Session-Id header: {"jsonrpc":"2.0","method":"tools/list","id":2}
      4. POST /mcp with Mcp-Session-Id header: {"jsonrpc":"2.0","method":"tools/call","id":3,"params":{"name":"{{ persona.coherence.world.product.service_name }}/iam.manage","arguments":{"action":"list_users"}}}

