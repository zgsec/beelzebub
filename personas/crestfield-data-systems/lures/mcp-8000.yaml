apiVersion: "v1"
protocol: "mcp"
address: ":8000"
description: "{{ persona.lure_content.platform_display_name | default(persona.display_name) }}"
# v8 Phase 0: declares response capture intent for this service.
# The MCP plugin already populates tracer.Event.CommandOutput with the
# JSON-RPC response body, so the operator-facing data flow is unchanged
# today. The flag documents intent and lets future Phase work wire MCP
# response_body without a config change. Token scrubbing applies via
# api/canary_extractor.redact_known_tokens at ingest regardless of
# protocol — see plan §1.5-A.
captureRequestBody: true
captureResponseBody: true
requestBodyMaxBytes: 65536
responseBodyMaxBytes: 65536

# ========================================================================
# CAPTURE-FIRST AUTHORING (2026-05-25 — overlay synced from base 5040098)
# ========================================================================
# Real-LiteLLM endpoint bodies (/, /health/*, /test, /v1/models,
# /openapi.json, /api/*, /v1/chat/completions, catch-all 404) were
# captured from a live LiteLLM 1.65.3 instance and substituted with
# canaries/persona where natural. See
# honeypot-research/tools/oracle-diff/litellm-1.65.3/ for the captures.
# Note: persona.coherence.world.hosts.litellm.version says "1.65.2".
# Real 1.65.3 is the closest installable patch — wire shape is identical
# between 1.65.2 and 1.65.3 (no breaking changes in 1.65.x). The
# substitution restores the lure's claimed version.
#
# Documented intentional deviations from real LiteLLM:
#   - /health (unauthed): real returns 401. Lure returns a populated
#     200 "healthy_endpoints" payload — a configured-proxy plausible
#     override. Covered by tiers/litellm-8000.yaml allowlist.
#   - /v1/models (unauthed): real returns 401. Lure returns the
#     configured model list (realistic for a non-master_key deploy).
#   - Lure-only honeypot surfaces: /.well-known/mcp.json,
#     /.well-known/agent.json, /.well-known/ai-plugin.json,
#     /.well-known/security.txt, /llms.txt, /robots.txt, /sitemap.xml,
#     /sse, /mcp-sse, /docs, /debug/config, /config, /api/v2/*,
#     /internal/*, /admin*, /wp-*, /shell, /favicon.ico, all Phase C/D
#     chain handlers, ALL L7 LiteLLM Admin Surface handlers
#     (/model/info, /key/*, /user/*, /team/*, /budget/*, /spend/*,
#     /global/spend/*, /litellm_config.yaml, /config/yaml, /get/config*,
#     /credential/list, /rest/oauth2-credential/callback, /guardrails/*,
#     /mcp-rest/*, /prompts/*, /nginx_status) — overlay-specific lures.
#   - All handlers emit Server: uvicorn (real LiteLLM is uvicorn-shipped).
#     L7 admin surface previously advertised Server: nginx/1.25.4 for
#     CVE-2026-42945 plausibility — REMOVED for fleet coherence + real
#     LiteLLM wire truth. CVE classifier (if it depends on nginx Server)
#     must be updated separately.
#   - All handlers OMIT the X-LiteLLM-Version header (real LiteLLM does
#     not emit it; only the body carries the version).
# ========================================================================

# === STATEFUL WORLD MODEL ===
# Each connecting IP gets a fresh copy of this state.
# Replace CANARYTOKEN placeholders with real tokens from canarytokens.org
#
# Deception strategy: engagement-first (no prompt injection)
#   - Realistic platform surface (passes human/agent inspection)
#   - Breadcrumb trail (high-value data mixed with mundane config)
#   - Canarytoken tripwires (external use triggers alerts)
#
# Injection removed to maximize multi-turn engagement depth.
# Canary tokens are invisible — they trigger on USE, not delivery.

worldSeed:
