#   persona.coherence.world.hosts.db_mysql_app (10.0.3.51:3306), NOT the
#   primary OLTP store — db_primary is PostgreSQL 15 on 10.0.3.50 (a Mongo-
#   sized data-platform startup wouldn't run its main OLTP on MySQL when the
#   persona already has Postgres + Redis + Influx in the stack). The mysql
#   instance is the legacy adminer/Metabase/wordpress-style "misc team app"
#   DB that platform engineers haven't gotten around to retiring.
#
#   Version pinned to 8.0.39-0ubuntu0.22.04.2 to match persona.coherence
#   .world.hosts.db_mysql_app.version exactly. Current jammy-updates is
#   8.0.45-0ubuntu0.22.04.1 (as of 2026-05-25, captured via apt-cache
#   madison in oracle container ubuntu:22.04) — the persona-pinned .39 is
#   the historical Q1 jammy security release (validates against archive.
#   ubuntu.com/jammy-security/main pool).
#
#   Per persona narrative: db-app-mysql-01 host on the internal subnet at
#   db-app-mysql-01.{{ persona.coherence.world.company.internal_domain }}.
#
# Capture-first ground truth (oracle-diff/mysql-8.0.39/):
#   - Real upstream mysql:8.0.39 server_version string is bare "8.0.39"
#     (no -0ubuntu0 suffix — that's Oracle's upstream tarball not the
#     Canonical-packaged build).
#   - Capability flags 0xdfffffff (everything-on incl. SSL+COMPRESS) on
#     upstream; our handler intentionally OMITS CLIENT_SSL and CLIENT_COMPRESS
#     (advertising them then failing the upgrade is itself a tell) — see
#     comment in protocols/strategies/TCP/mysql_handshake.go:52-55.
#   - charset 0xff (utf8mb4_0900_ai_ci), auth_plugin_data_len 21,
#     status_flags 0x0002 (autocommit), auth_plugin caching_sha2_password —
#     all match our handler defaults.
#
# CAPTURE DEPTH:
#   `serviceProtocol: mysql-handshake-v10` engages the binary-protocol handler
#   in beelzebub-fork's TCP strategy (protocols/strategies/TCP/mysql_handshake.go).
#   Per-connection lifecycle:
#     1. Write real Handshake Packet v10 (protocol=10, randomized 4-byte
#        thread_id, 20-byte cryptographic scramble, utf8mb4_0900_ai_ci charset,
#        full capability bitmap incl. CLIENT_PROTOCOL_41 + CLIENT_PLUGIN_AUTH
#        + CLIENT_CONNECT_ATTRS).
#     2. Read client's Handshake Response 41 binary frame.
#     3. Parse + record: username, capability flags (hex), auth_response (hex
#        of the scramble response), auth_plugin_name, database, and the
#        connect_attrs map. The connect_attrs (_client_name / _client_version
#        / _pid / program_name) directly identify the client library —
#        mysql-connector-python vs Go-MySQL-Driver vs libmysqlclient vs
#        MariaDB Connector/J vs mysql2 — without needing fingerprint
#        heuristics. This is our SINGLE RICHEST intel signal vs a banner-grab.
#     4. Respond with ERR 1045 #28000 "Access denied for user 'X'@'host'
#        (using password: YES)". We NEVER accept auth — that would imply a
#        successful login on a honeypot, crossing the observation-vs-
#        entrapment line.
#     5. Close.
#
# NO WATERMARK / CANARY EMBEDDING:
#   MySQL clients bring their own credentials; they do not consume any string
#   the server returns. No natural watermark surface here — intel comes
#   entirely from the captured handshake. The cross-pollination POC captures
#   the inverse direction: passwords harvested elsewhere being TRIED here,
#   which the username + auth_response fields already record.
#
# Built: 2026-05-18 (Disney Phase 8)
# Ref:   https://dev.mysql.com/doc/dev/mysql-server/latest/page_protocol_connection_phase_packets_protocol_handshake_v10.html
# =============================================================================

apiVersion: "v1"
protocol: "tcp"
address: ":3306"
description: "{{ persona.coherence.world.company.display_name }} — MySQL 8.0.39 platform app DB (db-app-mysql-01.{{ persona.coherence.world.company.internal_domain }})"
banner: ""
serverName: ""
serverVersion: "8.0.39-0ubuntu0.22.04.2"
deadlineTimeoutSeconds: 30

serviceProtocol: "mysql-handshake-v10"
mysqlAuthPlugin: "caching_sha2_password"
