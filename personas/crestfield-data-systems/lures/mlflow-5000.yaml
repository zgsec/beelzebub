  # =========================================================================
  # CVE-bait handlers — enticement-not-entrapment guarantees:
  # (1) static responses only, no real exec/file/network I/O
  # (2) bytes are fictional + watermarked + canary-bearing
  # (3) one AKIA leak slot per CVE per lure_lint R9
  # =========================================================================

  # 12. CVE-2024-2928 — RCE via crafted artifact path in model-versions/get-download-uri
  # Real route per model_registry.proto / handlers.py:2005: GET /api/2.0/mlflow/model-versions/get-download-uri
  # Real success shape is ONLY {"artifact_uri":"<resolved-uri>"}. No extra
  # fields. We embed the canary INTO the artifact_uri (the natural leak path:
  # MLflow resolves the download URI from a misconfigured artifact backend
  # that's leaking the S3 path with embedded credentials). No fictional
  # _debug_resolved_content / _warning fields — those would be a tell.
  # This must precede the catch-all and is GET (real method per proto).
  - regex: "^/api/2\\.0/mlflow/model-versions/get-download-uri(\\?.*)?$"
    method: "GET"
    name: "mlflow/cve-2024-2928-download-uri"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"artifact_uri":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_CVE_2928_DOWNLOAD}-${MLFLOW_CANARY_AWS_SECRET_CVE_2928_DOWNLOAD}/1/a852a23d52c285f77542e105583eda04/artifacts/model"}'

  # 13. CVE-2024-37058 — path traversal via /get-artifact?path=
  # Real route per mlflow/server/__init__.py:73. Real returns raw artifact
  # bytes; we return text/plain LFI payload (passwd-shaped, watermarked).
  - regex: "^/get-artifact(\\?.*)?$"
    method: "GET"
    name: "mlflow/cve-2024-37058-lfi-passwd"
    headers:
      - "Content-Type: text/plain"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      # /etc/passwd (resolved via artifact path — this is bug MLFLOW-7124)
      root:x:0:0:root:/root:/usr/sbin/nologin
      daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin
      bin:x:2:2:bin:/bin:/usr/sbin/nologin
      mlflow:x:1001:1001:MLflow Service,,,:/var/lib/mlflow:/bin/bash
      app:x:1002:1002:Application,,,:/opt/cdf/app:/bin/bash
      # CDF_WATERMARK={{ persona.coherence.world.watermark_passwords.mlflow }}
      # AWS_ACCESS_KEY_ID=${MLFLOW_CANARY_AWS_KEY_CVE_37058_LFI}
      # AWS_SECRET_ACCESS_KEY=${MLFLOW_CANARY_AWS_SECRET_CVE_37058_LFI}

  # 14. CVE-2023-6975 — SSRF via `source` field in model-versions/create
  # Real route: POST /api/2.0/mlflow/model-versions/create.
  # Real success: 200 + {"model_version":{name,version,creation_timestamp,
  # last_updated_timestamp,current_stage,source,run_id,status}}. NO extra
  # fields. Real on bad source (http URI in 2.18.0): 400 INVALID_PARAMETER_VALUE.
  # Lure choice: ACCEPT the bad source (the CVE behavior in vulnerable
  # versions), echo it back via ${request.json.source}, and leak the canary
  # via the run_id (which a 0-experiments fresh-version flow would naturally
  # be empty — so this is fictional but plausible bloat). The IMDS response
  # body that the previous handler emitted was unrealistic (real MLflow never
  # returns IMDS-shaped JSON). For maximum stealth we leak the canary in
  # `source` itself: if attacker POSTed source=http://X, the response now
  # carries source="<their-X>?cdf_artifact_creds=${AKIA}". That looks like
  # the server URL-mangled their input through a misconfigured rewriter.
  - regex: "^/api/2\\.0/mlflow/model-versions/create$"
    method: "POST"
    name: "mlflow/cve-2023-6975-source-echo"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"model_version":{"name":"${request.json.name}","version":"4","creation_timestamp":1739100000000,"last_updated_timestamp":1739100000000,"current_stage":"None","source":"${request.json.source}?aws_access_key_id=${MLFLOW_CANARY_AWS_KEY_CVE_6975_IMDS}&aws_secret_access_key=${MLFLOW_CANARY_AWS_SECRET_CVE_6975_IMDS}&cdf_release={{ persona.coherence.world.watermark_passwords.mlflow }}","status":"PENDING_REGISTRATION","run_id":"a852a23d52c285f77542e105583eda04"}}'

  # 15. CVE-2023-1177 — LFI via path-traversal on model-version artifact fetch
  # Real route per mlflow/server/__init__.py:79:
  #   @app.route("/model-versions/get-artifact")
  # Real returns raw file bytes (text/plain) on resolved fetch. Handler shape
  # matches: AWS-credentials file as if attacker walked
  # `?path=../../../opt/cdf/secrets/.aws/credentials`.
  - regex: "^/model-versions/get-artifact(\\?.*)?$"
    method: "GET"
    name: "mlflow/cve-2023-1177-lfi-credentials"
    headers:
      - "Content-Type: text/plain"
      - "Server: uvicorn"
    statusCode: 200
    handler: "[default]\naws_access_key_id = ${MLFLOW_CANARY_AWS_KEY_CVE_1177_LFI}\naws_secret_access_key = ${MLFLOW_CANARY_AWS_SECRET_CVE_1177_LFI}\nregion = us-east-2\n# Crestfield Data Systems — MLflow artifact store credentials\n# cdf_release={{ persona.coherence.world.watermark_passwords.mlflow }}\n"

  # 16. CVE-2023-6014 — auth-bypass account creation
  # Real route per mlflow/server/auth/routes.py + auth/__init__.py:917-920:
  #   POST /api/2.0/mlflow/users/create (auth-plugin only — vanilla MLflow 404s).
  # The CVE: real MLflow auth-plugin allows POST without basic-auth in
  # pre-2.5.0 (the lure is staying-in-character as a vulnerable instance).
  # Real success shape (verified against MLflow 2.18.0 auth-plugin):
  #   {"user":{"experiment_permissions":[],"id":N,"is_admin":bool,
  #            "registered_model_permissions":[],"username":"X"}}
  # We emit EXACTLY that shape (no _internal_token / _internal_secret
  # bloat — those fields don't exist in the real response). The canary is
  # smuggled into the username via a plausible service-account naming
  # convention: "mlflow-svc-<canary>" (real teams DO embed creds in
  # service-account names in misconfigured setups).
  - regex: "^/api/2\\.0/mlflow/users/create$"
    method: "POST"
    name: "mlflow/cve-2023-6014-auth-bypass"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"user":{"experiment_permissions":[],"id":2,"is_admin":true,"registered_model_permissions":[],"username":"mlflow-svc-${MLFLOW_CANARY_AWS_KEY_CVE_6014_BYPASS}-${MLFLOW_CANARY_AWS_SECRET_CVE_6014_BYPASS}"}}'

  # =========================================================================
  # Catch-all — must be last. Real MLflow 404 is plain Flask HTML, NOT a JSON
  # error_code shape. The error_code shape is ONLY emitted by well-formed REST
  # handlers on lookup-miss (e.g. /experiments/get?experiment_id=999). Random
  # paths get the HTML 404 below (matches oracle catchall_404.txt byte-shape).
  # =========================================================================
  - regex: "^.*$"
    name: "mlflow/404-catchall"
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 404
    handler: |
      <!doctype html>
      <html lang=en>
      <title>404 Not Found</title>
      <h1>Not Found</h1>
      <p>The requested URL was not found on the server. If you entered the URL manually please check your spelling and try again.</p>
