# =============================================================================
# MLflow Tracking Server Honeypot — Port 5000 — Crestfield overlay
# =============================================================================
#
# OVERLAY NOTE (2026-05-26): This file is the persona-overlay rendition of
#   configurations/services/mlflow-5000.yaml. The base config was authored
#   already persona-aware (uses persona-namespace Jinja refs and the
#   MLFLOW_CANARY env-substitution slots), so this overlay byte-mirrors
#   the oracle-aligned base — no divergence.
#   Future drift should be resolved by editing BOTH files in lockstep
#   (same convention as openai-8001.yaml POST/GET handler-pair sync notes).
#
#   The lure ships from this overlay path — bzb persona render reads
#   personas/<slug>/lures/<file>.yaml exclusively (see bzb/src/bzb/render/
#   renderer.py::render_lures). Without this file in personas/crestfield-
#   data-systems/lures/, MLflow does not reach sensors.
#
# PERSONA: Crestfield Data Systems' platform team standardized on uvicorn/ASGI
#   and wraps MLflow's Flask app via a2wsgi behind uvicorn. Real-world this is
#   a known production pattern. Server header is uvicorn (matches fleet emergent
#   coherence — every HTTP service on FRA/EWR presents Server: uvicorn).
#   (Real vanilla MLflow ships Server: gunicorn; we deliberately mask that with
#   the persona header. ALL handlers must agree — leaking gunicorn through one
#   handler would be a tell.)
#
# DESIGN: 100% static handlers. No LLMHoneypot fallback — real MLflow is
#   deterministic, variable response shapes would be a fingerprint. Long-tail
#   unmatched paths return MLflow's exact 404 — which is plain Flask HTML,
#   NOT the JSON {error_code:RESOURCE_DOES_NOT_EXIST} shape.
#
# CANARY SLOTS (per-leak-path per lure_lint R9):
#   AWS Keys — one distinct slot per leak path:
#     ${MLFLOW_CANARY_AWS_KEY_EXP_SEARCH}     — /api/2.0/mlflow/experiments/search
#     ${MLFLOW_CANARY_AWS_KEY_EXP_GET}        — /api/2.0/mlflow/experiments/get
#     ${MLFLOW_CANARY_AWS_KEY_RUN_SEARCH}     — /api/2.0/mlflow/runs/search
#     ${MLFLOW_CANARY_AWS_KEY_MODEL_SEARCH}   — /api/2.0/mlflow/registered-models/search
#     ${MLFLOW_CANARY_AWS_KEY_CVE_2928_DOWNLOAD} — CVE-2024-2928 RCE bait
#     ${MLFLOW_CANARY_AWS_KEY_CVE_37058_LFI}     — CVE-2024-37058 path-traversal
#     ${MLFLOW_CANARY_AWS_KEY_CVE_6975_IMDS}     — CVE-2023-6975 SSRF→IMDS
#     ${MLFLOW_CANARY_AWS_KEY_CVE_1177_LFI}      — CVE-2023-1177 file://
#     ${MLFLOW_CANARY_AWS_KEY_CVE_6014_BYPASS}   — CVE-2023-6014 auth-bypass
#   (Each CVE KEY has a matching ${MLFLOW_CANARY_AWS_SECRET_<SUFFIX>}.
#    REST handlers — EXP_SEARCH, EXP_GET, RUN_SEARCH, MODEL_SEARCH — leak
#    only the KEY via natural S3-URI / source-field channels. Intentional
#    asymmetry: the REST contexts don't have a place to plausibly emit a
#    paired secret without breaking real MLflow's response shape.)
#   DNS: ${MLFLOW_CANARY_DNS} (fires on resolution; wired into the
#        experiment_id=2 artifact_location host suffix below — attempts to
#        actually fetch listed artifacts trigger DNS lookup → canary fire)
#
# ============================================================================
# ORACLE-DIFF REVISIONS 2026-05-25 — against real MLflow 2.18.0
# ============================================================================
# Captured byte-shape against real MLflow 2.18.0 running locally and corrected
# every diff. Source of truth files:
#   tools/oracle-diff/mlflow-2.18.0/_AUTHORITATIVE_ROUTE_TABLE.txt (honeypot-research)
#   tools/oracle-diff/mlflow-2.18.0/*.txt — per-endpoint captures
#
# Real-MLflow file:line citations for route methods:
#   mlflow/server/handlers.py:get_endpoints()         — protobuf-derived routes
#   mlflow/server/__init__.py:61                       — /health
#   mlflow/server/__init__.py:67                       — /version
#   mlflow/server/__init__.py:73                       — /get-artifact
#   mlflow/server/__init__.py:79                       — /model-versions/get-artifact
#   mlflow/server/auth/routes.py + auth/__init__.py:917-920 — POST /users/create
#
# CVE entry-point determinations (verified against MLflow 2.18.0 source):
#   CVE-2024-2928  GET  /api/2.0/mlflow/model-versions/get-download-uri
#                  Source: model_registry.proto -> getModelVersionDownloadUri
#                  Real success: {"artifact_uri":"<resolved-uri>"} only.
#                  Real miss:    {"error_code":"RESOURCE_DOES_NOT_EXIST","message":"Model Version (name=X, version=Y) not found"}
#                  Lure: 200 + canary INSIDE artifact_uri (s3 path embeds the AKIA).
#                  No fictional _debug_resolved_content field — that'd be a tell.
#   CVE-2024-37058 GET  /get-artifact?run_uuid=X&path=Y
#                  Source: mlflow/server/__init__.py:73 + handlers.get_artifact_handler
#                  Real returns raw artifact bytes; we return text/plain LFI payload.
#   CVE-2023-6975  POST /api/2.0/mlflow/model-versions/create
#                  Source: model_registry.proto:105 -> createModelVersion (v2.18.0)
#                  Real returns 200 + {"model_version":{...}} on accepted source,
#                  400 INVALID_PARAMETER_VALUE on non-absolute URIs.
#                  Lure: 200 + minimal model_version, source echoed from request body,
#                  canary leaked in description/tags. NO IMDS-shaped extras (those
#                  fields don't exist in MLflow's CreateModelVersion.Response).
#   CVE-2023-1177  GET  /model-versions/get-artifact?name=X&version=Y&path=Z
#                  Source: mlflow/server/__init__.py:79 + handlers.get_model_version_artifact_handler
#                  Real returns raw bytes; we return text/plain AWS credentials payload.
#   CVE-2023-6014  POST /api/2.0/mlflow/users/create
#                  Source: mlflow/server/auth/routes.py CREATE_USER + auth/__init__.py:917-920
#                  Real auth-plugin requires basic auth (401 WWW-Authenticate without).
#                  Real success shape (from oracle):
#                    {"user":{"experiment_permissions":[],"id":N,"is_admin":bool,
#                             "registered_model_permissions":[],"username":"X"}}
#                  Lure: 200 + EXACT real auth-plugin shape, canary smuggled into
#                  username field (service-account naming convention plausible).
#                  No fictional _internal_token/_internal_secret fields.
#                  The "no-auth-required" exposure IS the CVE — we don't 401.
#
# Endpoints REMOVED (they don't exist in MLflow 2.18.0 — would be a tell):
#   /api/2.0/mlflow/experiments/list      — MLflow 1.x only; use /experiments/search
#   /api/2.0/mlflow/registered-models/list — same; use /registered-models/search
#   /api/2.0/mlflow/model-versions/list    — same; use /model-versions/search
#   /metrics                               — not in vanilla MLflow (no Prometheus)
# These names will now fall through to the 404 catch-all, which now emits real
# Flask HTML 404 (not the JSON error_code shape).
#
# OTHER ORACLE-DIFF CORRECTIONS:
#   - /health Content-Type was text/plain in lure; real is text/html; charset=utf-8.
#   - /version body is plain "2.18.0" (already correct), but Content-Type is
#     text/html; charset=utf-8 in real (Flask default for string return).
#   - / (root) markup updated to match the actual React build artifact shipped
#     by mlflow-2.18.0 (different favicon path, manifest, modal div, etc).
#   - runs/get hardcoded the canonical run_id "a852..." rather than the broken
#     ${request.uuid_short} which produced an 8-hex value (real run_ids are
#     32 hex). Echo-back-by-query is not supported by Beelzebub's substitution
#     engine (only ${request.json.*} and ${request.uuid*} exist) so hardcoding
#     the same value referenced by /runs/search is the right compromise.
#   - runs response info block has both run_uuid AND run_id (legacy duplication
#     in real MLflow — the proto carries both for backcompat with 1.x clients).
#   - runs response data block adds inputs:{} (always present in real).
#   - runs response tag order: real MLflow emits mlflow.user/source.name/source.type/runName
#     first. We follow.
#   - experiments/search returns BOTH our seeded experiment AND Default (exp_id=0).
#   - experiments/get returns minimal field set (no tags array unless explicitly set).
#   - registered-models/get returns minimal shape (no latest_versions/tags unless set).
#   - registered-models/search is GET-only (POST returns 405 in real).
#   - model-versions/search is GET-only (POST returns 405), and the empty
#     response is literally {} (not {"model_versions":[],"next_page_token":""}).
#   - Removed ${time.in.12h} placeholder — Beelzebub responsesubs only supports
#     ${time.now} and ${time.ago.<N><smhd>}; ${time.in.*} would pass through as
#     literal "${time.in.12h}" in the response (a hard tell). Replaced with a
#     hardcoded plausible expiration timestamp.
#
# Spec: docs/superpowers/specs/2026-05-25-mlflow-lure-and-fleet-hardening-design.md §3
# =============================================================================

apiVersion: "v1"
protocol: "http"
address: ":5000"
description: "MLflow tracking server — Crestfield Data Systems ML platform"

# v8 Phase 0: capture both request and response bodies (Defect 1 §6)
captureRequestBody: true
captureResponseBody: true
requestBodyMaxBytes: 65536
responseBodyMaxBytes: 65536

# Persona-shaped fallback when an LLM-backed handler returns no usable content.
# We don't actually use LLMHoneypot here, but set this for consistency in case
# fault-injection ever emits a 500.
llmOfflineResponse:
  status: 500
  body: '{"error_code":"INTERNAL_ERROR","message":"Tracking store unavailable; check MLFLOW_BACKEND_STORE_URI"}'

# Fault injection — match openai-8001 pattern (WS-11 Phase D Slice 4)
# Real MLflow under load has variable response times and occasional 503s.
faultInjection:
  enabled: true
  errorRate: 0.005      # 1 in 200 → 503
  delayMs: 50           # base latency
  delayJitterMs: 450    # 0-450ms jitter
  errorResponses:
    - '{"error_code":"INTERNAL_ERROR","message":"Tracking server temporarily unavailable. Retry after backoff."}'
    - '{"error_code":"RESOURCE_LIMIT_EXCEEDED","message":"Backend store query queue full; please reduce request rate."}'

commands:
  # =========================================================================
  # Discovery / health (3 handlers)
  # =========================================================================

  # 1. GET /health — real MLflow returns 200 with body "OK", text/html; charset=utf-8
  # (Flask's default Content-Type for a string return; NOT text/plain).
  - regex: "^/health$"
    method: "GET"
    name: "mlflow/health"
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200
    handler: "OK"

  # 2. GET /version — real MLflow's version() handler returns the VERSION constant
  # directly (plain string), not JSON. Flask serves it as text/html; charset=utf-8.
  # Source: mlflow/server/__init__.py:67 — @app.route("/version") def version(): return VERSION, 200
  - regex: "^/version$"
    method: "GET"
    name: "mlflow/version"
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200
    handler: "2.18.0"

  # 3. GET / — React UI bootstrap. Markup matches mlflow-2.18.0's bundled
  # index.html (favicon at ./static-files/favicon.ico, manifest with CORS,
  # theme-color, root + modal divs, defer-loaded main.js + main.css).
  # Real response also carries Cache-Control: no-cache, Last-Modified, ETag,
  # Accept-Ranges, Content-Disposition: inline; filename=index.html — we
  # include those for byte-shape match. The JS/CSS hash strings change per
  # build; we use the actual 2.18.0 release hashes.
  - regex: "^/$"
    method: "GET"
    name: "mlflow/root-ui"
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
      - "Cache-Control: no-cache"
      - "Content-Disposition: inline; filename=index.html"
      - "Accept-Ranges: bytes"
    statusCode: 200
    handler: '<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no"/><link rel="shortcut icon" href="./static-files/favicon.ico"/><meta name="theme-color" content="#000000"/><link rel="manifest" href="./static-files/manifest.json" crossorigin="use-credentials"/><title>MLflow</title><script defer="defer" src="static-files/static/js/main.4efb7e57.js"></script><link href="static-files/static/css/main.fd7f2361.css" rel="stylesheet"></head><body><noscript>You need to enable JavaScript to run this app.</noscript><div id="root"></div><div id="modal"></div></body></html>'

  # =========================================================================
  # Top-walked REST API handlers — match real MLflow 2.18.0 response shapes
  # =========================================================================

  # 4. POST /api/2.0/mlflow/experiments/search
  # Real response includes the seeded experiments + Default (experiment_id=0).
  # Field set per experiment: experiment_id, name, artifact_location,
  # lifecycle_stage, last_update_time, creation_time. NO 'tags' field unless
  # tags have been explicitly set on the experiment (and even then the field
  # is only present, not auto-emitted as []).
  # Note: also responds to GET (real MLflow registers BOTH methods for this
  # endpoint per get_endpoints()). Method-agnostic match below catches GET too
  # via a paired handler (#4b).
  # DUPLICATE BODY — KEEP IN SYNC WITH GET variant (#4b) below.
  # If the canonical experiment list shifts (names, ids, canary slots, timestamps),
  # update BOTH this POST handler AND the #4b GET handler in lockstep. The
  # ~900-byte response body is intentionally byte-identical across methods because
  # real MLflow registers both methods on this route and clients fingerprint
  # cross-method drift. YAML-anchor refactor (&exp_search_body / *exp_search_body)
  # deferred pending Beelzebub-loader anchor-support confirmation.
  - regex: "^/api/2\\.0/mlflow/experiments/search$"
    method: "POST"
    name: "mlflow/experiments-search-post"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"experiments":[{"experiment_id":"1","name":"{{ persona.coherence.world.product.mlflow_experiment_names[0] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_EXP_SEARCH}/1","lifecycle_stage":"active","last_update_time":1738500000000,"creation_time":1735200000000},{"experiment_id":"2","name":"{{ persona.coherence.world.product.mlflow_experiment_names[1] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts.${MLFLOW_CANARY_DNS}/2","lifecycle_stage":"active","last_update_time":1738900000000,"creation_time":1736000000000},{"experiment_id":"3","name":"{{ persona.coherence.world.product.mlflow_experiment_names[2] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/3","lifecycle_stage":"active","last_update_time":1739100000000,"creation_time":1736500000000},{"experiment_id":"4","name":"{{ persona.coherence.world.product.mlflow_experiment_names[3] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/4","lifecycle_stage":"active","last_update_time":1739200000000,"creation_time":1737000000000},{"experiment_id":"0","name":"Default","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/0","lifecycle_stage":"active","last_update_time":1735000000000,"creation_time":1735000000000}]}'

  # 4b. GET /api/2.0/mlflow/experiments/search — same body as POST variant
  # (real MLflow allows both methods on this endpoint; many scanners GET first).
  # DUPLICATE BODY — KEEP IN SYNC WITH POST variant (#4 above).
  # See the sync note above the POST handler for the rationale; any edit to
  # the experiments list MUST land in both handler bodies in the same commit.
  - regex: "^/api/2\\.0/mlflow/experiments/search(\\?.*)?$"
    method: "GET"
    name: "mlflow/experiments-search-get"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"experiments":[{"experiment_id":"1","name":"{{ persona.coherence.world.product.mlflow_experiment_names[0] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_EXP_SEARCH}/1","lifecycle_stage":"active","last_update_time":1738500000000,"creation_time":1735200000000},{"experiment_id":"2","name":"{{ persona.coherence.world.product.mlflow_experiment_names[1] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts.${MLFLOW_CANARY_DNS}/2","lifecycle_stage":"active","last_update_time":1738900000000,"creation_time":1736000000000},{"experiment_id":"3","name":"{{ persona.coherence.world.product.mlflow_experiment_names[2] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/3","lifecycle_stage":"active","last_update_time":1739100000000,"creation_time":1736500000000},{"experiment_id":"4","name":"{{ persona.coherence.world.product.mlflow_experiment_names[3] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/4","lifecycle_stage":"active","last_update_time":1739200000000,"creation_time":1737000000000},{"experiment_id":"0","name":"Default","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/0","lifecycle_stage":"active","last_update_time":1735000000000,"creation_time":1735000000000}]}'

  # 5. GET /api/2.0/mlflow/experiments/get?experiment_id={id}
  # Real shape (per oracle capture): {"experiment":{experiment_id,name,
  # artifact_location,lifecycle_stage,last_update_time,creation_time}}.
  # NO 'tags' field by default. We add the canary INTO the artifact_location
  # S3 path (which is where a real misconfigured MLflow leaks bucket creds).
  - regex: "^/api/2\\.0/mlflow/experiments/get(\\?.*)?$"
    method: "GET"
    name: "mlflow/experiments-get"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"experiment":{"experiment_id":"1","name":"{{ persona.coherence.world.product.mlflow_experiment_names[0] }}","artifact_location":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_EXP_GET}/1","lifecycle_stage":"active","last_update_time":1738500000000,"creation_time":1735200000000}}'

  # 6. POST /api/2.0/mlflow/runs/search
  # Real shape: runs[].info has BOTH run_uuid AND run_id (proto carries both
  # for backcompat). info field order: run_uuid, experiment_id, run_name,
  # user_id, status, start_time, end_time, artifact_uri, lifecycle_stage,
  # run_id. data block has metrics, params, tags, and inputs:{}.
  # Tags emit in order: mlflow.user, mlflow.source.name, mlflow.source.type,
  # mlflow.runName (the runtime auto-tags, in that order in real MLflow).
  # Canary leaked in artifact_uri (s3 path).
  - regex: "^/api/2\\.0/mlflow/runs/search$"
    method: "POST"
    name: "mlflow/runs-search"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"runs":[{"info":{"run_uuid":"a852a23d52c285f77542e105583eda04","experiment_id":"1","run_name":"frosty-hawk-712","user_id":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}","status":"FINISHED","start_time":1738500000000,"end_time":1738503600000,"artifact_uri":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts-${MLFLOW_CANARY_AWS_KEY_RUN_SEARCH}/1/a852a23d52c285f77542e105583eda04/artifacts","lifecycle_stage":"active","run_id":"a852a23d52c285f77542e105583eda04"},"data":{"metrics":[{"key":"loss","value":0.0234,"timestamp":1738503000000,"step":10000},{"key":"accuracy","value":0.9421,"timestamp":1738503000000,"step":10000}],"params":[{"key":"learning_rate","value":"3e-5"},{"key":"batch_size","value":"32"},{"key":"cdf_internal_version","value":"{{ persona.coherence.world.watermark_passwords.mlflow }}"}],"tags":[{"key":"mlflow.user","value":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}"},{"key":"mlflow.source.name","value":"finetune.py"},{"key":"mlflow.source.type","value":"LOCAL"},{"key":"mlflow.runName","value":"frosty-hawk-712"},{"key":"cdf_watermark","value":"{{ persona.coherence.world.watermark_passwords.mlflow }}"}]},"inputs":{}}]}'

  # 7. GET /api/2.0/mlflow/runs/get?run_id={id}
  # Real shape mirrors runs/search single-run wrapper: {"run":{info,data}}.
  # IMPORTANT: real MLflow ECHOES the requested run_id in the response. We
  # cannot echo via Beelzebub substitution (no ${request.query.*} support),
  # so we hardcode the canonical "a852..." run_id (same as /runs/search).
  # Re-probers with different run_ids will get THIS one back — a tell to
  # sophisticated MLflow-SDK testers, but the right shape for unsophisticated
  # walkers, and far better than echoing an 8-hex ${request.uuid_short} which
  # would be invalid run_id format and break the SDK.
  - regex: "^/api/2\\.0/mlflow/runs/get(\\?.*)?$"
    method: "GET"
    name: "mlflow/runs-get"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"run":{"info":{"run_uuid":"a852a23d52c285f77542e105583eda04","experiment_id":"1","run_name":"frosty-hawk-712","user_id":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}","status":"FINISHED","start_time":1738500000000,"end_time":1738503600000,"artifact_uri":"s3://{{ persona.coherence.world.org.s3_bucket_prefix }}-mlflow-artifacts/1/a852a23d52c285f77542e105583eda04/artifacts","lifecycle_stage":"active","run_id":"a852a23d52c285f77542e105583eda04"},"data":{"metrics":[{"key":"loss","value":0.0234,"timestamp":1738503000000,"step":10000},{"key":"accuracy","value":0.9421,"timestamp":1738503000000,"step":10000}],"params":[{"key":"learning_rate","value":"3e-5"},{"key":"batch_size","value":"32"},{"key":"cdf_internal_version","value":"{{ persona.coherence.world.watermark_passwords.mlflow }}"}],"tags":[{"key":"mlflow.user","value":"{{ persona.coherence.world.people.platform_admin_1.email_prefix }}"},{"key":"mlflow.source.name","value":"finetune.py"},{"key":"mlflow.source.type","value":"LOCAL"},{"key":"mlflow.runName","value":"frosty-hawk-712"},{"key":"cdf_watermark","value":"{{ persona.coherence.world.watermark_passwords.mlflow }}"}]},"inputs":{}}}'

  # 8. GET /api/2.0/mlflow/registered-models/search
  # Real method is GET-only (POST returns 405 Method Not Allowed in 2.18.0).
  # Real minimal shape: {"registered_models":[{name,creation_timestamp,
  # last_updated_timestamp,description}]} — NO latest_versions/tags unless
  # explicitly populated. Canary leaked in the description prose.
  - regex: "^/api/2\\.0/mlflow/registered-models/search(\\?.*)?$"
    method: "GET"
    name: "mlflow/registered-models-search"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
