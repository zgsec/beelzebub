  # ───────────────────────────────────────────────────────────────────────
  # Final catch-all — any non-GET method on an unmatched path. The SPA mount
  # is GET-only, so real FastAPI returns 405 here (NOT a JSON 404).
  # ───────────────────────────────────────────────────────────────────────
  - regex: ".*"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 405
    handler: '{"detail":"Method Not Allowed"}'
