# =============================================================================
# LangFlow Honeypot — Port 7860 (CVE-2025-3248 KEV bait)
# =============================================================================
#
# PERSONA: LangFlow 1.2.4 (pre-1.3.0, vulnerable to CVE-2025-3248)
#   FastAPI + uvicorn, default :7860, unauth code-validation endpoint
#   actively exploited by the Flodrix botnet (CISA KEV, Jun 2025).
#
# VULNERABILITY:
#   POST /api/v1/validate/code accepts a JSON body containing a Python
#   `code` field and runs it through ast.parse -> compile -> direct
#   evaluation server-side with no auth and no sandbox. Public PoC:
#   github.com/verylazytech/CVE-2025-3248 — payload typically lives in
#   function defaults or decorators. Patched in 1.3.0 by requiring an
#   API key or JWT.
#
# CAPTURE:
#   `captureResponseBody: true` so the Phase-0 exporter records the JSON
#   response we sent back, and our INGEST side can correlate the request
#   body (Python code) -> response. We always answer 200 "valid", which
#   is exactly what real vulnerable LangFlow 1.2.x does — the validation
#   endpoint only reports import + AST shape, not evaluation status,
#   even though the dangerous code path already ran.
#
# CANARY MINTS DEFERRED (Path A, 2026-05-18):
#   canarytokens.org webhook validation broken; mints postponed until
#   self-hosted Canarytokens stack stands up. The /api/v1/api_key route
#   gates to 401 (matches patched-product shape). Web-bug img dropped
#   from SPA shell. Watermark password leak in /api/v1/store/components/
#   remains intact (no canary dependency).
#
# WATERMARK:
#   `cdf_prod_2026Q2-5e8d3f1b` appears in one config-leak surface
#   (/api/v1/store/components/ defaults). Cross-pollination POC — if an
#   attacker harvests this string here and tries it as an SSH password,
#   the SSH-2222 lure passwordRegex captures the cross-lure trail.
#   Pre-registered POC; baseline 0 attempts of this shape in last 90d.
#
# PERSONA-SWAPPABLE:
#   Every Crestfield-specific string comes from `persona.coherence.world.*`
#   Jinja templating. When persona swaps, this file does NOT change — only
#   persona.yaml.
#
# Response shapes verified against LangFlow main-branch endpoints.py
#   (github.com/langflow-ai/langflow) and Trend Micro CVE writeup.
#
# Built: 2026-05-18 (Disney Phase 7)
# =============================================================================
apiVersion: "v1"
protocol: "http"
address: ":7860"
description: "{{ persona.coherence.world.company.display_name }} — LangFlow visual builder (data-platform team)"
captureResponseBody: true
responseBodyMaxBytes: 65536
commands:

  # ───────────────────────────────────────────────────────────────────────
  # 1. GET / — LangFlow SPA shell (HTML)
  # Real LangFlow ships a Vite-built React SPA; index.html is small.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/$"
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
      - "Cache-Control: no-cache"
    statusCode: 200
    handler: |
      <!doctype html>
      <html lang="en">
      <head>
      <meta charset="UTF-8"/>
      <link rel="icon" type="image/x-icon" href="/static/img/langflow-icon-color.svg"/>
      <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
      <meta name="description" content="LangFlow - Build LLM workflows visually"/>
      <title>Langflow</title>
      <script type="module" crossorigin src="/assets/index-a3f2c8e1.js"></script>
      <link rel="stylesheet" crossorigin href="/assets/index-b9d4e72a.css"/>
      </head>
      <body>
      <div id="root"></div>
      <script>
        window.__LANGFLOW_CONFIG__ = {
          "version": "1.2.4",
          "frontend_timeout": 30,
          "auto_saving": true,
          "health_check_url": "/health_check"
        };
      </script>
      </body></html>

  # ───────────────────────────────────────────────────────────────────────
  # 2. GET /health_check — Real LangFlow uses this (not /health)
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/health_check$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"status":"ok","chat":"ok","db":"ok"}'

  # Some legacy LangFlow installs answered /health too — keep both happy
  - regex: "^/health$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"status":"ok","chat":"ok","db":"ok"}'

  # ───────────────────────────────────────────────────────────────────────
  # 3. GET /api/v1/version — Version probe (scanners use this to confirm
  #    vulnerable build before launching the CVE payload).
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/version$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"version":"1.2.4","main_version":"1.2.4","package":"Langflow"}'

  # ───────────────────────────────────────────────────────────────────────
  # 4. GET /api/v1/config — App config snapshot (real LangFlow shape)
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/config$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"feature_flags":{"mvp_components":false,"async_components":true},"frontend_timeout":30,"auto_saving":true,"auto_saving_interval":1000,"health_check_max_retries":5,"max_file_size_upload":100,"public_flow_cleanup_interval":3600,"webhook_polling_interval":5000}'

  # ───────────────────────────────────────────────────────────────────────
  # 5. POST /api/v1/validate/code — CVE-2025-3248 (CISA KEV, Flodrix)
  #
  #   Real-product behavior: in 1.2.x this endpoint runs the submitted
  #   code through ast.parse / compile / direct evaluation (no auth, no
  #   sandbox) and always returns a 200 with import + AST shape — even
  #   when the dangerous code path itself silently succeeded. We mimic
  #   that exact shape so the scanner thinks the exploit worked and
  #   moves on to the next stage.
  #
  #   Capture is upstream: captureResponseBody=true + the ingest pipeline
  #   reads request body separately, so we see the full Python payload
  #   that would have been evaluated. The Flodrix dropper is a multi-line
  #   payload using base64'd shell-out in function defaults — perfect
  #   research material.
  #
  #   StatusCode 200 is critical — a 4xx would tell the scanner the
  #   endpoint is patched and they would move on without leaving the
  #   payload behind.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/validate/code$"
    method: POST
    name: "langflow-cve-2025-3248-validate-code"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "X-Request-Id: req_${request.uuid_short}"
    statusCode: 200
    handler: '{"imports":{"errors":[]},"function":{"errors":[]}}'

  # GET on the CVE endpoint — real LangFlow returns 405 Method Not Allowed
  - regex: "^/api/v1/validate/code$"
    method: GET
    name: "langflow-cve-2025-3248-validate-code-method-gate"
    headers:
      - "Allow: POST"
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 405
    handler: '{"detail":"Method Not Allowed"}'

  # Sibling endpoint — POST /api/v1/validate/prompt (also pre-auth in 1.2.x)
  - regex: "^/api/v1/validate/prompt$"
    method: POST
    name: "langflow-validate-prompt"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"input_variables":[],"frontend_node":null}'

  # ───────────────────────────────────────────────────────────────────────
  # 6. GET /api/v1/all — Component catalog. Real LangFlow returns a
  # heavily-nested object keyed by component category. Scanners hit this
  # right after /version to enumerate what nodes are available; serving
  # a thin-but-realistic subset is enough.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/all$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"agents":{"AgentExecutor":{"display_name":"Agent","description":"Construct an agent from an LLM and tools."}},"chains":{"LLMChain":{"display_name":"LLMChain","description":"Chain to run queries against LLMs."}},"prompts":{"PromptTemplate":{"display_name":"Prompt","description":"A prompt template for a language model."}},"llms":{"ChatOpenAI":{"display_name":"OpenAI","description":"OpenAI chat large language models."},"Ollama":{"display_name":"Ollama","description":"Local Ollama instance"}},"embeddings":{"OpenAIEmbeddings":{"display_name":"OpenAI Embeddings","description":"OpenAI embedding models."}},"vectorstores":{"Chroma":{"display_name":"Chroma","description":"Chroma vector store."}},"custom_components":{"CustomComponent":{"display_name":"Custom","description":"Custom component"}}}'

  # ───────────────────────────────────────────────────────────────────────
  # 7. Flow management — list, get, basic_examples
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/flows/basic_examples/?$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '[{"id":"6f2a8e91-1c4b-4d2f-9a87-3e1d4c5b6a92","name":"Basic Prompting","description":"Send a prompt to an LLM and get a response.","data":{"nodes":[],"edges":[]},"is_component":false,"updated_at":"${time.ago.45d}","webhook":false,"endpoint_name":null,"folder_id":null,"user_id":"a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"},{"id":"7c3b9f02-2d5c-4e3f-8a98-4f2e5d6c7b03","name":"Vector Store RAG","description":"Retrieval-augmented generation using a vector store.","data":{"nodes":[],"edges":[]},"is_component":false,"updated_at":"${time.ago.45d}","webhook":false,"endpoint_name":null,"folder_id":null,"user_id":"a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"}]'

  # GET /api/v1/flows/ — auth required in real product; matches scanner pattern
  - regex: "^/api/v1/flows/?$"
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "WWW-Authenticate: Bearer"
    statusCode: 401
    handler: '{"detail":"Not authenticated"}'

  # POST /api/v1/flows/ — create flow (also auth-gated)
  - regex: "^/api/v1/flows/?$"
    method: POST
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "WWW-Authenticate: Bearer"
    statusCode: 401
    handler: '{"detail":"Not authenticated"}'

  # Individual flow lookup
  - regex: "^/api/v1/flows/[0-9a-fA-F-]{36}$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "WWW-Authenticate: Bearer"
    statusCode: 401
    handler: '{"detail":"Not authenticated"}'

  # ───────────────────────────────────────────────────────────────────────
  # 8. POST /api/v1/custom_component — sibling RCE-adjacent surface.
  # Post-auth in modern versions; we keep it auth-gated so it looks
  # patched. Scanners probing the legacy free path move on.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/custom_component$"
    method: POST
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "WWW-Authenticate: Bearer"
    statusCode: 401
    handler: '{"detail":"Not authenticated"}'

  - regex: "^/api/v1/custom_component/update$"
    method: POST
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "WWW-Authenticate: Bearer"
    statusCode: 401
    handler: '{"detail":"Not authenticated"}'

  # ───────────────────────────────────────────────────────────────────────
  # 9. /api/v1/api_key — Auth-gated (no canary mints provisioned yet)
  # Was a canary-leak surface in the Phase 7 design but mints are deferred
  # (Path A 2026-05-18). Real LangFlow returns 401 here without a token —
  # this matches the patched-product shape.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/api_key$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "WWW-Authenticate: Bearer"
    statusCode: 401
    handler: '{"detail":"Not authenticated"}'

  # ───────────────────────────────────────────────────────────────────────
  # 10. GET /api/v1/store/components/ — WATERMARK LEAK
  # Real LangFlow store/marketplace returns a paginated component list.
  # We embed the watermark password in a "default config" field of a fake
  # component — the kind of thing a careless devops engineer would copy
  # straight into prod. Cross-pollination capture goal: see this
  # password show up as an SSH login attempt on :2222 within 90 days.
  # Pre-registered POC; baseline: 0 attempts of this shape in last 90d.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/store/components/?$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      {"count":1,"results":[{"id":"comp-cdf-pg-loader","name":"{{ persona.coherence.world.product.service_name }}-postgres-loader","description":"{{ persona.coherence.world.company.display_name }} internal: load rows from prod Postgres into a LangFlow flow. Pin to {{ persona.coherence.world.product.platform_version }}.","is_component":true,"author":{"username":"{{ persona.coherence.world.people.platform_admin_1.handle }}"},"private":false,"downloads_count":47,"liked_by_user":false,"data":{"nodes":[{"id":"PGLoader-cdf","data":{"node":{"template":{"connection_string":{"type":"str","value":"postgresql://{{ persona.coherence.world.product.service_name }}_app:{{ persona.coherence.world.watermark_passwords.langflow }}@db-primary.{{ persona.coherence.world.company.internal_domain }}:5432/{{ persona.coherence.world.product.service_name }}_prod","password":true,"required":true}}}}}]}}]}

  # ───────────────────────────────────────────────────────────────────────
  # 11. /api/v1/users/whoami — Auth-gated user probe
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/users/whoami$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "WWW-Authenticate: Bearer"
    statusCode: 401
    handler: '{"detail":"Not authenticated"}'

  # ───────────────────────────────────────────────────────────────────────
  # 12. /login — Real LangFlow SPA route for login (returns HTML shell)
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/login$"
    method: GET
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      <!doctype html>
      <html lang="en"><head><meta charset="UTF-8"/><title>Langflow</title>
      <script type="module" crossorigin src="/assets/index-a3f2c8e1.js"></script>
      </head><body><div id="root"></div></body></html>

  # POST /login — Real LangFlow uses OAuth2PasswordRequestForm (form-encoded)
  - regex: "^/login$"
    method: POST
    name: "langflow-login-attempt"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401
    handler: '{"detail":"Incorrect username or password"}'

  # /logout
  - regex: "^/logout$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"message":"Logout successful"}'

  # ───────────────────────────────────────────────────────────────────────
  # 13. Build / run endpoints
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/build/[0-9a-fA-F-]{36}/flow$"
    method: POST
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "WWW-Authenticate: Bearer"
    statusCode: 401
    handler: '{"detail":"Not authenticated"}'

  - regex: "^/api/v1/run/[0-9a-fA-F-]+$"
    method: POST
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "WWW-Authenticate: Bearer"
    statusCode: 401
    handler: '{"detail":"Not authenticated"}'

  - regex: "^/api/v1/process/[0-9a-fA-F-]+$"
    method: POST
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
      - "WWW-Authenticate: Bearer"
    statusCode: 401
    handler: '{"detail":"Not authenticated"}'

  # ───────────────────────────────────────────────────────────────────────
  # 14. /docs — Swagger UI (real LangFlow uses default FastAPI Swagger)
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/docs$"
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      <!DOCTYPE html><html><head><link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css"><link rel="shortcut icon" href="https://fastapi.tiangolo.com/img/favicon.png"><title>Langflow - Swagger UI</title></head><body><div id="swagger-ui"></div><script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script><script>const ui=SwaggerUIBundle({url:'/openapi.json',dom_id:'#swagger-ui',layout:'BaseLayout',deepLinking:true,showExtensions:true,showCommonExtensions:true,oauth2RedirectUrl:window.location.origin+'/docs/oauth2-redirect',presets:[SwaggerUIBundle.presets.apis,SwaggerUIBundle.SwaggerUIStandalonePreset]})</script></body></html>

  - regex: "^/redoc$"
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      <!DOCTYPE html><html><head><title>Langflow - ReDoc</title><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700" rel="stylesheet"><link rel="shortcut icon" href="https://fastapi.tiangolo.com/img/favicon.png"></head><body><noscript>ReDoc requires Javascript</noscript><redoc spec-url="/openapi.json"></redoc><script src="https://cdn.jsdelivr.net/npm/redoc@next/bundles/redoc.standalone.js"></script></body></html>

  # ───────────────────────────────────────────────────────────────────────
  # 15. /openapi.json — Real OpenAPI 3.1 schema (scanners parse this to
  # enumerate every endpoint). We list everything we serve.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/openapi\\.json$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"openapi":"3.1.0","info":{"title":"Langflow","version":"1.2.4","description":"Langflow API"},"paths":{"/health_check":{"get":{"summary":"Health Check","operationId":"health_check_health_check_get","responses":{"200":{"description":"Successful Response"}}}},"/api/v1/version":{"get":{"summary":"Get Version","operationId":"get_version_api_v1_version_get","responses":{"200":{"description":"Successful Response"}}}},"/api/v1/config":{"get":{"summary":"Get Config","operationId":"get_config_api_v1_config_get","responses":{"200":{"description":"Successful Response"}}}},"/api/v1/all":{"get":{"summary":"Get All","operationId":"get_all_api_v1_all_get","responses":{"200":{"description":"Successful Response"}}}},"/api/v1/validate/code":{"post":{"summary":"Post Validate Code","operationId":"post_validate_code_api_v1_validate_code_post","responses":{"200":{"description":"Successful Response"}}}},"/api/v1/validate/prompt":{"post":{"summary":"Post Validate Prompt","operationId":"post_validate_prompt_api_v1_validate_prompt_post","responses":{"200":{"description":"Successful Response"}}}},"/api/v1/custom_component":{"post":{"summary":"Custom Component","operationId":"custom_component_api_v1_custom_component_post","responses":{"200":{"description":"Successful Response"}}}},"/api/v1/flows/":{"get":{"summary":"Read Flows","operationId":"read_flows_api_v1_flows__get","responses":{"200":{"description":"Successful Response"}}},"post":{"summary":"Create Flow","operationId":"create_flow_api_v1_flows__post","responses":{"201":{"description":"Successful Response"}}}},"/api/v1/flows/basic_examples/":{"get":{"summary":"Read Basic Examples","operationId":"read_basic_examples_api_v1_flows_basic_examples__get","responses":{"200":{"description":"Successful Response"}}}},"/api/v1/api_key":{"get":{"summary":"Get Api Keys","operationId":"get_api_keys_api_v1_api_key_get","responses":{"200":{"description":"Successful Response"}}},"post":{"summary":"Create Api Key","operationId":"create_api_key_api_v1_api_key_post","responses":{"201":{"description":"Successful Response"}}}},"/api/v1/store/components/":{"get":{"summary":"List Components","operationId":"list_components_api_v1_store_components__get","responses":{"200":{"description":"Successful Response"}}}},"/api/v1/users/whoami":{"get":{"summary":"Whoami","operationId":"whoami_api_v1_users_whoami_get","responses":{"200":{"description":"Successful Response"}}}},"/login":{"post":{"summary":"Login To Get Access Token","operationId":"login_to_get_access_token_login_post","responses":{"200":{"description":"Successful Response"}}}}}}'

  # ───────────────────────────────────────────────────────────────────────
  # 16. Static / assets — return realistic 404s rather than empty
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/static/"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 404
    handler: '{"detail":"Not Found"}'

  - regex: "^/assets/"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 404
    handler: '{"detail":"Not Found"}'

  - regex: "^/favicon\\.ico$"
    headers:
      - "Content-Type: image/x-icon"
      - "Server: uvicorn"
    statusCode: 204
    handler: ""

  - regex: "^/robots\\.txt$"
    headers:
      - "Content-Type: text/plain"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      User-agent: *
      Disallow: /api/
      Disallow: /flows/

  # ───────────────────────────────────────────────────────────────────────
  # 17. /api/ catchall — FastAPI canonical "Not Found" (real FastAPI shape)
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 404
    handler: '{"detail":"Not Found"}'

  # ───────────────────────────────────────────────────────────────────────
  # 18. Final catch-all — match FastAPI 404 shape exactly
  # ───────────────────────────────────────────────────────────────────────
  - regex: ".*"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 404
    handler: '{"detail":"Not Found"}'
