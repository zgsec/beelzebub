# =============================================================================
# LangFlow Honeypot — Port 7860 — multi-CVE bait surface
# =============================================================================
#
# PERSONA: LangFlow 1.2.0, DEFAULT deployment (LANGFLOW_AUTO_LOGIN=true).
#   FastAPI + uvicorn, default :7860. The default auto-login superuser
#   ("langflow") means EVERY endpoint answers unauthenticated — there are
#   no 401s anywhere. This is the exact shape Tenable/Sysdig/CrowdSec call
#   out as the precondition for the LangFlow CVE wave, and it is what
#   ~7,000 internet-exposed instances actually present.
#
# WHY 1.2.0 (oracle-chosen, 2026-06-11):
#   1.2.0 is simultaneously vulnerable to the most actively-exploited
#   LangFlow CVEs. A later build would PATCH the validate/code RCE
#   (fixed in 1.3.0), so 1.2.0 is the maximal-bait pin:
#     CVE-2025-3248  (CISA KEV, Flodrix)  POST /api/v1/validate/code   ✓ <1.3.0
#     CVE-2026-0770  (validate/code RCE)  POST /api/v1/validate/code   ✓ same path
#     CVE-2026-5027  (unpatched, ITW Jun) POST /api/v2/files (../write) ✓ present
#     CVE-2026-21445 (CISA KEV)           GET  /api/v1/monitor/*        ✓ <1.7.1
#     CVE-2025-34291 (CISA KEV, MuddyW.)  CORS allow_origins=* + creds  ~ <1.6.9
#   Intentionally OUT OF SCOPE:
#     CVE-2026-33017  POST /api/v1/build_public_tmp/{id}/flow — that route
#       does NOT exist in 1.2.0 (oracle: POST -> 405 via SPA catch-all).
#       Emulating it would be incoherent with a validate/code-vulnerable
#       persona, so the faithful catch-all 405 is left to stand.
#
# ORACLE GROUNDING (2026-06-11):
#   Every shape below was captured from a real `langflowai/langflow:1.2.0`
#   container. Captures + provenance live at
#   honeypot-research/tools/oracle-diff/langflow-1.2.0/. Key default-deploy
#   facts that this file now matches (and the previous draft got wrong):
#     - unmatched GET  -> the SPA index.html (200, text/html), NOT a JSON 404
#     - unmatched POST -> 405 {"detail":"Method Not Allowed"} (SPA is GET-only)
#     - bad/empty body -> 422 FastAPI validation error, NOT 401
#     - /api/v1/config, whoami, api_key/, /health all have exact shapes below
#     - the SPA shell carries NO inline __LANGFLOW_CONFIG__ (that was fictional)
#
# ENGINEERED DECEPTION TIERS (fidelity is the carrier; these are the payload):
#   T1  validate/code capture — we always 200 "valid" (real 1.2.x reports
#       only import/AST shape, never eval status) so the scanner believes the
#       RCE landed and leaves the full Python payload behind. captureRequestBody
#       records the exact dropper (Flodrix base64-in-defaults / CVE-2026-0770
#       __import__+throw(Exception()) output-exfil) — non-commodity intel.
#   T2  /api/v2/files path-traversal capture — we 201 and echo the attacker's
#       traversal filename back (via ${request.multipart.*}) exactly like the
#       real product, so the operator believes the arbitrary write succeeded
#       and proceeds to drop a real stage-2 payload. The multipart body (the
#       ../ target path + file content) is captured.
#   T3  watermark cross-pollination — a Crestfield prod Postgres DSN is leaked
#       in a flow node template at GET /api/v1/flows/ (where real connection
#       strings live, on the attacker's enumerate-flows -> read-templates
#       path). If the harvested password `watermark_passwords.langflow` later
#       appears as an SSH login on :2222, the cross-lure trail is captured.
#       Pre-registered POC; baseline 0 attempts of this shape in 90d.
#
# CAPTURE:
#   captureRequestBody + captureResponseBody so the Phase-0 exporter records
#   both the attacker payload (Python code / multipart traversal) and the
#   response we returned, and ingest can correlate request -> response.
#
# PERSONA-SWAPPABLE:
#   Crestfield-specific strings come from persona.coherence.world.* — swapping
#   persona re-renders this file unchanged.
#
# KNOWN APPROXIMATIONS (documented, low fingerprint value):
#   - /api/v1/all real payload is ~2 MB of component schemas; we serve a
#     thin subset using the real top-level category keys.
#   - /openapi.json real is ~119 KB / ~100 paths; we serve the core subset.
#   - GET /api/v2/files always returns [] (stateless — no upload persistence).
#   - CVE-2025-34291 CORS headers (ACAO:* + credentials) are emitted by real
#     1.2.0 ONLY when the request carries an Origin; static headers can't be
#     request-conditional without an Origin-reflection instrument change, and
#     34291 capture value is low (browser-driven, victim IPs). Deferred.
# =============================================================================
apiVersion: "v1"
protocol: "http"
address: ":7860"
description: "{{ persona.coherence.world.company.display_name }} — LangFlow visual builder (data-platform team)"
captureRequestBody: true
requestBodyMaxBytes: 262144
captureResponseBody: true
responseBodyMaxBytes: 65536
artifactPath: "/var/lib/beelzebub/artifacts/langflow"
artifactMaxBytes: 5000000          # 5 MB per body
artifactMaxTotalBytes: 524288000   # 500 MB store budget
artifactMaxFiles: 2000
commands:

  # ───────────────────────────────────────────────────────────────────────
  # Health — real LangFlow uses /health_check; /health returns a thinner body
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/health_check$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"status":"ok","chat":"ok","db":"ok"}'

  - regex: "^/health$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"status":"ok"}'

  # ───────────────────────────────────────────────────────────────────────
  # Version probe — scanners confirm the vulnerable build before the payload
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/version$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"version":"1.2.0","main_version":"1.2.0","package":"Langflow"}'

  # ───────────────────────────────────────────────────────────────────────
  # App config snapshot — EXACT real 1.2.0 shape (oracle-captured)
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/config$"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"feature_flags":{"mvp_components":false},"frontend_timeout":0,"auto_saving":true,"auto_saving_interval":1000,"health_check_max_retries":5,"max_file_size_upload":100,"event_delivery":"polling"}'

  # ───────────────────────────────────────────────────────────────────────
  # T1 — CVE-2025-3248 (CISA KEV, Flodrix) + CVE-2026-0770
  #   POST /api/v1/validate/code. Real 1.2.x runs the submitted code through
  #   ast.parse/compile/eval (no auth, no sandbox) and returns 200 with only
  #   import + AST shape — never eval status — even after the dangerous path
  #   ran. We mirror that exact 200 so the scanner thinks it worked and moves
  #   on, leaving the payload behind. We do NOT execute it (honeypot, not an
  #   interpreter) — the request body capture IS the intel.
  #   GET on this path is intentionally absent: real returns the SPA shell
  #   (200 HTML) via the catch-all, NOT a 405.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/validate/code$"
    method: POST
    bodyRegex: "code"
    name: "langflow-validate-code-cve-2025-3248-cve-2026-0770"
    artifactCapture: true
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"imports":{"errors":[]},"function":{"errors":[]}}'

  # POST with no `code` field -> real FastAPI 422 (not 401, not 200)
  - regex: "^/api/v1/validate/code$"
    method: POST
    name: "langflow-validate-code-missing-field"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 422
    handler: '{"detail":[{"type":"missing","loc":["body","code"],"msg":"Field required","input":{}}]}'

  # Sibling pre-auth endpoint — POST /api/v1/validate/prompt
  - regex: "^/api/v1/validate/prompt$"
    method: POST
    name: "langflow-validate-prompt"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"input_variables":[],"frontend_node":null}'

  # ───────────────────────────────────────────────────────────────────────
  # T2 — CVE-2026-5027 (unpatched; in-the-wild Jun 2026)
  #   POST /api/v2/files does not sanitise the multipart `filename`, allowing
  #   ../ arbitrary file write -> RCE. Real returns 201 echoing the filename
  #   stem in `name` and a <userid>/<uuid>.<ext> storage `path` (id == that
  #   uuid). We reproduce it byte-for-byte using the ${request.multipart.*}
  #   echo so the operator believes the write landed and drops a real stage-2.
  #   The multipart body (../ target + content) is captured.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v2/files/?$"
    method: POST
    bodyRegex: 'filename="'
    name: "langflow-files-cve-2026-5027-path-traversal-write"
    artifactCapture: true
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 201
    handler: '{"id":"${request.uuid}","name":"${request.multipart.filename_stem}","path":"b7e4c1a2-9f30-4d51-8c6e-2a1f0b3d5e84/${request.uuid}${request.multipart.ext}","size":7,"provider":null}'

  # POST /api/v2/files with no file part -> real 422
  - regex: "^/api/v2/files/?$"
    method: POST
    name: "langflow-files-missing-file"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 422
    handler: '{"detail":[{"type":"missing","loc":["body","file"],"msg":"Field required","input":null}]}'

  # GET /api/v2/files -> file list (stateless: always empty)
  - regex: "^/api/v2/files/?$"
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '[]'

  # ───────────────────────────────────────────────────────────────────────
  # T3 — CVE-2026-21445 (CISA KEV) monitor endpoints (unauth in <1.7.1).
  #   In the default auto-login deploy these answer 200 already; matching the
  #   real shapes keeps the 21445 fingerprint coherent and gives a 21445
  #   scanner the enumeration surface it expects.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/monitor/messages(\\?.*)?$"
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '[]'

  - regex: "^/api/v1/monitor/builds\\?.*flow_id="
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"vertex_builds":{}}'

  - regex: "^/api/v1/monitor/builds/?$"
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 422
    handler: '{"detail":[{"type":"missing","loc":["query","flow_id"],"msg":"Field required","input":null}]}'

  - regex: "^/api/v1/monitor/transactions\\?.*flow_id="
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"items":[],"total":0,"page":1,"size":50,"pages":0}'

  - regex: "^/api/v1/monitor/transactions/?$"
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 422
    handler: '{"detail":[{"type":"missing","loc":["query","flow_id"],"msg":"Field required","input":null}]}'

  # ───────────────────────────────────────────────────────────────────────
  # Flows — GET /api/v1/flows/ (200 in auto-login). Two planted secrets:
  #   • PostgresVectorStore.connection_string — prod DSN WATERMARK (passive
  #     track; does NOT fire). Coherence prop only — never counted as signal.
  #   • AmazonBedrockModel.aws_access_key_id/_secret — real Canarytokens AWS
  #     key (${LANGFLOW_CANARY_AWS_KEY/_SECRET}); FIRES on attacker cred-use =
  #     Rung-4. "careless devops pasted the key into the component" misconfig
  #     (load_from_db:false → leaks verbatim on GET, oracle-confirmed). Cross-
  #     coherent with the LiteLLM bedrock-claude model.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/flows/?$"
    method: GET
    name: "langflow-flows-list-watermark-leak"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '[{"id":"f1e2d3c4-b5a6-4798-8a0b-1c2d3e4f5a6b","name":"{{ persona.coherence.world.product.service_name }}-prod-etl-pg-to-vector","description":"Nightly loader: pull customer rows from prod Postgres into the RAG store. Pin to {{ persona.coherence.world.product.platform_version }}.","icon":"Database","icon_bg_color":"#1c7ed6","gradient":"2","data":{"nodes":[{"id":"PostgresVectorStore-cdf01","type":"genericNode","position":{"x":140,"y":96},"measured":{"width":320,"height":420},"data":{"type":"PostgresVectorStore","node":{"display_name":"Postgres Vector Store","description":"Load embeddings into the prod pgvector store.","base_classes":["Data"],"template":{"connection_string":{"_input_type":"SecretStrInput","type":"str","password":true,"required":true,"show":true,"name":"connection_string","display_name":"PG Connection String","value":"postgresql://{{ persona.coherence.world.product.service_name }}_app:{{ persona.coherence.world.watermark_passwords.langflow }}@db-primary.{{ persona.coherence.world.company.internal_domain }}:5432/{{ persona.coherence.world.product.service_name }}_prod","load_from_db":false,"advanced":false,"info":"Primary Postgres DSN for the prod loader."}}}}},{"id":"AmazonBedrockModel-cnr01","type":"genericNode","position":{"x":520,"y":96},"measured":{"width":320,"height":460},"data":{"type":"AmazonBedrockModel","id":"AmazonBedrockModel-cnr01","node":{"display_name":"Amazon Bedrock","description":"Generate text using Amazon Bedrock LLMs.","base_classes":["LanguageModel","Message"],"template":{"model_id":{"_input_type":"DropdownInput","type":"str","name":"model_id","display_name":"Model ID","value":"anthropic.claude-3-sonnet-20240229-v1:0","advanced":false},"aws_access_key_id":{"_input_type":"SecretStrInput","type":"str","password":true,"name":"aws_access_key_id","display_name":"AWS Access Key ID","value":"${LANGFLOW_CANARY_AWS_KEY}","load_from_db":false,"advanced":false},"aws_secret_access_key":{"_input_type":"SecretStrInput","type":"str","password":true,"name":"aws_secret_access_key","display_name":"AWS Secret Access Key","value":"${LANGFLOW_CANARY_AWS_SECRET}","load_from_db":false,"advanced":false},"region_name":{"_input_type":"DropdownInput","type":"str","name":"region_name","display_name":"Region Name","value":"us-east-1"}}}}}],"edges":[]},"is_component":false,"updated_at":"2026-05-28T09:14:22.481037","webhook":false,"endpoint_name":null,"tags":[],"locked":false,"user_id":"b7e4c1a2-9f30-4d51-8c6e-2a1f0b3d5e84","folder_id":"a0b1c2d3-e4f5-4061-8273-9a8b7c6d5e4f"}]'

  - regex: "^/api/v1/flows/basic_examples/?$"
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '[{"id":"6f2a8e91-1c4b-4d2f-9a87-3e1d4c5b6a92","name":"Basic Prompting","description":"Send a prompt to an LLM and get a response.","data":{"nodes":[],"edges":[]},"is_component":false,"updated_at":"${time.ago.45d}","webhook":false,"endpoint_name":null,"folder_id":null,"user_id":"b7e4c1a2-9f30-4d51-8c6e-2a1f0b3d5e84"}]'

  # Individual flow lookup — unknown id -> real 404 (not SPA, not 401)
  - regex: "^/api/v1/flows/[0-9a-fA-F-]{36}$"
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 404
    handler: '{"detail":"Flow not found"}'

  # ───────────────────────────────────────────────────────────────────────
  # Identity / keys — auto-login superuser (real default username "langflow")
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/users/whoami$"
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"id":"b7e4c1a2-9f30-4d51-8c6e-2a1f0b3d5e84","username":"langflow","profile_image":null,"store_api_key":null,"is_active":true,"is_superuser":true,"create_at":"2026-02-19T14:32:08.117446","updated_at":"2026-02-19T14:32:08.117461","last_login_at":null}'

  # api_key list — real route is /api/v1/api_key/ (trailing slash); the
  # no-slash form falls through to the SPA catch-all, exactly like real.
  - regex: "^/api/v1/api_key/$"
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"total_count":0,"user_id":"b7e4c1a2-9f30-4d51-8c6e-2a1f0b3d5e84","api_keys":[]}'

  # ───────────────────────────────────────────────────────────────────────
  # Store proxy — real returns the public marketplace listing (authorized
  # false when no store key). Thin real-shaped subset.
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/store/components/?$"
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"count":2,"authorized":false,"results":[{"id":"73bdb048-0e4e-4c58-823d-a099b9414d8c","name":"MP3 QA12","description":"Ask any questions to an MP3 file","liked_by_count":39,"liked_by_user":null,"is_component":false,"metadata":{"PromptTemplate":{"count":1},"LLMChain":{"count":1},"ChatOpenAI":{"count":1},"total":3},"user_created":{"username":"vazz"},"tags":[{"id":"cd614b49-dd57-4c8b-a5eb-f8bb5f957b9a","name":"Vector Store"}],"downloads_count":355,"last_tested_version":"1.2.0","private":false},{"id":"1f2cdb65-2b84-489f-9f11-b6999d7cda63","name":"Document Processor","description":"This component processes a document","liked_by_count":27,"liked_by_user":null,"is_component":true,"metadata":{"Data":{"count":1},"total":1},"user_created":{"username":"langflow"},"tags":[],"downloads_count":287,"last_tested_version":"1.2.0","private":false}]}'

  # ───────────────────────────────────────────────────────────────────────
  # Component catalog — real is ~2 MB; thin subset with the real top-level
  # category keys (documented approximation).
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/all$"
    method: GET
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200
    handler: '{"inputs":{"ChatInput":{"display_name":"Chat Input","description":"Get chat inputs from the Playground."}},"outputs":{"ChatOutput":{"display_name":"Chat Output","description":"Display a chat message in the Playground."}},"prompts":{"Prompt":{"display_name":"Prompt","description":"Create a prompt template with dynamic variables."}},"models":{"OpenAIModel":{"display_name":"OpenAI","description":"Generates text using OpenAI LLMs."}},"agents":{"Agent":{"display_name":"Agent","description":"Define the agent''s instructions, then enter a task to complete using tools."}},"vectorstores":{"Chroma":{"display_name":"Chroma DB","description":"Chroma Vector Store with search capabilities."}},"embeddings":{"OpenAIEmbeddings":{"display_name":"OpenAI Embeddings","description":"Generate embeddings using OpenAI models."}},"data":{"File":{"display_name":"File","description":"Load a file to be used in your project."}},"processing":{"SplitText":{"display_name":"Split Text","description":"Split text into chunks based on specified criteria."}},"tools":{"PythonREPLTool":{"display_name":"Python REPL","description":"A tool for running Python code in a REPL environment."}},"logic":{"Conditional":{"display_name":"If-Else","description":"Routes an input to a corresponding output based on a condition."}},"helpers":{"Memory":{"display_name":"Message History","description":"Retrieves stored chat messages."}},"custom_component":{"CustomComponent":{"display_name":"Custom Component","description":"Use as a template to create your own component."}}}'

  # ───────────────────────────────────────────────────────────────────────
  # POST routes that exist in 1.2.0 -> real FastAPI 422 on bad body
  # (NOT 401 — the previous draft's auth walls were the tell).
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/api/v1/custom_component$"
    method: POST
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 422
    handler: '{"detail":[{"type":"missing","loc":["body","code"],"msg":"Field required","input":{}}]}'

  - regex: "^/api/v1/build/[0-9a-fA-F-]{36}/flow$"
    method: POST
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 422
    handler: '{"detail":[{"type":"missing","loc":["body","inputs"],"msg":"Field required","input":null}]}'

  # Real login endpoint is /api/v1/login (form). Empty -> 422 missing fields.
  - regex: "^/api/v1/login$"
    method: POST
    name: "langflow-login-attempt"
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 422
    handler: '{"detail":[{"type":"missing","loc":["body","username"],"msg":"Field required","input":null},{"type":"missing","loc":["body","password"],"msg":"Field required","input":null}]}'

  # ───────────────────────────────────────────────────────────────────────
  # API docs — real FastAPI Swagger/ReDoc + OpenAPI (core-subset schema)
  # ───────────────────────────────────────────────────────────────────────
  - regex: "^/docs$"
    method: GET
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200
    handler: |
      <!DOCTYPE html>
      <html>
      <head>
      <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
      <link rel="shortcut icon" href="https://fastapi.tiangolo.com/img/favicon.png">
      <title>Langflow - Swagger UI</title>
      </head>
      <body>
      <div id="swagger-ui">
      </div>
      <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
      <!-- `SwaggerUIBundle` is now available on the page -->
      <script>
      const ui = SwaggerUIBundle({
          url: '/openapi.json',
      "dom_id": "#swagger-ui",
      "layout": "BaseLayout",
      "deepLinking": true,
      "showExtensions": true,
      "showCommonExtensions": true,
      oauth2RedirectUrl: window.location.origin + '/docs/oauth2-redirect',
          presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIBundle.SwaggerUIStandalonePreset
          ],
      })
      </script>
      </body>
      </html>

  - regex: "^/openapi\\.json$"
    method: GET
    headers:
      - "Content-Type: application/json"
