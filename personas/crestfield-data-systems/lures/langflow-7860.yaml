  # ───────────────────────────────────────────────────────────────────────
  # SPA catch-all — every UNMATCHED GET returns the real Vite index.html
  # (200, served as a static file: accept-ranges/etag/last-modified). This is
  # the single most-probed surface; it must be byte-exact. No __LANGFLOW_CONFIG__.
  # ───────────────────────────────────────────────────────────────────────
  - regex: ".*"
    method: GET
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
      - "Accept-Ranges: bytes"
      - "Last-Modified: Tue, 25 Feb 2025 23:13:05 GMT"
      - "Etag: \"ec31704bd8672c28281901b505ba0853\""
    statusCode: 200
    handler: |
      <!doctype html>
      <html lang="en">
        <head>
          <base href="/" />
          <meta charset="UTF-8" />
          <meta http-equiv="X-UA-Compatible" content="IE=edge" />
          <meta name="viewport" content="width=device-width, initial-scale=1.0" />
          <link rel="icon" href="./assets/favicon-new-BaG6bPWd.ico" />
          <link rel="preconnect" href="https://fonts.googleapis.com" />
