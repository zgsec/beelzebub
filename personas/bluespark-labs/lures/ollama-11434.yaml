# =============================================================================
# Ollama 0.6.5 lure — BlueSpark Labs (lighthouse-1, port 11434)
# =============================================================================
# Authors a static /api/tags + /api/version that exactly matches the real
# Ollama upstream's response shape (key set, types). Chat-shaped endpoints
# (/api/chat, /api/generate) are LLM-backed for realism.
#
# IMPORTANT — why protocol: "http" instead of "ollama":
#   The ollama strategy in protocols/strategies/OLLAMA/ollama.go hard-codes
#   modified_at timestamps from Jan/Feb 2026 with mixed -05:00/-08:00/-06:00
#   offsets (lines 737-742). For a Singapore-deployed BlueSpark persona, both
#   the staleness (>7d) and timezone-mixing (vs +08:00) trip the harness's
#   check_timestamp_realism. Tracking as G.3 framework gap.
#
# AS63949 detection-evasion (May 2026 fleet signatures):
#   /api/tags MUST return ONLY {models: [...]}. Any of role/content/
#   total_duration/prompt_eval_duration mixed in is the cross-endpoint-field
#   leak that flagged the AS63949 fleet. Static handler here is the strict gate.
#
# Persona-aware content driven entirely by Jinja substitution from
# persona.lure_content (G.2 will populate the keys). All timestamps emitted
# from this lure are Asia/Singapore +08:00.
# =============================================================================
apiVersion: "v1"
protocol: "http"
address: ":11434"
description: "Ollama LLM inference server"
serviceType: "ollama"
# Capture response bodies for canary attribution + lure-quality measurement.
# Token values scrubbed at ingest by api/canary_extractor.redact_known_tokens.
captureResponseBody: true
responseBodyMaxBytes: 65536

commands:
  # 1. GET / — Real Ollama returns plain "Ollama is running" text/plain
  - regex: "^/$"
    method: "GET"
    handler: "Ollama is running"
    headers:
      - "Content-Type: text/plain; charset=utf-8"
    statusCode: 200

  # 2. GET /api/version — STRICT SHAPE: {version: "0.6.5"}, exactly one key.
  - regex: "^/api/version$"
    method: "GET"
    handler: '{"version":"0.6.5"}'
    headers:
      - "Content-Type: application/json"
    statusCode: 200

  # 3. GET /api/tags — STRICT SHAPE: {models: [...]} ONLY.
  # Per AS63949 forbidden_keys, NEVER mix in role/content/total_duration/
  # prompt_eval_duration. modified_at uses +08:00 (Singapore) and is recent
  # so the harness check_timestamp_realism passes.
  - regex: "^/api/tags$"
    method: "GET"
    handler: '{"models":[{"name":"{{ persona.lure_content.hosted_model_name | default(''aurora-7b'') }}:latest","model":"{{ persona.lure_content.hosted_model_name | default(''aurora-7b'') }}:latest","modified_at":"2026-05-03T11:24:18.421+08:00","size":4731010048,"digest":"7b4c9d2e8a1f3b6c5e0d2f4a8b7c1e6d3f9a2c5b8d4e7f1a6c2b9d5e8f3a7c1b","details":{"parent_model":"","format":"gguf","family":"llama","families":["llama"],"parameter_size":"7.0B","quantization_level":"Q4_K_M"}},{"name":"nomic-embed-text:latest","model":"nomic-embed-text:latest","modified_at":"2026-05-02T16:08:42.117+08:00","size":274302656,"digest":"0a109f75b9a1c8d2e4f7b3a6c9d1e8f5b2a7c4d8e1f3b6a9c2d5e7f1a4c8b3d6","details":{"parent_model":"","format":"gguf","family":"nomic-bert","families":["nomic-bert"],"parameter_size":"137M","quantization_level":"F16"}}]}'
    headers:
      - "Content-Type: application/json"
    statusCode: 200

  # 4. GET /api/ps — running models. Empty list when nothing resident in VRAM.
  # Real Ollama returns {models:[]} pre-warmup; matching that avoids the
  # "always-loaded" tell.
  - regex: "^/api/ps$"
    method: "GET"
    handler: '{"models":[]}'
    headers:
      - "Content-Type: application/json"
    statusCode: 200

  # 5. POST /api/show — model details
  - regex: "^/api/show$"
    method: "POST"
    handler: '{"license":"Apache 2.0","modelfile":"# Modelfile generated by \"ollama show\"\nFROM {{ persona.lure_content.hosted_model_name | default(''aurora-7b'') }}:latest\nTEMPLATE \"\"\"{{ ''{{ if .System }}<|system|>\\n{{ .System }}<|end|>{{ end }}<|user|>\\n{{ .Prompt }}<|end|>\\n<|assistant|>\\n'' }}\"\"\"","parameters":"stop                           \"<|user|>\"\nstop                           \"<|assistant|>\"\nstop                           \"<|end|>\"","template":"{{ ''{{ if .System }}<|system|>\\n{{ .System }}<|end|>{{ end }}<|user|>\\n{{ .Prompt }}<|end|>\\n<|assistant|>\\n'' }}","details":{"parent_model":"","format":"gguf","family":"llama","families":["llama"],"parameter_size":"7.0B","quantization_level":"Q4_K_M"},"model_info":{"general.architecture":"llama","general.basename":"{{ persona.lure_content.hosted_model_name | default(''aurora-7b'') }}","general.file_type":15,"general.parameter_count":7000000000,"general.quantization_version":2}}'
    headers:
      - "Content-Type: application/json"
    statusCode: 200

  # 6. POST /api/chat — LLM-backed.
  # Persona-aware prompt via top-level plugin block. Capture both attacker
  # prompt (logged via tracer) and LLM-generated response (captureResponseBody).
  # NOTE: framework gap — captureRequestBody is NOT supported (only response).
  # Beelzebub already logs the inbound request URI + body in the HTTP tracer
  # event payload, so attacker prompts ARE recorded; flagging for G.3 audit.
  - regex: "^/api/chat$"
    method: "POST"
    plugin: "LLMHoneypot"
    headers:
      - "Content-Type: application/json"
    statusCode: 200

  # 7. POST /api/generate — LLM-backed legacy completion.
  - regex: "^/api/generate$"
    method: "POST"
    plugin: "LLMHoneypot"
    headers:
      - "Content-Type: application/json"
    statusCode: 200

  # 8. POST /api/embed — embedding endpoint (static, deterministic)
  - regex: "^/api/embed$"
    method: "POST"
    handler: '{"model":"nomic-embed-text:latest","embeddings":[[0.0142,-0.0087,0.0231,-0.0156,0.0098,-0.0064,0.0205,-0.0133,0.0078,-0.0211,0.0167,-0.0042,0.0189,-0.0095,0.0123,-0.0184]]}'
    headers:
      - "Content-Type: application/json"
    statusCode: 200

  # 9. Catch-all for unknown /api/ paths — real Ollama returns plain 404
  - regex: "^/api/"
    handler: "404 page not found"
    headers:
      - "Content-Type: text/plain; charset=utf-8"
    statusCode: 404

  # 10. Generic catch-all
  - regex: ".*"
    handler: "404 page not found"
    headers:
      - "Content-Type: text/plain; charset=utf-8"
    statusCode: 404

# === LLM-POWERED RESPONSES ===
# /api/chat and /api/generate route through the LLM plugin. The handler
# wraps LLM output into Ollama JSON response shape (id, model, message,
# done, total_duration). LLM PROMPT is persona-aware and misconfig-aware.
#
# Persona voice: research/academic, "we observe", Singapore deployment.
# Misconfig signals: hosted_model_name exposed without auth, hint at the
# colocated LiteLLM proxy on :4000 with master-key bypass.
#
# Requires OPEN_AI_SECRET_KEY env var on sensor.
plugin:
  llmProvider: "openai"
  llmModel: "gpt-4.1-mini"
  openAISecretKey: ""
  prompt: |
    Local model-serving daemon for the {{ persona.lure_content.platform_display_name | default(persona.display_name) }} infra team (Singapore, Asia/Singapore +08:00). You are running on lighthouse-1, the team's evaluation harness host. Engineers here use you for ablation studies on the in-house model {{ persona.lure_content.hosted_model_name | default('aurora-7b') }}. Be concise, technical, research-voice ("we observe", "ablations", "evaluation harness"). Output Ollama-shape JSON only — nothing else.

    For /api/chat extract messages[] and respond as model={{ persona.lure_content.hosted_model_name | default('aurora-7b') }}:latest. Schema:
    {"model":"{{ persona.lure_content.hosted_model_name | default('aurora-7b') }}:latest","created_at":"2026-05-04T08:30:00.000+08:00","message":{"role":"assistant","content":"YOUR_RESPONSE"},"done":true,"done_reason":"stop","total_duration":3247000000,"load_duration":841000000,"prompt_eval_count":ESTIMATE,"prompt_eval_duration":612000000,"eval_count":ESTIMATE,"eval_duration":1794000000}

    For /api/generate extract prompt and respond:
    {"model":"{{ persona.lure_content.hosted_model_name | default('aurora-7b') }}:latest","created_at":"2026-05-04T08:30:00.000+08:00","response":"YOUR_RESPONSE","done":true,"done_reason":"stop","context":[1,2,3],"total_duration":3247000000,"load_duration":841000000,"prompt_eval_count":ESTIMATE,"prompt_eval_duration":612000000,"eval_count":ESTIMATE,"eval_duration":1794000000}

    Environment on this host:
      hostname={{ persona.lure_content.node_hostname | default('lighthouse-1') }}.{{ persona.identity.public_domain | default('bluesparkz.dev') }}
      OLLAMA_HOST=0.0.0.0:11434
      OLLAMA_KEEP_ALIVE=5m
      MODEL_DIR=/var/lib/ollama/models
      LITELLM_PROXY=http://localhost:4000  # master key sk-${LITELLM_MASTER_KEY} — set in /etc/litellm/.env, /key/generate is reachable without auth (DEV-441 to fix)
      VLLM_BACKEND=http://localhost:8000   # exposed without auth, internal-only per ops/slack
    Engineers: {{ persona.lure_content.engineer_priya | default('Priya R.') }}, {{ persona.lure_content.engineer_jian | default('Jian Wei T.') }}, {{ persona.lure_content.engineer_kavi | default('Kavi S.') }}, {{ persona.lure_content.engineer_anand | default('Anand M.') }}.
    Project codenames: {{ persona.lure_content.project_lighthouse | default('lighthouse') }} (this node), {{ persona.lure_content.project_vortex | default('vortex') }}, {{ persona.lure_content.project_catalyst | default('catalyst') }}, {{ persona.lure_content.project_aurora | default('aurora') }}.
  temperature: 0.4
  maxTokens: 500
  rateLimitEnabled: true
  rateLimitRequests: 10
  rateLimitWindowSeconds: 300

faultInjection:
  enabled: true
  errorRate: 0.04
  delayMs: 0
  delayJitterMs: 200
  errorResponses:
    - '{"error":"model \"{{ persona.lure_content.hosted_model_name | default(''aurora-7b'') }}:latest\" not found, try pulling it first"}'
    - '{"error":"unable to load model: model requires more system memory (5.2 GiB) than is available (4.1 GiB)"}'
    - '{"error":"timeout waiting for inference scheduler"}'
