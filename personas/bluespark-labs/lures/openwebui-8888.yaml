# =============================================================================
# Open WebUI 0.6.x lure — persona-driven (lighthouse-1, port 8888)
# =============================================================================
# Mimics ghcr.io/open-webui/open-webui:0.6.x with WEBUI_AUTH=True and the
# DELIBERATE MISCONFIG: ENABLE_SIGNUP=True. Probes per services.yaml:
#   GET /            → 200, text/html, body contains "<title>" and "Open WebUI"
#   POST /api/v1/auths/signup → 200|400|401|422
#
# DELIBERATE MISCONFIG (story signal): signup is open. Real upstream's behavior
# when ENABLE_SIGNUP=True is to accept the signup and return a user object
# with a JWT. We mirror that exactly — credential-stuffing payloads land in
# tracer events.
#
# Persona: an internal-team chat UI for the eval-harness on lighthouse-1.
# All emitted timestamps use Asia/Singapore +08:00.
# =============================================================================
apiVersion: "v1"
protocol: "http"
address: ":8888"
description: "Open WebUI AI chat interface"
serviceType: "openwebui"
captureResponseBody: true
responseBodyMaxBytes: 65536
captureRequestBody: true
requestBodyMaxBytes: 65536

commands:
  # 1. GET / — Open WebUI SPA shell. Real upstream emits an HTML doc with
  # <title>Open WebUI</title> (canonical title not subject to Jinja).
  - regex: "^/$"
    method: "GET"
    handler: |
      <!doctype html>
      <html lang="en">
      <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="theme-color" content="#171717" />
      <link rel="icon" href="/static/favicon.png" />
      <title>Open WebUI</title>
      <link rel="stylesheet" href="/_app/immutable/assets/0.CqsT_BCG.css" />
      <script>
      window.OPEN_WEBUI_CONFIG = { name: "Open WebUI", default_locale: "en-US" };
      </script>
      </head>
      <body data-sveltekit-preload-data="hover">
      <div style="display: contents">
      <div id="app"></div>
      </div>
      <script type="module" src="/_app/immutable/entry/start.D8bMQk_Y.js"></script>
      </body>
      </html>
    headers:
      - "Content-Type: text/html; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200

  # 2. GET /health — real returns {"status": true}
  - regex: "^/health$"
    method: "GET"
    handler: '{"status":true}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  # 3. GET /api/config — surfaces the misconfig: enable_signup=true
  - regex: "^/api/config$"
    method: "GET"
    handler: '{"status":true,"name":"Open WebUI","version":"0.6.5","default_locale":"en-US","oauth":{"providers":{}},"features":{"auth":true,"auth_trusted_header":false,"enable_ldap":false,"enable_api_key":true,"enable_signup":true,"enable_login_form":true,"enable_websocket":true,"enable_direct_connections":false,"enable_channels":false,"enable_notes":false,"enable_web_search":false,"enable_code_execution":true,"enable_image_generation":false,"enable_admin_export":true,"enable_admin_chat_access":true,"enable_community_sharing":false,"enable_message_rating":true},"default_models":"{{ persona.lure_content.hosted_model_name | default(''aurora-7b'') }}","default_prompt_suggestions":[],"audio":{"tts":{"engine":"","voice":""},"stt":{"engine":""}},"file":{"max_size":null,"max_count":null},"permissions":{"workspace":{"models":false,"knowledge":false,"prompts":false,"tools":false},"chat":{"controls":true,"file_upload":true,"delete":true,"edit":true,"share":true,"export":true,"stt":true,"tts":true,"call":true,"multiple_models":true,"temporary":true,"temporary_enforced":false},"features":{"direct_tool_servers":false,"web_search":false,"image_generation":false,"code_interpreter":true}},"google_drive":{"client_id":"","api_key":""},"onedrive":{"client_id":"","sharepoint_url":"","sharepoint_tenant_id":""},"license_metadata":null,"ui":{"pending_user_overlay_title":null,"pending_user_overlay_content":null,"response_watermark":null}}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  # 4. POST /api/v1/auths/signup — DELIBERATE MISCONFIG (open registration).
  # Real upstream with ENABLE_SIGNUP=True returns the new user + a JWT.
  # We mirror exactly. Token is a canary; firing means a credential-
  # stuffer auto-replayed our signup response.
  - regex: "^/api/v1/auths/signup$"
    method: "POST"
    handler: '{"id":"3e1c8a4f-0d6b-4e2f-9c7a-1b2d4e6f8a0c","email":"newuser@example.com","name":"New User","role":"pending","profile_image_url":"/user.png","token":"${OPENWEBUI_CANARY_JWT}","token_type":"Bearer","expires_at":1746489600,"permissions":{"workspace":{"models":false,"knowledge":false,"prompts":false,"tools":false}}}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  # 5. POST /api/v1/auths/signin — bad creds. Real returns 401.
  - regex: "^/api/v1/auths/signin$"
    method: "POST"
    handler: '{"detail":"Invalid credentials"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # 6. GET /api/v1/auths/ — real upstream returns user info / 401 if no token
  - regex: "^/api/v1/auths/$"
    method: "GET"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # 7. GET /api/models — list of models the WebUI is configured to surface.
  # Cross-port coherence: same hosted_model_name as Ollama / vLLM / LiteLLM.
  - regex: "^/api/models$"
    method: "GET"
    handler: '{"data":[{"id":"{{ persona.lure_content.hosted_model_name | default(''aurora-7b'') }}","name":"{{ persona.lure_content.hosted_model_name | default(''aurora-7b'') }}","object":"model","created":1746230400,"owned_by":"ollama","ollama":{"name":"{{ persona.lure_content.hosted_model_name | default(''aurora-7b'') }}:latest","model":"{{ persona.lure_content.hosted_model_name | default(''aurora-7b'') }}:latest","modified_at":"2026-05-03T11:24:18+08:00","size":4731010048,"digest":"7b4c9d2e8a1f3b6c","details":{"parameter_size":"7.0B","quantization_level":"Q4_K_M"}}}]}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  # 8. GET /api/v1/users — admin only; 401 unauthed
  - regex: "^/api/v1/users(/.*)?$"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # 9. GET /static/ — static asset 404
  - regex: "^/static/"
    handler: ""
    headers:
      - "Content-Type: application/octet-stream"
      - "Server: uvicorn"
    statusCode: 404

  # 10. GET /_app/ — SvelteKit assets
  - regex: "^/_app/"
    handler: "// asset placeholder"
    headers:
      - "Content-Type: application/javascript; charset=utf-8"
      - "Server: uvicorn"
    statusCode: 200

  # 11. GET /favicon.ico
  - regex: "^/favicon\\.ico$"
    handler: ""
    headers:
      - "Content-Type: image/x-icon"
      - "Server: uvicorn"
    statusCode: 204

  # 12. GET /robots.txt
  - regex: "^/robots\\.txt$"
    handler: |
      User-agent: *
      Disallow: /api/
      Disallow: /admin/
    headers:
      - "Content-Type: text/plain"
      - "Server: uvicorn"
    statusCode: 200

  # 13. /docs and OpenAPI — FastAPI surface
  - regex: "^/(docs|openapi\\.json|redoc)$"
    handler: '{"openapi":"3.1.0","info":{"title":"Open WebUI","version":"0.6.5"},"paths":{"/api/v1/auths/signin":{"post":{"summary":"Sign in"}},"/api/v1/auths/signup":{"post":{"summary":"Sign up"}}}}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 200

  # 14. /api catch-all — 401
  - regex: "^/api/"
    handler: '{"detail":"Not authenticated"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 401

  # 15. Generic 404
  - regex: ".*"
    handler: '{"detail":"Not Found"}'
    headers:
      - "Content-Type: application/json"
      - "Server: uvicorn"
    statusCode: 404
