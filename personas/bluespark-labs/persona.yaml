schema_version: 1
slug: bluespark-labs
display_name: "BlueSpark Labs"
version: 1
created_at: 2026-05-06
last_rotated_at: 2026-05-06
identity:
  industry: ai-infrastructure
  scale: small
  internal_domain: int.bluesparkz.dev
  public_domain: bluesparkz.dev
  email_pattern: "{first}.{last_initial}@bluesparkz.dev"
  founded: 2024
  hq: "Singapore"
nodes:
  - id: lighthouse-1
    role: eval-host
    peers: []
coherence:
  hosts_file_template: templates/etc-hosts.tmpl
  # Singapore-based startup; drives wall-clock formatting on every emitted
  # persona-coherent timestamp (Ollama modified_at, service log timestamps).
  timezone: Asia/Singapore
  # BlueSpark is a 12-person startup that does not run an internal Vault.
  # Eval-host secrets live in /opt/eval-harness/.env (see node.lures).
  ssh_history_seeds: {}
  vault_addr: vault.int.bluesparkz.dev

  # ─────────────────────────────────────────────────────────────────────
  # `world` — single source of truth for all lure-shared identity values.
  #
  # Disney cohesion requirement: every BlueSpark-specific string in every lure
  # file MUST reference this block via {{ persona.coherence.world.<path> }}.
  # Added 2026-05-19 (Task 2.5 — OpSec Engineering Overhaul).
  #
  # Scale note: BlueSpark is a 12-person startup. Where enterprise personas
  # have redundant replicas and separate specialist hosts, BlueSpark collapses
  # them onto shared machines. db_replica aliases db_primary; redis_node_2/3
  # alias redis_node_1; db_billing_legacy aliases db_primary; ldap aliases
  # the eval-host (they use Cloudflare Access, not LDAP, but the schema key
  # must resolve). This is intentional — small-team realism.
  # ─────────────────────────────────────────────────────────────────────
  world:

    # ── Company identity ──
    company:
      display_name: "BlueSpark Labs"
      legal_name: "BlueSpark Labs Pte. Ltd."
      public_domain: bluesparkz.dev
      internal_domain: int.bluesparkz.dev
      industry: ai-infrastructure
      hq_city: Singapore
      hq_state: SG
      founded_year: 2024
      employee_count_range: "10-15"
      stage: "pre-seed"

    # ── Product / platform ──
    product:
      service_name: bluespark
      platform_display_name: "BlueSpark Eval Harness"
      platform_version: "v0.4.1"
      build_sha: 3a8b2c1d
      region: ap-southeast-1
      jwt_signing_key: "bsl-hmac-2026Q2-prod-5c9e3f1a"

    # ── External org references ──
    org:
      docker_org: bluesparkz
      github_org: bluespark-labs
      dd_scope: bsl-prod
      k8s_namespace: bsl-prod
      aws_iam_user: bsl-svc-prod
      s3_bucket_prefix: bluespark
      sentry_org: bluesparkz
      sentry_project_id: "1024738"
      cluster_inference: bsl-inference-1
      db_app_user: bsl_app
      db_prod_name: bsl_prod

    # ── People (canonical roster) ──
    people:
      platform_admin_1:
        handle: priya
        email_prefix: priya.r
        full_name: "Priya R."
        role: platform-admin
        title: "CEO / Co-founder"
      platform_admin_2:
        handle: jianwei
        email_prefix: jw.t
        full_name: "Jian Wei T."
        role: platform-admin
        title: "Founding Engineer"
        kubeconfig_path: "/home/jw/.kube/config"
      data_viewer:
        handle: kavi
        email_prefix: kavi.s
        full_name: "Kavi S."
        role: data
        title: "Research Engineer"
      sre_group:
        handle: oncall
        email_prefix: oncall
        full_name: "On-Call (rotating)"
        role: sre
        title: "On-Call Engineer"
      ci_service:
        handle: svc-ci
        email_prefix: null
        full_name: "CI Pipeline"
        role: ci
        title: "Service Account"
        source_ip: "10.20.12.10"
      platform_team_group:
        handle: infra-team
        email_prefix: infra
        full_name: "Infrastructure Team"
        role: group

    # ── Hosts and IPs ──
    # BlueSpark is small — the entire stack runs on three physical nodes
    # plus a shared eval-host. Several schema keys alias the same machine.
    #
    # Sub-octet allocation:
    #   10.20.1.0/24 — eval-host / web
    #   10.20.2.0/24 — GPU inference
    #   10.20.3.0/24 — data / storage
    #   10.20.12.0/24 — CI / automation
    hosts:
      prod_web:
        hostname: lighthouse-1
        ip: "10.20.1.10"
        notes: "Primary eval-host — runs LiteLLM, Ollama, Open WebUI"
      edge_nginx:
        hostname: lighthouse-1
        ip: "10.20.1.10"
        port: 443
        version: "1.25.4"
        notes: "nginx reverse proxy on same host"
      db_primary:
        hostname: bsl-db-01
        ip: "10.20.3.10"
        engine: postgresql
        version: "16"
      db_replica:
        hostname: bsl-db-01                   # small team — no separate replica
        ip: "10.20.3.10"
      db_billing_legacy:
        hostname: bsl-db-01                   # no legacy billing; aliases primary
        ip: "10.20.3.10"
        engine: postgresql
        version: "16"
        notes: "No legacy billing system; aliases primary"
      redis_sentinel:
        hostname: bsl-redis-01
        ip: "10.20.3.20"
        port: 26379
        notes: "Single-node Redis — no sentinel in prod"
      redis_node_1:
        hostname: bsl-redis-01
        ip: "10.20.3.20"
        role: master
      redis_node_2:
        hostname: bsl-redis-01                # single Redis node
        ip: "10.20.3.20"
        role: master
      redis_node_3:
        hostname: bsl-redis-01                # single Redis node
        ip: "10.20.3.20"
        role: master
      vault:
        hostname: lighthouse-1               # Vault OSS on eval-host (dev mode)
        ip: "10.20.1.10"
        port: 8200
      ldap:
        hostname: lighthouse-1               # No LDAP; uses Cloudflare Access
        ip: "10.20.1.10"
        port: 636
        notes: "Stub — BlueSpark uses Cloudflare Access, not LDAP"
      flagship_worker:
        hostname: lighthouse-1
        ip: "10.20.1.10"
        notes: "Single-host eval workload"
      gpu_worker_1:
        hostname: bsl-gpu-01
        ip: "10.20.2.10"
        gpu: "NVIDIA RTX 4090"
        gpu_count: 1
      gpu_worker_2:
        hostname: bsl-gpu-01                  # single GPU node; schema key required
        ip: "10.20.2.10"
        gpu: "NVIDIA RTX 4090"
        gpu_count: 1
      docker_registry:
        hostname: lighthouse-1
        ip: "10.20.1.10"
        port: 5000
      langfuse:
        hostname: lighthouse-1
        ip: "10.20.1.10"
        notes: "LangFuse on eval-host"
      n8n:
        hostname: lighthouse-1
        ip: "10.20.1.10"
        notes: "n8n on eval-host"
      langflow:
        hostname: lighthouse-1
        ip: "10.20.1.10"
        port: 7860
        notes: "LangFlow on eval-host"
      influxdb:
        hostname: lighthouse-1
        ip: "10.20.1.10"
        port: 8086

    # ── Service-port map ──
    ports:
      ssh:              { num: 2222,  host: prod_web,          service: "OpenSSH 9.2p1 Ubuntu" }
      mysql_legacy:     { num: 3306,  host: db_billing_legacy, service: "PostgreSQL 16 (alias)" }
      redis:            { num: 6379,  host: redis_node_1,      service: "Redis 7.2.4" }
      mcp_litellm:      { num: 8000,  host: prod_web,          service: "BlueSpark Eval Harness v0.4.1 (MCP + LiteLLM 1.65.2)" }
      vllm:             { num: 8001,  host: gpu_worker_1,      service: "vLLM 0.6.3 OpenAI-compat" }
      influxdb:         { num: 8086,  host: influxdb,          service: "InfluxDB 2.7.5" }
      langflow:         { num: 7860,  host: langflow,          service: "LangFlow 1.2.0" }
      open_webui:       { num: 8888,  host: prod_web,          service: "Open WebUI v0.5.3" }
      ollama:           { num: 11434, host: flagship_worker,   service: "Ollama 0.5.4" }
      vault:            { num: 8200,  host: vault,             service: "HashiCorp Vault" }
      ldap:             { num: 636,   host: ldap,              service: "Cloudflare Access stub" }
      docker_registry:  { num: 5000,  host: docker_registry,   service: "Docker Registry v2" }

    # ── Teams ──
    teams:
      platform_eng:
        id: team-infra
        alias: "Infrastructure"
        spend: 4218.30
        max_budget: 20000.0
        member_count: 3
      data_science:
        id: team-research
        alias: "Research"
        spend: 1847.60
        max_budget: 10000.0
        member_count: 6
      sre:
        id: team-infra
        alias: "Infrastructure"
        spend: 4218.30
        max_budget: 20000.0
        member_count: 3

    # ── Active incidents ──
    incidents:
      active_id: INC-0042
      active_summary: "aurora-7b eval harness OOM on lighthouse-1 — OOM killer invoked"
      active_owner: oncall
      tls_cert_expiry: "2026-08-01"
      oom_worker: lighthouse-1
      oom_timestamp: "2026-05-10T03:47:00+08:00"
      deploy_tag: "v0.4.1"

    # ── Watermark passwords for cross-lure attribution ──
    watermark_passwords:
      prefix: "bsl_prod_2026Q2-"
      mcp:      "bsl_prod_2026Q2-7e3c1a9f"
      http:     "bsl_prod_2026Q2-2b8f4d6a"
      ollama:   "bsl_prod_2026Q2-4a1e9c2b"
      openai:   "bsl_prod_2026Q2-d3f6b8e1"
      langflow: "bsl_prod_2026Q2-9c4b2f7a"
      redis:    "bsl_prod_2026Q2-5a8d1c3e"
      influxdb: "bsl_prod_2026Q2-1f3e7a9b"
      ssh:      "bsl_prod_2026Q2-8b2c4f6d"

    watermark_passwords_ssh_regex: "([a-z]{3,4}_prod_20[0-9]{2}Q[1-4]-[0-9a-f]{8})"

llm_seed: |
  BlueSpark Labs is a roughly twelve-person AI-infrastructure research startup based
  in Singapore, founded in 2024. The team works on inference-serving and model-eval
  tooling, with project codenames lighthouse (eval harness), vortex (router /
  scheduling experiments), catalyst (training-pipeline tooling), and aurora (the
  in-house 7B model line). Founders are Priya R. (CEO, ex-research) and Jian Wei T.
  (founding engineer); voice is research-y — "we observe", "ablations on", "the
  evaluation harness" — not corporate-marketing. Engineers prefer Slack, Notion,
  and a small GPU fleet over heavyweight enterprise tooling.

# === lure_content =============================================================
# Persona-level key-value strings consumed by Jinja substitution inside
# personas/bluespark-labs/lures/*.yaml. EVERY {{ persona.lure_content.* }}
# expression in the lures must resolve here, otherwise the lure falls back to
# its hard-coded default and we lose persona-swap fidelity.
#
# Audited against `grep -roh "persona\.lure_content\.[a-zA-Z_]*"` over the 5
# bluespark-labs/lures/*.yaml files on 2026-05-06.
lure_content:
  # --- Platform / brand (used by every lure's LLM prompt + headers) ----------
  platform_display_name: "BlueSpark Labs"   # litellm, vllm, ollama prompts
  hosted_model_name: aurora-7b              # litellm, vllm, ollama, openwebui, docker

  # --- Host identity (used in lure handlers + LLM prompts) -------------------
  node_hostname: lighthouse-1               # litellm, vllm, ollama, docker
  node_role: eval-host                      # ollama prompt, docker /info Labels

  # --- Org / deploy labels ---------------------------------------------------
  team_eval: eval-harness                   # litellm /metrics, docker container Labels
  deploy_env: prod                          # docker container + /info Labels

  # --- Engineers (named in litellm/vllm/ollama LLM prompts) ------------------
  engineer_priya: "Priya R."
  engineer_jian:  "Jian Wei T."
  engineer_kavi:  "Kavi S."
  engineer_anand: "Anand M."

  # --- Project codenames (named in litellm/vllm/ollama LLM prompts) ----------
  project_lighthouse: lighthouse
  project_vortex:     vortex
  project_catalyst:   catalyst
  project_aurora:     aurora
