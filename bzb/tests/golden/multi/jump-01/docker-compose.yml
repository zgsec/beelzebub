# Generated by bzb render. Do not hand-edit; rerun bzb render.
services:
  beelzebub:
    image: ghcr.io/honeypot/beelzebub-fork:v0.1.0
    container_name: beelzebub
    restart: unless-stopped
    network_mode: host
    # Mount layout mirrors tools/docker-compose.baseline.yml exactly so dev-VM
    # baseline capture and prod sensors load the same bytes from the same paths.
    # - beelzebub.yaml at /configurations/beelzebub.yaml (default -confCore).
    # - persona/lures at /configurations/services (default -confServices).
    # - persona/ at /configurations/persona (resolved via PERSONA_DIR).
    volumes:
      - ./beelzebub.yaml:/configurations/beelzebub.yaml:ro
      - ./persona/lures:/configurations/services:ro
      - ./persona:/configurations/persona:ro
      - beelzebub-logs:/var/log/beelzebub
    environment:
      - SENSOR_ID=${SENSOR_ID}
      - PERSONA_SLUG=${PERSONA_SLUG}
      - PERSONA_DIR=/configurations/persona
      - OPEN_AI_SECRET_KEY=${OPEN_AI_SECRET_KEY}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  exporter:
    image: ghcr.io/honeypot/honeypot-exporter:v0.1.0
    container_name: honeypot-exporter
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=10M
    volumes:
      - beelzebub-logs:/var/log/beelzebub:ro
      - ./geoip:/geoip:ro
      - exporter-data:/data
      - p0f-log:/var/log/p0f:ro
    environment:
      - LOG_PATH=/var/log/beelzebub/beelzebub.log
      - GEOIP_COUNTRY=/geoip/GeoLite2-Country.mmdb
      - GEOIP_ASN=/geoip/GeoLite2-ASN.mmdb
      - DATA_PATH=/data
      - SENSOR_ID=${SENSOR_ID}
      - IP_SALT=${IP_SALT}
      - AGGREGATOR_URL=${AGGREGATOR_URL}
      - AGGREGATOR_TOKEN=${AGGREGATOR_TOKEN}
      - P0F_LOG_PATH=/var/log/p0f/p0f.log

  p0f:
    image: ghcr.io/honeypot/p0f:latest
    container_name: p0f
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - p0f-log:/var/log/p0f
    command: ["-i", "any", "-o", "/var/log/p0f/p0f.log"]

volumes:
  beelzebub-logs:
  exporter-data:
  p0f-log:
