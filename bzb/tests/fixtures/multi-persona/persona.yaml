schema_version: 1
slug: multi
display_name: "Multi-node Test"
version: 1
created_at: 2026-05-05
last_rotated_at: 2026-05-05
identity:
  industry: test
  scale: small
  internal_domain: int.multi.test
  public_domain: multi.test
  email_pattern: "{first}@multi.test"
nodes:
  - id: jump-01
    role: bastion
    peers: [web-01, db-01]
  - id: web-01
    role: web
    peers: [db-01]
  - id: db-01
    role: db
    peers: []
coherence:
  hosts_file_template: templates/etc-hosts.tmpl
  ssh_history_seeds:
    jump-01:
      - "ssh deploy@web-01.int.multi.test"
      - "psql -h db-01.int.multi.test -U app"
